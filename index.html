<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top,#fff 0,#f3f7ff 42%,#eef3fb 100%)}
body{overflow-x:hidden}.hidden{display:none!important}.app{max-width:480px;margin:0 auto;min-height:100dvh;background:#fff;position:relative;box-shadow:0 0 0 1px rgba(13,71,161,.08)}

/* onboarding */
.onboarding{min-height:100dvh;padding-bottom:22px;background:#fff}.hero{background:linear-gradient(135deg,#062b67,#0D47A1 55%,#073270);color:#fff;padding:34px 24px 28px;border-bottom-left-radius:26px;border-bottom-right-radius:26px;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-30px;top:25px;width:135px;height:180px;background:rgba(255,255,255,.12);border-radius:28px;transform:rotate(11deg)}.logoRow{display:flex;gap:14px;align-items:center;position:relative;z-index:1}.appLogo{width:64px;height:64px;border-radius:17px;background:#fff;display:grid;place-items:center;box-shadow:0 12px 24px rgba(0,0,0,.18);font-size:34px}.brand{font-size:32px;font-weight:950;letter-spacing:-.04em}.brand span{color:var(--accent)}.tag{margin:6px 0 18px;color:#d7e7ff;line-height:1.45}.trust{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative;z-index:1}.trust div{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);border-radius:13px;padding:9px;font-size:11px;font-weight:800}.panel{margin:-10px 14px 0;background:#fff;border-radius:24px;padding:20px 14px;position:relative;z-index:2;box-shadow:var(--shadow)}.sectionTitle{display:flex;gap:10px;align-items:center;margin:8px 0 4px;font-size:20px;font-weight:950}.sectionTitle .ico{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;background:#e8f1ff;color:var(--primary)}.sub{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.4}.tradeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.tradeCard{min-height:108px;border:1px solid var(--line);border-radius:15px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-weight:900;position:relative}.tradeCard .emoji{font-size:31px}.tradeCard.active{border:2px solid var(--secondary);background:linear-gradient(180deg,#fff,#f0f6ff)}.tradeCard.active:after{content:"✓";position:absolute;right:-6px;bottom:-6px;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:var(--secondary);color:#fff;border:3px solid #fff;font-weight:950}.moreTrade{margin:14px 0;border:1px dashed #9db9e9;color:var(--primary);background:#fff;border-radius:13px;height:44px;font-weight:900}.infoBox{border:1px solid #b9d2ff;background:#f1f7ff;border-radius:13px;padding:12px 14px;margin:12px 0;color:var(--primary);font-size:13px}.footerLock{text-align:center;color:#7b8da6;font-size:12px;margin:12px 0}.optionalInputs{display:grid;gap:9px}.desktopOnly{display:none}@media(min-width:760px){.onboarding{padding:20px}.panel{padding:24px 26px}.tradeGrid{grid-template-columns:repeat(4,1fr)}.optionalInputs{grid-template-columns:1fr 1fr}.optionalInputs .wide{grid-column:1/-1}.desktopOnly{display:block}.hero{border-radius:24px}}
/* app shell */
.topbar{height:64px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;position:sticky;top:0;z-index:10}.topbar b{font-size:17px}.iconBtn{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.14);color:#fff;font-size:20px}.content{padding:16px 14px calc(var(--bottom) + 18px);min-height:calc(100dvh - 64px);background:#f6f8fc}.bottomNav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:480px;height:calc(66px + env(safe-area-inset-bottom));padding:7px 8px env(safe-area-inset-bottom);background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);z-index:20}.navItem{background:transparent;color:#789;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;font-weight:800;border-radius:12px}.navItem.active{background:#edf5ff;color:var(--primary)}.navItem span{font-size:20px}.dashGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{padding:15px;color:#fff;border-radius:18px;min-height:96px;box-shadow:0 12px 24px rgba(0,0,0,.08)}.stat b{display:block;font-size:26px;margin-top:8px}.stat.blue{background:linear-gradient(135deg,#1565C0,#0D47A1)}.stat.green{background:linear-gradient(135deg,#22c55e,#15803d)}.stat.orange{background:linear-gradient(135deg,#fb923c,#f57c00)}.stat.purple{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}.list{display:grid;gap:10px}.item{padding:13px;border:1px solid var(--line);border-radius:15px;background:#fff;display:flex;justify-content:space-between;gap:10px;align-items:center}.item h4{margin:0 0 4px}.item p{margin:0;color:var(--muted);font-size:13px}.badge{padding:5px 9px;border-radius:999px;font-size:11px;font-weight:900;background:#eef5ff;color:var(--primary)}.badge.ok{background:#e8f8ee;color:#15803d}.badge.wait{background:#fff5e7;color:#c05b00}.badge.paid{background:#e8f8ee;color:#15803d}.pageTitle{font-size:26px;font-weight:950;margin:0 0 6px;letter-spacing:-.03em}.toolbar{display:flex;gap:8px;margin:12px 0}.toolbar .btn{flex:1}.stepper{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:10px 0 14px}.step{height:32px;border-radius:999px;background:#e9edf5;color:#789;display:grid;place-items:center;font-size:12px;font-weight:900}.step.active{background:var(--primary);color:#fff}.quoteStep{display:none}.quoteStep.active{display:block}.serviceRow{padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:9px}.serviceTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.serviceName{font-weight:950}.servicePrice{font-weight:950;color:var(--primary)}.qtyBox{display:flex;align-items:center;gap:8px;margin-top:10px}.qtyBtn{width:34px;height:34px;border-radius:10px;background:#eef5ff;color:var(--primary);font-size:20px;font-weight:950}.qtyVal{min-width:34px;text-align:center;font-weight:950}.inlineActions{display:flex;gap:6px;margin-top:10px}.inlineActions button{flex:1;height:34px;border-radius:10px;background:#f7f9fc;color:var(--primary);font-size:12px;font-weight:900;border:1px solid var(--line)}.totalBox{position:sticky;bottom:calc(var(--bottom) + 8px);background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:12px;margin-top:12px}.totalLine{display:flex;justify-content:space-between;padding:6px 0;font-weight:900}.totalLine.ttc{background:var(--accent);color:#fff;margin:8px -12px -12px;padding:12px;border-bottom-left-radius:18px;border-bottom-right-radius:18px;font-size:18px}.previewGrid{max-width:920px;margin:18px auto;display:grid;grid-template-columns:1fr 1fr;gap:18px}.howCard{padding:18px}.howSteps{display:grid;gap:8px}.howSteps div{background:#f6f9ff;border:1px solid var(--line);border-radius:12px;padding:10px;font-size:13px}.pdfPreview{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 8px 22px rgba(13,71,161,.08);font-size:12px}.pdfHead{display:flex;justify-content:space-between;border-bottom:3px solid var(--primary);padding-bottom:8px;margin-bottom:10px}.pdfLogo{width:48px;height:48px;border:2px solid var(--primary);border-radius:10px;display:grid;place-items:center;font-size:25px;color:var(--accent)}.pdfTitle{background:var(--primary);color:#fff;border-radius:8px;padding:8px 18px;font-size:18px;font-weight:950}.miniTable{width:100%;border-collapse:collapse;margin-top:10px}.miniTable th{background:var(--primary);color:#fff}.miniTable th,.miniTable td{border:1px solid #c9d5e6;padding:7px;text-align:left}.miniTable td:nth-child(n+2),.miniTable th:nth-child(n+2){text-align:right}.catRow td{background:#eef3f8!important;color:var(--primary);font-weight:950;text-align:left!important}.modal{position:fixed;inset:0;background:rgba(2,10,27,.45);z-index:80;display:grid;place-items:end center;padding:14px}.modalBox{width:100%;max-width:480px;background:#fff;border-radius:24px 24px 18px 18px;padding:18px;box-shadow:0 25px 60px rgba(0,0,0,.25)}.modalTitle{font-size:20px;font-weight:950;margin:0 0 12px}.empty{padding:26px 14px;text-align:center;color:var(--muted)}.photoBox{height:120px;border-radius:14px;border:1px dashed #afc1dc;background:#f8fbff;display:grid;place-items:center;color:#789;margin:10px 0}.successView{text-align:center;padding:30px 8px}.check{width:92px;height:92px;border-radius:50%;border:3px solid #20a34a;color:#20a34a;display:grid;place-items:center;font-size:48px;margin:12px auto}.hideSmall{}@media(max-width:760px){.desktopOnly{display:block}.previewGrid{grid-template-columns:1fr;margin:14px}.howCard{padding:14px}.howSteps{grid-template-columns:1fr}.pdfPreview .totalBox{position:static!important;bottom:auto!important;box-shadow:none;margin-top:10px}.pdfPreview .totalLine.ttc{font-size:15px}.pdfHead{gap:8px}.pdfTitle{padding:7px 12px;font-size:15px}}
@media(max-width:360px){.tradeGrid{grid-template-columns:repeat(2,1fr)}.hideSmall{display:none}.brand{font-size:27px}.hero{padding-left:18px;padding-right:18px}.panel{margin-left:8px;margin-right:8px}.content{padding-left:10px;padding-right:10px}}
.pdfPreview .totalBox{position:static;bottom:auto;box-shadow:none;margin-top:10px}
@media(print){.topbar,.bottomNav,.noPrint{display:none!important}.app{box-shadow:none;max-width:none}.content{padding:0;background:#fff}.pdfPreview{border:0;box-shadow:none}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
'use strict';
const LS='devisexpress_v4_state';
const money=n=>Number(n||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR'});
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,9).toUpperCase();
const esc=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
const trades={
 plombier:{label:'Plombier',icon:'🚰',subtitle:'Plomberie',primary:'#0D47A1',accent:'#F57C00',hero:'Remise en conformité plomberie'},
 electricien:{label:'Électricien',icon:'⚡',subtitle:'Électricité générale',primary:'#0D47A1',accent:'#F57C00',hero:'Remise en conformité électrique'},
 peintre:{label:'Peintre',icon:'🖌️',subtitle:'Peinture',primary:'#6D28D9',accent:'#F57C00',hero:'Travaux de peinture'},
 menuisier:{label:'Menuisier',icon:'🪵',subtitle:'Menuiserie',primary:'#795548',accent:'#F57C00',hero:'Travaux de menuiserie'},
 macon:{label:'Maçon',icon:'🧱',subtitle:'Maçonnerie',primary:'#455A64',accent:'#F57C00',hero:'Travaux de maçonnerie'},
 carreleur:{label:'Carreleur',icon:'🏠',subtitle:'Carrelage',primary:'#00838F',accent:'#F57C00',hero:'Pose de carrelage'},
 clim:{label:'Climatisation',icon:'❄️',subtitle:'Climatisation',primary:'#0277BD',accent:'#00ACC1',hero:'Installation climatisation'},
 paysagiste:{label:'Paysagiste',icon:'🌿',subtitle:'Paysagisme',primary:'#2E7D32',accent:'#F57C00',hero:'Entretien paysager'},
 nettoyage:{label:'Nettoyage',icon:'🧴',subtitle:'Nettoyage',primary:'#1565C0',accent:'#2E7D32',hero:'Prestation de nettoyage'},
 web:{label:'Création site web',icon:'💻',subtitle:'Service digital',primary:'#263238',accent:'#1565C0',hero:'Création site web'},
 autre:{label:'Autre métier',icon:'•••',subtitle:'Service professionnel',primary:'#0D47A1',accent:'#F57C00',hero:'Prestation professionnelle'}
};
const defaults={
 plombier:[['Dépose ancienne installation',1,'forfait',180,'DÉPOSE'],['Recherche de fuite',1,'forfait',120,'DIAGNOSTIC'],['Remplacement robinetterie',1,'u',95,'APPAREILLAGE'],['Pose évier / lavabo',1,'u',180,'POSE'],['Main d’œuvre',1,'forfait',350,'MAIN D’ŒUVRE']],
 electricien:[['Dépose ancienne installation électrique',1,'forfait',350,'DÉPOSE'],['Fourniture et pose tableau électrique 2 rangées',1,'u',280,'TABLEAU ÉLECTRIQUE'],['Interrupteurs différentiels 30mA',2,'u',65,'TABLEAU ÉLECTRIQUE'],['Disjoncteurs divisionnaires',10,'u',18,'TABLEAU ÉLECTRIQUE'],['Prises 2P+T',22,'u',8,'APPAREILLAGE'],['Interrupteurs simples / va-et-vient',7,'u',10,'APPAREILLAGE'],['Points lumineux / DCL',6,'u',18,'APPAREILLAGE'],['Fourniture câblage complet',1,'lot',420,'PASSAGE RÉSEAUX'],['Main d’œuvre installation complète',1,'forfait',2150,'MAIN D’ŒUVRE']],
 peintre:[['Protection des sols',1,'forfait',90,'PRÉPARATION'],['Préparation des supports',40,'m²',8,'PRÉPARATION'],['Application sous-couche',40,'m²',6,'PEINTURE'],['Peinture murs deux couches',40,'m²',16,'PEINTURE'],['Main d’œuvre',1,'forfait',450,'MAIN D’ŒUVRE']],
 macon:[['Préparation chantier',1,'forfait',150,'PRÉPARATION'],['Montage mur / reprise',1,'forfait',650,'MAÇONNERIE'],['Enduit finition',20,'m²',28,'FINITION'],['Évacuation gravats',1,'forfait',180,'NETTOYAGE']],
 autre:[['Prestation personnalisée',1,'forfait',250,'PRESTATION'],['Main d’œuvre',1,'forfait',300,'MAIN D’ŒUVRE']]
};
function catalogue(trade){return (defaults[trade]||defaults.autre).map(x=>({id:uid(),name:x[0],qty:x[1],unit:x[2],price:x[3],category:x[4]}));}
let state=load()||{
 onboarded:false,activeTab:'home',trade:'plombier',company:{name:'',firstName:'',phone:'',email:'',address:'',siret:'',insurance:'',logo:''},
 servicesByTrade:{},clients:[],quotes:[],draft:null,settings:{vat:10,validity:30,mentions:'Devis établi sur estimation visuelle. Toute anomalie non visible pourra entraîner un ajustement après validation client. Les alimentations existantes pourront être remplacées si défaut de sécurité. Devis valable selon la durée indiquée.'}
};
if(!state.servicesByTrade)state.servicesByTrade={};Object.keys(trades).forEach(k=>{if(!state.servicesByTrade[k])state.servicesByTrade[k]=catalogue(k)});state.catalogueTrade=state.catalogueTrade||state.trade;state.quotes=(state.quotes||[]).map(q=>({...q,items:(q.items||[]).map(it=>({...it,qty:Math.max(1,Number(it.qty)||1)}))}));
function save(){localStorage.setItem(LS,JSON.stringify(state));}
function load(){try{return JSON.parse(localStorage.getItem(LS)||'null')}catch(e){return null}}
function theme(){return trades[state.trade]||trades.autre}
function applyTheme(){const t=theme();document.documentElement.style.setProperty('--primary',t.primary);document.documentElement.style.setProperty('--secondary',t.primary==='#0D47A1'?'#1565C0':t.primary);document.documentElement.style.setProperty('--accent',t.accent)}
function root(html){document.getElementById('root').innerHTML=html;bindCommon();}
function render(){applyTheme(); state.onboarded?renderApp():renderOnboarding(); save();}
window.render=render;
function bindCommon(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.activeTab=b.dataset.tab;render()});}
function renderOnboarding(){const t=theme();root(`<main class="onboarding">
 <section class="hero"><div class="logoRow"><div class="appLogo">🧾</div><div><div class="brand">Devis<span>Express</span></div><p class="tag">Devis, factures, clients, tarifs et relances depuis votre téléphone.</p></div></div><div class="trust"><div>🚀 100% rapide</div><div>🔒 Sans compte</div><div>🛡️ Vos données</div></div></section>
 <section class="panel"><div class="sectionTitle"><span class="ico">💼</span>1. Choisissez votre métier principal</div><p class="sub">Nous adaptons l’application à votre activité.</p>
 <div class="tradeGrid">${Object.entries(trades).map(([k,v])=>`<button class="tradeCard ${state.trade===k?'active':''}" data-trade="${k}"><span class="emoji">${v.icon}</span><span>${v.label}</span></button>`).join('')}</div>
 <button class="moreTrade" id="customTrade">＋ Je ne trouve pas mon métier</button>
 <div class="sectionTitle"><span class="ico">🏢</span>2. Vos informations <span style="color:#789">(optionnel)</span></div><p class="sub">Ces informations seront utilisées sur vos devis. Vous pourrez les modifier plus tard.</p>
 <div class="optionalInputs">
   <input class="field" id="cName" placeholder="🏢 Nom de votre entreprise (optionnel)" value="${esc(state.company.name)}">
   <input class="field" id="fName" placeholder="👤 Votre prénom (optionnel)" value="${esc(state.company.firstName)}">
   <input class="field" id="phone" placeholder="📞 Téléphone (optionnel)" value="${esc(state.company.phone)}">
   <input class="field" id="email" placeholder="✉️ Email (optionnel)" value="${esc(state.company.email)}">
   <input class="field wide" id="addr" placeholder="📍 Adresse (optionnel)" value="${esc(state.company.address)}">
 </div>
 <div class="infoBox">ⓘ <b>Aucune information n’est obligatoire.</b><br>Vous pouvez commencer à créer vos devis immédiatement !</div>
 <button class="btn" id="enter">Accéder à mon espace →</button><div class="footerLock">🔒 Vos données restent uniquement sur votre appareil.</div>
 </section>
 <section class="desktopOnly previewGrid"><div class="card howCard"><b>Aperçu de votre devis</b><div style="margin-top:10px" class="pdfPreview">${pdfPreviewHTML(true)}</div></div><div class="card howCard"><b>Comment ça fonctionne ?</b><p class="sub">Un parcours court, pensé pour faire un devis sans friction.</p><div class="howSteps"><div>1️⃣ Choisissez un métier principal.</div><div>2️⃣ Ajoutez ou non vos informations.</div><div>3️⃣ Créez un devis rapide, puis générez le PDF.</div><div>🔒 Sans compte, données locales.</div></div></div></section>
 </main>`);
 document.querySelectorAll('[data-trade]').forEach(b=>b.onclick=()=>{state.trade=b.dataset.trade;save();renderOnboarding()});
 ['cName','fName','phone','email','addr'].forEach(id=>document.getElementById(id).oninput=e=>{const map={cName:'name',fName:'firstName',phone:'phone',email:'email',addr:'address'};state.company[map[id]]=e.target.value;save()});
 document.getElementById('enter').onclick=()=>{state.onboarded=true;state.activeTab='home';render()};
 document.getElementById('customTrade').onclick=()=>openTradeModal();
}
function shell(title,body){root(`<div class="app"><header class="topbar"><button class="iconBtn" onclick="openQuickMenu()">☰</button><b>${title}</b><button class="iconBtn" onclick="openProfileModal()">⚙</button></header><main class="content">${body}</main>${nav()}</div>`)}
function nav(){return `<nav class="bottomNav noPrint">${[['home','🏠','Accueil'],['quote','➕','Devis'],['clients','👥','Clients'],['track','📊','Suivi'],['profile','👤','Profil']].map(x=>`<button data-tab="${x[0]}" class="navItem ${state.activeTab===x[0]?'active':''}"><span>${x[1]}</span>${x[2]}</button>`).join('')}</nav>`}
function renderApp(){const pages={home:homePage,quote:quotePage,clients:clientsPage,track:trackPage,profile:profilePage};(pages[state.activeTab]||homePage)();}
function homePage(){const qs=state.quotes;const pending=qs.filter(q=>q.status==='En attente').length, ok=qs.filter(q=>q.status==='Accepté').length, paid=qs.filter(q=>q.type==='facture'||q.status==='Payé').length, ca=qs.filter(q=>q.status==='Accepté'||q.status==='Payé').reduce((s,q)=>s+q.totalTTC,0);shell('DevisExpress',`<h1 class="pageTitle">Bonjour !</h1><p class="sub">Voici votre activité</p><div class="dashGrid"><div class="stat blue">Devis en attente<b>${pending}</b></div><div class="stat green">Devis acceptés<b>${ok}</b></div><div class="stat orange">Factures payées<b>${paid}</b></div><div class="stat purple">CA estimé<b style="font-size:20px">${money(ca)}</b></div></div><div class="toolbar"><button class="btn" onclick="newQuote()">＋ Nouveau devis</button><button class="btn ghost" onclick="demoQuote()">Démo</button></div><h3>Activité récente</h3><div class="list">${qs.slice(-6).reverse().map(q=>quoteItem(q)).join('')||'<div class="empty">Aucun devis pour le moment.</div>'}</div>`)}
function quoteItem(q){return `<div class="item" onclick="openQuote('${q.id}')"><div><h4>${q.number}</h4><p>${esc(q.client.name||'Client non renseigné')} · ${new Date(q.date).toLocaleDateString('fr-FR')}</p></div><div style="text-align:right"><b>${money(q.totalTTC)}</b><br><span class="badge ${q.status==='Accepté'?'ok':q.status==='Payé'?'paid':'wait'}">${q.status}</span></div></div>`}
function blankDraft(){return {id:uid(),number:'DEV-'+new Date().getFullYear()+'-'+String(Math.floor(1000+Math.random()*9000)),date:today(),validity:state.settings.validity,step:1,client:{name:'',phone:'',email:'',address:''},title:theme().hero,description:'',items:[],observations:'',status:'Brouillon',type:'devis'};}
function ensureDraft(){if(!state.draft)state.draft=blankDraft();}
function newQuote(){state.draft=blankDraft();state.activeTab='quote';render()}
function quotePage(){ensureDraft();const d=state.draft;shell('Nouveau devis',`<h1 class="pageTitle">Nouveau devis</h1><div class="stepper"><div class="step ${d.step===1?'active':''}">1 Client</div><div class="step ${d.step===2?'active':''}">2 Prestations</div><div class="step ${d.step===3?'active':''}">3 Aperçu</div></div>${quoteStepHTML(d)}`);bindQuote();}
function quoteStepHTML(d){if(d.step===1)return `<div class="quoteStep active"><div class="label">Informations client</div><input class="field draft" data-path="client.name" placeholder="Nom du client" value="${esc(d.client.name)}"><input class="field draft" data-path="client.phone" placeholder="Téléphone" value="${esc(d.client.phone)}" style="margin-top:9px"><input class="field draft" data-path="client.email" placeholder="Email" value="${esc(d.client.email)}" style="margin-top:9px"><textarea class="field draft" data-path="client.address" placeholder="Adresse du chantier" style="margin-top:9px">${esc(d.client.address)}</textarea><div class="label">Travaux</div><input class="field draft" data-path="title" placeholder="Titre du devis" value="${esc(d.title)}"><textarea class="field draft" data-path="description" placeholder="Description courte" style="margin-top:9px">${esc(d.description)}</textarea><div class="toolbar"><button class="btn ghost" onclick="saveDraftOnly()">Enregistrer</button><button class="btn" onclick="goStep(2)">Suivant</button></div><button class="btn danger" onclick="resetDraftConfirm()" style="margin-top:8px">Réinitialiser le devis</button><div class="toolbar" style="display:none"></div></div>`;
 if(d.step===2)return `<div class="quoteStep active"><div class="label">Ajouter une prestation</div><select class="field" id="catalogueTrade">${Object.entries(trades).map(([k,v])=>`<option value="${k}" ${state.catalogueTrade===k?'selected':''}>${v.label}</option>`).join('')}</select><input class="field" id="serviceSearch" placeholder="🔎 Rechercher une prestation..." style="margin-top:9px"><div id="catalogueList" class="list" style="margin-top:10px">${catalogueListHTML()}</div><button class="btn ghost" onclick="openServiceModal()" style="margin-top:10px">＋ Prestation personnalisée</button><div class="label">Prestations sélectionnées</div><div class="list">${d.items.map((it,i)=>selectedItemHTML(it,i)).join('')||'<div class="empty">Aucune prestation sélectionnée.</div>'}</div>${totalsHTML(d)}<div class="toolbar"><button class="btn ghost" onclick="goStep(1)">Retour</button><button class="btn" onclick="goStep(3)">Suivant</button></div></div>`;
 return `<div class="quoteStep active"><div class="label">Récapitulatif</div>${pdfPreviewHTML(false)}<div class="toolbar"><button class="btn ghost" onclick="goStep(2)">Modifier</button><button class="btn" onclick="finalizeQuote()">Générer le devis</button></div><div class="toolbar"><button class="btn orange" onclick="downloadDraftPdf()">Télécharger PDF</button><button class="btn danger" onclick="resetDraftConfirm()">Réinitialiser</button></div></div>`}
function catalogueListHTML(){const tr=state.catalogueTrade||state.trade;return (state.servicesByTrade[tr]||[]).map(s=>`<div class="item"><div><h4>${esc(s.name)}</h4><p>${esc(s.category)} · ${money(s.price)} / ${esc(s.unit)}</p></div><button class="btn small ghost" onclick="addService('${s.id}')">Ajouter</button></div>`).join('')}
function selectedItemHTML(it,i){return `<div class="serviceRow"><div class="serviceTop"><div><div class="serviceName">${esc(it.name)}</div><p style="margin:4px 0;color:#789">${it.qty} × ${money(it.price)} · ${esc(it.unit)}</p></div><div class="servicePrice">${money(it.qty*it.price)}</div></div><div class="qtyBox"><button class="qtyBtn" onclick="changeQty(${i},-1)">−</button><span class="qtyVal">${it.qty}</span><button class="qtyBtn" onclick="changeQty(${i},1)">＋</button></div><div class="inlineActions"><button onclick="editSelected(${i})">Modifier</button><button onclick="duplicateSelected(${i})">Dupliquer</button><button onclick="removeSelected(${i})">Supprimer</button></div></div>`}
function totals(d){const ht=d.items.reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.price)||0),0),tva=ht*(Number(state.settings.vat)||0)/100;return {ht,tva,ttc:ht+tva}}
function totalsHTML(d){const t=totals(d);return `<div class="totalBox"><div class="totalLine"><span>Total HT</span><b>${money(t.ht)}</b></div><div class="totalLine"><span>TVA ${state.settings.vat}%</span><b>${money(t.tva)}</b></div><div class="totalLine ttc"><span>Total TTC</span><b>${money(t.ttc)}</b></div></div>`}
function bindQuote(){document.querySelectorAll('.draft').forEach(el=>el.oninput=e=>{setPath(state.draft,el.dataset.path,e.target.value);save()});const trSel=document.getElementById('catalogueTrade');if(trSel)trSel.onchange=e=>{state.catalogueTrade=e.target.value;save();render()};const s=document.getElementById('serviceSearch');if(s)s.oninput=e=>{const q=e.target.value.toLowerCase();const tr=state.catalogueTrade||state.trade;document.getElementById('catalogueList').innerHTML=(state.servicesByTrade[tr]||[]).filter(x=>x.name.toLowerCase().includes(q)||x.category.toLowerCase().includes(q)).map(x=>`<div class="item"><div><h4>${esc(x.name)}</h4><p>${esc(x.category)} · ${money(x.price)}</p></div><button class="btn small ghost" onclick="addService('${x.id}')">Ajouter</button></div>`).join('')||'<div class="empty">Aucun résultat.</div>'}}
function setPath(o,path,val){const p=path.split('.');let x=o;while(p.length>1)x=x[p.shift()];x[p[0]]=val}
window.goStep=n=>{state.draft.step=n;render()};window.saveDraftOnly=()=>{save();toast('Brouillon enregistré')};
window.addService=id=>{const tr=state.catalogueTrade||state.trade;const s=(state.servicesByTrade[tr]||[]).find(x=>x.id===id);if(s){state.draft.items.push({...s,id:uid(),qty:Math.max(1,Number(s.qty)||1),sourceTrade:tr});save();render()}};
window.changeQty=(i,n)=>{state.draft.items[i].qty=Math.max(1,Number(state.draft.items[i].qty||1)+n);save();render()};
window.removeSelected=i=>{state.draft.items.splice(i,1);save();render()};window.duplicateSelected=i=>{state.draft.items.splice(i+1,0,{...state.draft.items[i],id:uid()});save();render()};window.editSelected=i=>openServiceModal(state.draft.items[i],i);
function pdfPreviewHTML(onboard){const d=state.draft||blankDraft();const c=state.company,t=theme(),items=(d.items&&d.items.length)?d.items:catalogue(state.trade).slice(0,4);let cats={};items.forEach(it=>{it.qty=Math.max(1,Number(it.qty)||1);(cats[it.category||'PRESTATIONS']??=[]).push(it)});const info=[c.address,c.phone,c.email,c.siret?'SIRET : '+c.siret:''].filter(Boolean).map(esc).join('<br>')||'Coordonnées entreprise optionnelles';const docType=(d.type==='facture')?'FACTURE':'DEVIS';return `<div class="pdfPreview"><div class="pdfHead"><div style="display:flex;gap:9px"><div class="pdfLogo">${t.icon}</div><div><b>${esc(c.name||'VOTRE ENTREPRISE')}</b><br><span style="color:var(--primary);font-weight:900">${esc(t.subtitle).toUpperCase()}</span><br><small>${info}</small></div></div><div class="pdfTitle">${docType}</div></div><b>${esc(d.title||t.hero).toUpperCase()}</b>${d.description?`<p>${esc(d.description)}</p>`:''}<table class="miniTable"><thead><tr><th>DÉSIGNATION</th><th>QTÉ</th><th>TOTAL HT</th></tr></thead><tbody>${Object.entries(cats).map(([cat,arr])=>`<tr class="catRow"><td colspan="3">${esc(cat)}</td></tr>${arr.map(it=>`<tr><td>${esc(it.name)}</td><td>${Math.max(1,Number(it.qty)||1)}</td><td>${money((Math.max(1,Number(it.qty)||1))*it.price)}</td></tr>`).join('')}`).join('')}</tbody></table>${totalsHTML({items})}<div style="margin-top:12px;border:1px solid #f1d6ad;border-radius:12px;padding:10px;font-size:11px"><b>Mentions de protection</b><br>${esc(state.settings.mentions||'Devis établi selon les éléments fournis par le client.')}</div></div>`}
function createQuoteFromDraft(status='En attente'){const d=state.draft;d.items=d.items.map(it=>({...it,qty:Math.max(1,Number(it.qty)||1)}));const t=totals(d);const q={...JSON.parse(JSON.stringify(d)),id:uid(),date:d.date||today(),status,type:'devis',totalHT:t.ht,totalTVA:t.tva,totalTTC:t.ttc,trade:state.trade};state.quotes.push(q);if(q.client.name&&!state.clients.some(c=>c.name.toLowerCase()===q.client.name.toLowerCase()))state.clients.push({...q.client,id:uid()});state.draft=null;save();return q}
window.finalizeQuote=()=>{const q=createQuoteFromDraft();successPage(q)};
function successPage(q){shell('Devis généré',`<div class="successView"><div class="check">✓</div><h2>Devis créé avec succès !</h2><p>${q.number}</p><button class="btn" onclick="openQuote('${q.id}')">Voir le devis</button><br><br><button class="btn ghost" onclick="shareQuote('${q.id}')">Partager / WhatsApp</button><br><br><button class="btn ghost" onclick="emailQuote('${q.id}')">Envoyer par email</button><br><br><button class="btn ghost" onclick="downloadPdf('${q.id}')">Télécharger PDF</button><br><br><button class="btn danger" onclick="state.activeTab='home';render()">Retour accueil</button></div>`)}
window.openQuote=id=>{const q=state.quotes.find(x=>x.id===id);if(!q)return;state.activeTab='track';shell(q.number,`${quoteDetailHTML(q)}`)};
function quoteDetailHTML(q){return `<div class="pdfPreview">${pdfDocHTML(q)}</div><div class="toolbar noPrint"><button class="btn" onclick="downloadPdf('${q.id}')">PDF</button><button class="btn ghost" onclick="shareQuote('${q.id}')">Partager</button></div><div class="toolbar noPrint"><button class="btn ghost" onclick="markQuote('${q.id}','Accepté')">Accepté</button><button class="btn orange" onclick="makeInvoice('${q.id}')">Facture</button></div><div class="toolbar noPrint"><button class="btn ${q.status==='Payé'?'ghost':'green'}" onclick="markQuote('${q.id}','Payé')" ${q.status==='Payé'?'disabled':''}>${q.status==='Payé'?'Payé':'Marquer payé'}</button><button class="btn danger" onclick="deleteQuote('${q.id}')">Supprimer</button></div>`}
function pdfDocHTML(q){const oldDraft=state.draft;state.draft=q;const html=pdfPreviewHTML(false);state.draft=oldDraft;return html}
function clientsPage(){shell('Clients',`<h1 class="pageTitle">Clients</h1><button class="btn" onclick="openClientModal()">＋ Ajouter client</button><div class="list" style="margin-top:14px">${state.clients.map(c=>`<div class="item" onclick="openClientDetail('${c.id}')"><div><h4>${esc(c.name||'Client')}</h4><p>${esc(c.phone||'')} ${c.email?' · '+esc(c.email):''}</p></div><span>›</span></div>`).join('')||'<div class="empty">Aucun client enregistré.</div>'}</div>`)}
function trackPage(){shell('Suivi',`<h1 class="pageTitle">Suivi activité</h1><div class="toolbar"><button class="btn ghost" onclick="exportData()">Exporter</button><button class="btn ghost" onclick="document.getElementById('importFile').click()">Importer</button><input id="importFile" type="file" accept="application/json" class="hidden" onchange="importData(event)"></div><div class="list">${state.quotes.slice().reverse().map(quoteItem).join('')||'<div class="empty">Aucun devis généré.</div>'}</div>`)}
function profilePage(){const c=state.company;shell('Profil',`<h1 class="pageTitle">Profil</h1><p class="sub">Toutes ces informations sont optionnelles et modifiables.</p><div class="card" style="padding:14px"><div class="label">Métier principal</div><select class="field" id="tradeSelect">${Object.entries(trades).map(([k,v])=>`<option value="${k}" ${state.trade===k?'selected':''}>${v.label}</option>`).join('')}</select><div class="label">Entreprise</div><input class="field prof" data-k="name" placeholder="Nom entreprise" value="${esc(c.name)}"><input class="field prof" data-k="firstName" placeholder="Prénom" value="${esc(c.firstName)}" style="margin-top:9px"><input class="field prof" data-k="phone" placeholder="Téléphone" value="${esc(c.phone)}" style="margin-top:9px"><input class="field prof" data-k="email" placeholder="Email" value="${esc(c.email)}" style="margin-top:9px"><textarea class="field prof" data-k="address" placeholder="Adresse" style="margin-top:9px">${esc(c.address)}</textarea><input class="field prof" data-k="siret" placeholder="SIRET" value="${esc(c.siret)}" style="margin-top:9px"><input class="field prof" data-k="insurance" placeholder="Assurance décennale" value="${esc(c.insurance)}" style="margin-top:9px"><div class="label">Réglages devis</div><input class="field" id="vat" type="number" placeholder="TVA %" value="${state.settings.vat}"><input class="field" id="validity" type="number" placeholder="Validité jours" value="${state.settings.validity}" style="margin-top:9px"><textarea class="field" id="mentions" placeholder="Mentions de protection" style="margin-top:9px">${esc(state.settings.mentions)}</textarea><button class="btn" onclick="saveProfile()" style="margin-top:12px">Enregistrer</button></div><h3>Prestations du métier</h3><button class="btn ghost" onclick="openServiceModal(null,null,true)">＋ Ajouter une prestation au catalogue</button><div class="list" style="margin-top:10px">${state.servicesByTrade[state.trade].map(s=>`<div class="item"><div><h4>${esc(s.name)}</h4><p>${esc(s.category)} · ${money(s.price)} / ${esc(s.unit)}</p></div><button class="btn small ghost" onclick="openServiceModalById('${s.id}')">Modifier</button></div>`).join('')}</div>`);document.getElementById('tradeSelect').onchange=e=>{state.trade=e.target.value;save();render()};}
window.saveProfile=()=>{document.querySelectorAll('.prof').forEach(i=>state.company[i.dataset.k]=i.value);state.settings.vat=Number(document.getElementById('vat').value)||0;state.settings.validity=Number(document.getElementById('validity').value)||30;state.settings.mentions=document.getElementById('mentions').value;save();toast('Profil enregistré');render()};
function openServiceModal(item=null,index=null,toCatalog=false){const it=item||{name:'',qty:1,unit:'forfait',price:0,category:'PRESTATION'};modal(`<h3 class="modalTitle">${item?'Modifier':'Nouvelle'} prestation</h3><input class="field" id="mName" placeholder="Intitulé" value="${esc(it.name)}"><div class="grid2" style="margin-top:9px"><input class="field" id="mQty" type="number" step="1" placeholder="Qté" value="${it.qty||1}"><select class="field" id="mUnit"><option>forfait</option><option>u</option><option>m²</option><option>ml</option><option>lot</option><option>h</option><option>jour</option></select></div><input class="field" id="mPrice" type="number" step="0.01" placeholder="Prix HT" value="${it.price||0}" style="margin-top:9px"><input class="field" id="mCat" placeholder="Catégorie" value="${esc(it.category||'PRESTATION')}" style="margin-top:9px"><div class="toolbar"><button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn" id="saveService">Enregistrer</button></div>`);document.getElementById('mUnit').value=it.unit||'forfait';document.getElementById('saveService').onclick=()=>{const obj={id:it.id||uid(),name:val('mName')||'Prestation',qty:Number(val('mQty'))||1,unit:val('mUnit'),price:Number(val('mPrice'))||0,category:val('mCat')||'PRESTATION'};if(index!==null)state.draft.items[index]=obj;else if(toCatalog)state.servicesByTrade[state.trade].push(obj);else {ensureDraft();state.draft.items.push(obj);}save();closeModal();render()}}
window.openServiceModalById=id=>{const arr=state.servicesByTrade[state.trade],i=arr.findIndex(x=>x.id===id);openServiceModal(arr[i],null,true);setTimeout(()=>{document.getElementById('saveService').onclick=()=>{arr[i]={id,name:val('mName')||'Prestation',qty:Number(val('mQty'))||1,unit:val('mUnit'),price:Number(val('mPrice'))||0,category:val('mCat')||'PRESTATION'};save();closeModal();render()}},0)}
function val(id){return document.getElementById(id).value}
function modal(html){document.getElementById('modal')?.remove();document.body.insertAdjacentHTML('beforeend',`<div class="modal" id="modal"><div class="modalBox"><button onclick="closeModal()" style="float:right;background:#eef5ff;border-radius:10px;width:34px;height:34px;color:var(--primary);font-weight:900">✕</button>${html}</div></div>`);document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal()};document.onkeydown=e=>{if(e.key==='Escape')closeModal()}}window.closeModal=()=>{document.getElementById('modal')?.remove();document.onkeydown=null};
function openTradeModal(){modal(`<h3 class="modalTitle">Votre métier</h3><input id="customTradeName" class="field" placeholder="Ex : Serrurier, décorateur, coach..."><div class="toolbar"><button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn" onclick="addCustomTrade()">Utiliser ce métier</button></div>`);setTimeout(()=>document.getElementById('customTradeName')?.focus(),50)}
window.addCustomTrade=()=>{const name=val('customTradeName')||'Autre métier';trades.autre.label=name;state.trade='autre';closeModal();renderOnboarding()};
window.openQuickMenu=()=>modal(`<h3 class="modalTitle">Menu rapide</h3><button class="btn" onclick="closeModal();newQuote()">Nouveau devis</button><br><br><button class="btn ghost" onclick="closeModal();demoQuote()">Charger une démo</button><br><br><button class="btn danger" onclick="closeModal()">Fermer</button>`);window.openProfileModal=()=>{state.activeTab='profile';render()};
function openClientModal(clientId=null){const c=clientId?state.clients.find(x=>x.id===clientId):{name:'',phone:'',email:'',address:''};modal(`<h3 class="modalTitle">${clientId?'Modifier':'Ajouter'} client</h3><input class="field" id="clName" placeholder="Nom" value="${esc(c?.name||'')}"><input class="field" id="clPhone" placeholder="Téléphone" value="${esc(c?.phone||'')}" style="margin-top:9px"><input class="field" id="clEmail" placeholder="Email" value="${esc(c?.email||'')}" style="margin-top:9px"><textarea class="field" id="clAddr" placeholder="Adresse" style="margin-top:9px">${esc(c?.address||'')}</textarea><div class="toolbar"><button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn" onclick="saveClient('${clientId||''}')">Enregistrer</button></div>`)}window.openClientModal=openClientModal;window.saveClient=(id='')=>{const obj={id:id||uid(),name:val('clName'),phone:val('clPhone'),email:val('clEmail'),address:val('clAddr')};const i=state.clients.findIndex(c=>c.id===id);if(i>=0)state.clients[i]=obj;else state.clients.push(obj);save();closeModal();render()};window.openClientDetail=id=>{const c=state.clients.find(x=>x.id===id);if(!c)return;modal(`<h3 class="modalTitle">${esc(c.name||'Client')}</h3><p><b>Téléphone :</b> ${esc(c.phone||'-')}<br><b>Email :</b> ${esc(c.email||'-')}<br><b>Adresse :</b><br>${esc(c.address||'-')}</p><button class="btn" onclick="useClientInDraft('${id}')">Utiliser dans un devis</button><div class="toolbar"><button class="btn ghost" onclick="openClientModal('${id}')">Modifier</button><button class="btn danger" onclick="deleteClient('${id}')">Supprimer</button></div>`)};window.useClientInDraft=id=>{const c=state.clients.find(x=>x.id===id);ensureDraft();state.draft.client={name:c.name||'',phone:c.phone||'',email:c.email||'',address:c.address||''};state.draft.step=1;state.activeTab='quote';closeModal();render()};window.deleteClient=id=>{if(confirm('Supprimer ce client ?')){state.clients=state.clients.filter(c=>c.id!==id);save();closeModal();render()}};
function demoQuote(){state.draft=blankDraft();state.draft.client={name:'Dupont',phone:'06 12 34 56 78',email:'dupont@email.fr',address:'123 Rue des Lilas, 75000 Paris'};state.draft.items=catalogue(state.trade).slice(0,6);state.draft.step=3;state.activeTab='quote';render()}window.demoQuote=demoQuote;
function jsPdfQuote(q){const {jsPDF}=window.jspdf;const doc=new jsPDF('p','mm','a4');const t=trades[q.trade]||theme(),c=state.company;let y=14;doc.setTextColor(11,31,68);doc.setFont('helvetica','bold');doc.setFontSize(18);doc.text(c.name||'VOTRE ENTREPRISE',28,y+5);doc.setTextColor(t.primary);doc.setFontSize(11);doc.text((t.subtitle||'Service professionnel').toUpperCase(),28,y+11);doc.setDrawColor(t.primary);doc.setLineWidth(.8);doc.roundedRect(10,y,14,14,2,2);doc.setTextColor(t.accent);doc.setFontSize(12);doc.text(t.icon==='•••'?'•':t.icon,14,y+9);doc.setTextColor(30,45,70);doc.setFont('helvetica','normal');doc.setFontSize(9);let info=[c.address,c.phone,c.email,c.siret?'SIRET : '+c.siret:'',c.insurance?'Assurance : '+c.insurance:''].filter(Boolean);info.forEach((l,i)=>doc.text(String(l),28,y+18+i*5));doc.setFillColor(hex(t.primary));doc.roundedRect(138,10,62,13,2,2,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(18);doc.text(q.type==='facture'?'FACTURE':'DEVIS',169,19,{align:'center'});doc.setTextColor(11,31,68);doc.setFontSize(9);doc.roundedRect(138,28,62,31,2,2);[['N° :',q.number],['Date :',new Date(q.date).toLocaleDateString('fr-FR')],['Validité :',q.validity+' jours'],['Client :',q.client.name||'-'],['Téléphone :',q.client.phone||'-']].forEach((r,i)=>{doc.setFont('helvetica','bold');doc.text(r[0],143,36+i*5);doc.setFont('helvetica','normal');doc.text(String(r[1]),166,36+i*5)});y=70;doc.setFillColor(hex(t.primary));doc.roundedRect(10,y,190,9,2,2,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text((q.title||t.hero).toUpperCase(),13,y+6);y+=14;doc.setTextColor(11,31,68);doc.setFontSize(10);doc.text('Type de travaux :',18,y);doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text(doc.splitTextToSize(q.description||'Prestation réalisée selon les éléments fournis par le client.',160),18,y+6);y+=22;doc.setFont('helvetica','bold');doc.setFillColor(hex(t.primary));doc.setTextColor(255,255,255);doc.rect(10,y,100,8,'F');doc.rect(110,y,25,8,'F');doc.rect(135,y,30,8,'F');doc.rect(165,y,35,8,'F');doc.text('DÉSIGNATION',60,y+5,{align:'center'});doc.text('QTÉ',122,y+5,{align:'center'});doc.text('PU HT',150,y+5,{align:'center'});doc.text('TOTAL HT',183,y+5,{align:'center'});y+=8;const cats={};q.items.forEach(it=>(cats[it.category||'PRESTATIONS']??=[]).push(it));doc.setFontSize(8);Object.entries(cats).forEach(([cat,arr])=>{if(y>250){doc.addPage();y=15}doc.setFillColor(239,244,250);doc.setTextColor(11,31,68);doc.setFont('helvetica','bold');doc.rect(10,y,190,7,'F');doc.text(cat,13,y+5);y+=7;doc.setFont('helvetica','normal');arr.forEach(it=>{if(y>260){doc.addPage();y=15}doc.setDrawColor(200,213,230);doc.rect(10,y,100,7);doc.rect(110,y,25,7);doc.rect(135,y,30,7);doc.rect(165,y,35,7);doc.setTextColor(20,30,45);doc.text(String(it.name).slice(0,58),13,y+5);doc.text(String(it.qty),122,y+5,{align:'center'});doc.text(money(it.price).replace('€','€'),160,y+5,{align:'right'});doc.text(money(it.qty*it.price).replace('€','€'),196,y+5,{align:'right'});y+=7})});const tt={ht:q.totalHT,tva:q.totalTVA,ttc:q.totalTTC};y+=3;[['TOTAL HT',tt.ht,false],['TVA '+state.settings.vat+' %',tt.tva,false],['TOTAL TTC',tt.ttc,true]].forEach(r=>{doc.setFillColor(r[2]?hex(t.accent):hex(t.primary));doc.setTextColor(255,255,255);doc.rect(122,y,43,8,'F');doc.text(r[0],125,y+5);doc.setTextColor(11,31,68);doc.rect(165,y,35,8);doc.text(money(r[1]),197,y+5,{align:'right'});y+=8});y+=10;if(y<245){doc.setDrawColor(180,199,225);doc.roundedRect(10,y,85,35,2,2);doc.setTextColor(11,31,68);doc.setFont('helvetica','bold');doc.text('OBSERVATIONS',15,y+8);doc.setFont('helvetica','normal');doc.text(doc.splitTextToSize(q.observations||'Travaux réalisés selon validation client. Contrôle et mise en service inclus selon prestation.',74),15,y+15);doc.setDrawColor(235,172,80);doc.roundedRect(105,y,95,35,2,2);doc.setFont('helvetica','bold');doc.text('MENTIONS DE PROTECTION',110,y+8);doc.setFont('helvetica','normal');doc.text(doc.splitTextToSize(state.settings.mentions,84),110,y+15)}doc.setFont('helvetica','italic');doc.setTextColor(t.primary);doc.text('Merci pour votre confiance !',105,286,{align:'center'});return doc}
function hex(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]}
window.downloadDraftPdf=()=>{if(!window.jspdf){alert('Génération PDF indisponible. Vérifiez votre connexion internet.');return}ensureDraft();state.draft.items=state.draft.items.map(it=>({...it,qty:Math.max(1,Number(it.qty)||1)}));const tt=totals(state.draft);const q={...state.draft,trade:state.trade,totalHT:tt.ht,totalTVA:tt.tva,totalTTC:tt.ttc};jsPdfQuote(q).save((q.number||'devis')+'.pdf')};window.downloadPdf=id=>{if(!window.jspdf){alert('Génération PDF indisponible. Vérifiez votre connexion internet.');return}const q=state.quotes.find(x=>x.id===id);if(q)jsPdfQuote(q).save(q.number+'.pdf');else alert('Aucun document disponible.')};
window.shareQuote=async id=>{const q=state.quotes.find(x=>x.id===id);if(!q)return;const text=`Bonjour, voici le ${q.type||'devis'} ${q.number} d'un montant de ${money(q.totalTTC)} TTC.`;try{const blob=jsPdfQuote(q).output('blob');const file=new File([blob],q.number+'.pdf',{type:'application/pdf'});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({title:q.number,text,files:[file]});return}}catch(e){}window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank')};
window.emailQuote=id=>{const q=state.quotes.find(x=>x.id===id);if(q){try{downloadPdf(id);toast('PDF téléchargé : joignez-le au mail si besoin.')}catch(e){}location.href=`mailto:${q.client.email||''}?subject=${encodeURIComponent(q.number)}&body=${encodeURIComponent('Bonjour, vous trouverez ci-joint le document '+q.number+' d’un montant de '+money(q.totalTTC)+' TTC. Si la pièce jointe ne s’ajoute pas automatiquement, merci de joindre le PDF téléchargé.')}`}};
window.markQuote=(id,status)=>{const q=state.quotes.find(x=>x.id===id);if(q)q.status=status;save();openQuote(id)};window.makeInvoice=id=>{const q=state.quotes.find(x=>x.id===id);if(!q)return;if(q.type==='facture'){openQuote(id);return}q.status='Facturé';const f={...JSON.parse(JSON.stringify(q)),id:uid(),number:q.number.replace('DEV','FAC'),type:'facture',status:'Facturé',date:today()};state.quotes.push(f);save();openQuote(f.id)};window.deleteQuote=id=>{if(confirm('Supprimer ce document ?')){state.quotes=state.quotes.filter(q=>q.id!==id);save();state.activeTab='track';render()}};window.resetDraftConfirm=()=>{if(confirm('Effacer le devis en cours et repartir à zéro ?')){state.draft=blankDraft();save();render()}};
window.exportData=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='devisexpress-sauvegarde.json';a.click()};window.importData=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();render()}catch(err){alert('Fichier invalide')}};r.readAsText(f)};
function toast(msg){const d=document.createElement('div');d.textContent=msg;d.style.cssText='position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:#0b1f44;color:#fff;padding:10px 14px;border-radius:999px;z-index:999;font-weight:800';document.body.appendChild(d);setTimeout(()=>d.remove(),1600)}
