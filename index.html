<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0D47A1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="DevisExpress"/>
<title>DevisExpress V4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --primary:#0D47A1;--secondary:#1565C0;--accent:#F57C00;--success:#2E7D32;
  --text:#0b1f44;--muted:#607D8B;--bg:#f5f7fa;--card:#ffffff;--line:#d9e2ef;
  --soft:#eef5ff;--danger:#d32f2f;--shadow:0 18px 45px rgba(13,71,161,.14);
  --radius:18px;--bottom:78px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top,#fff 0,#f3f7ff 42%,#eef3fb 100%)}
body{overflow-x:hidden}
.hidden{display:none!important}
.app{max-width:480px;margin:0 auto;min-height:100dvh;background:#fff;position:relative;box-shadow:0 0 0 1px rgba(13,71,161,.08)}
@media(min-width:760px){.app{margin:20px auto;border-radius:28px;min-height:860px;overflow:hidden}}
button,input,textarea,select{font:inherit}
button{border:0;cursor:pointer}
.btn{width:100%;min-height:52px;border-radius:14px;background:linear-gradient(135deg,var(--secondary),var(--primary));color:#fff;font-weight:800;box-shadow:0 10px 24px rgba(13,71,161,.22);display:inline-flex;align-items:center;justify-content:center;padding:0 16px}
.btn.orange{background:linear-gradient(135deg,#ffa51a,var(--accent));color:#07172e}
.btn.ghost{background:#fff;color:var(--primary);border:1px solid #b8cef2;box-shadow:none}
.btn.danger{background:#fff;color:var(--danger);border:1px solid #ffc3c3;box-shadow:none}
.btn.small{min-height:36px;border-radius:11px;font-size:13px}
.btn.success{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff}
.field{width:100%;min-height:48px;border:1px solid var(--line);border-radius:13px;padding:12px 14px;background:#fff;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.field:focus{border-color:var(--secondary);box-shadow:0 0 0 4px rgba(21,101,192,.08)}
textarea.field{min-height:88px;resize:vertical}
.label{font-size:12px;font-weight:900;color:var(--primary);text-transform:uppercase;letter-spacing:.04em;margin:12px 0 7px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 8px 25px rgba(13,71,161,.08)}

/* ── Onboarding ── */
.onboarding{min-height:100dvh;padding-bottom:32px;background:#fff}
.hero{background:linear-gradient(135deg,#062b67,#0D47A1 55%,#073270);color:#fff;padding:34px 24px 28px;border-bottom-left-radius:26px;border-bottom-right-radius:26px;position:relative;overflow:hidden}
.hero:after{content:"";position:absolute;right:-30px;top:25px;width:135px;height:180px;background:rgba(255,255,255,.12);border-radius:28px;transform:rotate(11deg)}
.logoRow{display:flex;gap:14px;align-items:center;position:relative;z-index:1}
.appLogo{width:64px;height:64px;border-radius:17px;background:#fff;display:grid;place-items:center;box-shadow:0 12px 24px rgba(0,0,0,.18);font-size:34px;flex-shrink:0}
.brand{font-size:32px;font-weight:950;letter-spacing:-.04em}
.brand span{color:var(--accent)}
.tag{margin:6px 0 18px;color:#d7e7ff;line-height:1.45}
.trust{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative;z-index:1}
.trust div{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);border-radius:13px;padding:9px;font-size:11px;font-weight:800;text-align:center}
.panel{margin:0 14px;margin-top:-10px;background:#fff;border-radius:24px;padding:20px 14px;position:relative;z-index:2;box-shadow:var(--shadow)}
.sectionTitle{display:flex;gap:10px;align-items:center;margin:8px 0 4px;font-size:18px;font-weight:950}
.sectionTitle .ico{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;background:#e8f1ff;color:var(--primary);flex-shrink:0}
.sub{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.4}
.tradeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tradeCard{min-height:100px;border:1.5px solid var(--line);border-radius:15px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-weight:900;font-size:12px;position:relative;padding:8px 4px;transition:all .15s;text-align:center}
.tradeCard:active{transform:scale(.96)}
.tradeCard .emoji{font-size:28px}
.tradeCard.active{border:2px solid var(--secondary);background:linear-gradient(180deg,#fff,#f0f6ff)}
.tradeCard.active:after{content:"✓";position:absolute;right:-6px;bottom:-6px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:var(--secondary);color:#fff;border:2px solid #fff;font-weight:950;font-size:11px}
.moreTrade{margin:14px 0;border:1.5px dashed #9db9e9;color:var(--primary);background:#fff;border-radius:13px;height:44px;font-weight:900;width:100%}
.infoBox{border:1px solid #b9d2ff;background:#f1f7ff;border-radius:13px;padding:12px 14px;margin:12px 0;color:var(--primary);font-size:13px}
.footerLock{text-align:center;color:#7b8da6;font-size:12px;margin:12px 0}
.optionalInputs{display:grid;gap:9px}

/* How it works - mobile compact */
.howSection{margin:18px 14px 0;padding:16px;background:#fff;border-radius:18px;border:1px solid var(--line);box-shadow:0 4px 16px rgba(13,71,161,.06)}
.howSection h3{font-size:16px;font-weight:950;margin:0 0 12px;color:var(--primary)}
.howSteps{display:grid;gap:8px}
.howStep{display:flex;gap:10px;align-items:center;padding:10px;border-radius:12px;background:#f8fbff}
.howNum{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:900;display:grid;place-items:center;flex-shrink:0}

/* ── App shell ── */
.topbar{height:60px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;position:sticky;top:0;z-index:10}
.topbar b{font-size:16px;font-weight:900}
.iconBtn{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.14);color:#fff;font-size:18px;display:grid;place-items:center}
.content{padding:14px 14px calc(var(--bottom) + 22px);min-height:calc(100dvh - 60px);background:#f6f8fc}
.bottomNav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:480px;height:calc(64px + env(safe-area-inset-bottom));padding:6px 8px env(safe-area-inset-bottom);background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);z-index:20}
.navItem{background:transparent;color:#789;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;font-weight:800;border-radius:11px}
.navItem.active{background:#edf5ff;color:var(--primary)}
.navItem span{font-size:19px}

/* ── Dashboard ── */
.dashGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{padding:14px;color:#fff;border-radius:16px;min-height:88px;box-shadow:0 10px 20px rgba(0,0,0,.1)}
.stat b{display:block;font-size:24px;margin-top:6px}
.stat.blue{background:linear-gradient(135deg,#1565C0,#0D47A1)}
.stat.green{background:linear-gradient(135deg,#22c55e,#15803d)}
.stat.orange{background:linear-gradient(135deg,#fb923c,#f57c00)}
.stat.purple{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.list{display:grid;gap:10px}
.item{padding:13px;border:1px solid var(--line);border-radius:15px;background:#fff;display:flex;justify-content:space-between;gap:10px;align-items:center}
.item h4{margin:0 0 3px;font-size:14px}
.item p{margin:0;color:var(--muted);font-size:12px}
.badge{padding:4px 9px;border-radius:999px;font-size:11px;font-weight:900;background:#eef5ff;color:var(--primary);white-space:nowrap}
.badge.ok{background:#e8f8ee;color:#15803d}
.badge.wait{background:#fff5e7;color:#c05b00}
.badge.paid{background:#e8f8ee;color:#15803d}
.badge.inv{background:#ffe8f0;color:#b5195a}
.badge.draft{background:#f0f0f0;color:#555}

/* ── Quote builder ── */
.pageTitle{font-size:24px;font-weight:950;margin:0 0 4px;letter-spacing:-.03em}
.toolbar{display:flex;gap:8px;margin:12px 0}
.toolbar .btn{flex:1}
.stepper{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0 14px}
.step{height:30px;border-radius:999px;background:#e9edf5;color:#789;display:grid;place-items:center;font-size:12px;font-weight:900;transition:all .2s}
.step.active{background:var(--primary);color:#fff}
.step.done{background:#e8f8ee;color:#15803d}
.serviceRow{padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:9px}
.serviceTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.serviceName{font-weight:950;font-size:14px}
.servicePrice{font-weight:950;color:var(--primary);white-space:nowrap}
.qtyBox{display:flex;align-items:center;gap:8px;margin-top:8px}
.qtyBtn{width:32px;height:32px;border-radius:9px;background:#eef5ff;color:var(--primary);font-size:18px;font-weight:950;display:grid;place-items:center}
.qtyVal{min-width:32px;text-align:center;font-weight:950;font-size:15px}
.inlineActions{display:flex;gap:6px;margin-top:8px}
.inlineActions button{flex:1;height:32px;border-radius:9px;background:#f7f9fc;color:var(--primary);font-size:12px;font-weight:800;border:1px solid var(--line)}
.inlineActions button.red{color:var(--danger);border-color:#ffc3c3}

/* Totals - NO sticky, natural flow */
.totalBox{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:12px;margin-top:16px;margin-bottom:4px}
.totalLine{display:flex;justify-content:space-between;padding:6px 0;font-weight:900;border-bottom:1px solid #f0f4fb}
.totalLine:last-child{border-bottom:none}
.totalLine.ttc{background:var(--primary);color:#fff;margin:8px -12px -12px;padding:12px 14px;border-bottom-left-radius:18px;border-bottom-right-radius:18px;font-size:17px;border-bottom:none}

/* PDF preview */
.pdfPreview{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 8px 22px rgba(13,71,161,.08);font-size:12px}
.pdfHead{display:flex;justify-content:space-between;border-bottom:2px solid var(--primary);padding-bottom:8px;margin-bottom:10px;gap:8px}
.pdfLogo{width:44px;height:44px;border:2px solid var(--primary);border-radius:10px;display:grid;place-items:center;font-size:22px;color:var(--accent);flex-shrink:0}
.pdfTitle{background:var(--primary);color:#fff;border-radius:8px;padding:6px 14px;font-size:16px;font-weight:950;white-space:nowrap;align-self:flex-start}
.miniTable{width:100%;border-collapse:collapse;margin:10px 0 6px}
.miniTable th{background:var(--primary);color:#fff}
.miniTable th,.miniTable td{border:1px solid #c9d5e6;padding:6px 7px;text-align:left;font-size:11px}
.miniTable td:nth-child(n+2),.miniTable th:nth-child(n+2){text-align:right}
.catRow td{background:#eef3f8!important;color:var(--primary);font-weight:950;text-align:left!important}
.mentionsPreview{background:#f8fbff;border:1px solid #d0e0f8;border-radius:10px;padding:8px;margin-top:8px;font-size:10px;color:#445;line-height:1.4}

/* ── Modals ── */
.modal{position:fixed;inset:0;background:rgba(2,10,27,.5);z-index:80;display:flex;align-items:flex-end;justify-content:center;padding:14px;animation:fadeIn .18s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modalBox{width:100%;max-width:480px;background:#fff;border-radius:24px 24px 18px 18px;padding:20px 18px 18px;box-shadow:0 25px 60px rgba(0,0,0,.25);max-height:88dvh;overflow-y:auto;animation:slideUp .22s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modalHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modalTitle{font-size:19px;font-weight:950;margin:0}
.modalClose{width:32px;height:32px;border-radius:50%;background:#f2f4f8;color:#556;font-size:16px;display:grid;place-items:center;flex-shrink:0}

/* Misc */
.empty{padding:24px 14px;text-align:center;color:var(--muted);font-size:14px}
.successView{text-align:center;padding:30px 8px}
.check{width:88px;height:88px;border-radius:50%;border:3px solid #20a34a;color:#20a34a;display:grid;place-items:center;font-size:46px;margin:12px auto}
.filterRow{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.filterChip{padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;transition:all .15s}
.filterChip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.clientDetail{border:1px solid var(--line);border-radius:14px;overflow:hidden}
.clientDetailRow{padding:11px 13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-size:13px}
.clientDetailRow:last-child{border-bottom:none}

@media(max-width:360px){.tradeGrid{grid-template-columns:repeat(2,1fr)}.brand{font-size:26px}.hero{padding:28px 16px 22px}.panel{margin:0 8px;margin-top:-10px}.content{padding-left:10px;padding-right:10px}}
@media(min-width:760px){.onboarding{padding:20px}.panel{padding:24px 26px}.tradeGrid{grid-template-columns:repeat(4,1fr)}.optionalInputs{grid-template-columns:1fr 1fr}.optionalInputs .wide{grid-column:1/-1}.howSection{display:none}}
@media(print){.topbar,.bottomNav,.noPrint{display:none!important}.app{box-shadow:none;max-width:none}.content{padding:0;background:#fff}.pdfPreview{border:0;box-shadow:none}}

/* ── Ultra-premium Dashboard ── */
.dashContent{padding:0;background:#f0f4fb;min-height:calc(100dvh - 60px);}
.heroCard{background:linear-gradient(135deg,var(--primary) 0%,#061a42 100%);border-radius:0 0 32px 32px;padding:22px 20px 28px;color:#fff;position:relative;overflow:hidden;margin-bottom:-2px}
.heroCard::before{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.heroCard::after{content:'';position:absolute;right:20px;bottom:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
.heroGreet{font-size:13px;opacity:.8;font-weight:600;margin:0 0 2px;letter-spacing:.04em;text-transform:uppercase}
.heroName{font-size:24px;font-weight:950;margin:0 0 18px;letter-spacing:-.02em}
.heroCA{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(8px)}
.heroCALabel{font-size:11px;opacity:.75;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.heroCAValue{font-size:28px;font-weight:950;letter-spacing:-.03em;color:#fff}
.heroCABadge{background:var(--accent);color:#07172e;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:900}
.statStrip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:20px 16px 0}
.statChip{background:#fff;border-radius:16px;padding:14px 10px 12px;border:1px solid rgba(13,71,161,.08);box-shadow:0 2px 12px rgba(13,71,161,.07);text-align:center;transition:transform .15s}
.statChip:active{transform:scale(.97)}
.statChip .scNum{font-size:26px;font-weight:950;color:var(--primary);display:block;line-height:1}
.statChip .scLabel{font-size:11px;color:var(--muted);font-weight:700;margin-top:5px;display:block}
.statChip .scDot{width:6px;height:6px;border-radius:50%;margin:0 auto 6px;background:var(--muted)}
.statChip.wait .scDot{background:#f57c00}
.statChip.wait .scNum{color:#e65100}
.statChip.ok .scDot{background:#2e7d32}
.statChip.ok .scNum{color:#1b5e20}
.statChip.paid .scDot{background:#1565c0}
.statChip.paid .scNum{color:var(--primary)}
.dashActions{padding:16px 16px 0;display:grid;gap:8px}
.dashSection{padding:16px 16px 0}
.dashSectionTitle{font-size:13px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 10px;display:flex;justify-content:space-between;align-items:center}
.dashSectionTitle a{font-size:12px;color:var(--primary);font-weight:800;text-decoration:none;cursor:pointer}
.quoteCard{background:#fff;border-radius:16px;border:1px solid rgba(13,71,161,.08);padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(13,71,161,.05);cursor:pointer;transition:transform .12s,box-shadow .12s}
.quoteCard:active{transform:scale(.98);box-shadow:0 1px 4px rgba(13,71,161,.08)}
.qcLeft{flex:1;min-width:0}
.qcNum{font-size:14px;font-weight:900;color:var(--text);margin:0 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qcSub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qcRight{text-align:right;flex-shrink:0}
.qcAmount{font-size:15px;font-weight:950;color:var(--text)}
.emptyDash{background:#fff;border-radius:18px;padding:32px 20px;text-align:center;color:var(--muted);margin-top:4px}
.emptyDash .emptyIcon{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
'use strict';

/* ══════════════════════════════
   UTILS
══════════════════════════════ */
const LS='devisexpress_v4_state';
const money=n=>Number(n||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR'});
const pdfMoney=n=>{const v=Number(n||0);return v.toFixed(2).replace('.',',')+' EUR'};
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,9).toUpperCase();
const esc=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
function setPath(o,path,val){const p=path.split('.');let x=o;while(p.length>1){if(x[p[0]]===undefined)x[p[0]]={};x=x[p.shift()]}x[p[0]]=val}
function val(id){const el=document.getElementById(id);return el?el.value:''}

/* ══════════════════════════════
   DATA
══════════════════════════════ */
const colorThemes={
 bleu:      {primary:'#0D47A1',accent:'#F57C00',name:'🔵 Bleu professionnel'},
 marine:    {primary:'#0A2342',accent:'#F57C00',name:'🌊 Marine & orange'},
 vert:      {primary:'#1B5E20',accent:'#FF8F00',name:'🟢 Vert entreprise'},
 indigo:    {primary:'#283593',accent:'#00ACC1',name:'💙 Indigo & cyan'},
 bordeaux:  {primary:'#6A1B4D',accent:'#F57C00',name:'🍷 Bordeaux & orange'},
 teal:      {primary:'#00695C',accent:'#FFB300',name:'🩵 Teal & or'},
};
const trades={
 plombier:   {label:'Plombier',icon:'🚰',subtitle:'Plomberie',      primary:'#0D47A1',accent:'#F57C00'},
 electricien:{label:'Électricien',icon:'⚡',subtitle:'Électricité', primary:'#0D47A1',accent:'#F57C00'},
 peintre:    {label:'Peintre',icon:'🖌️',subtitle:'Peinture',       primary:'#1A237E',accent:'#F57C00'},
 menuisier:  {label:'Menuisier',icon:'🪵',subtitle:'Menuiserie',    primary:'#4E342E',accent:'#FF8F00'},
 macon:      {label:'Maçon',icon:'🧱',subtitle:'Maçonnerie',        primary:'#1B5E20',accent:'#F57C00'},
 carreleur:  {label:'Carreleur',icon:'🏠',subtitle:'Carrelage',     primary:'#006064',accent:'#FF8F00'},
 clim:       {label:'Climatisation',icon:'❄️',subtitle:'Climatisation',primary:'#01579B',accent:'#00ACC1'},
 paysagiste: {label:'Paysagiste',icon:'🌿',subtitle:'Paysagisme',   primary:'#1B5E20',accent:'#FF8F00'},
 nettoyage:  {label:'Nettoyage',icon:'🧴',subtitle:'Nettoyage',     primary:'#0D47A1',accent:'#2E7D32'},
 web:        {label:'Créa. web',icon:'💻',subtitle:'Service digital',primary:'#0A2342',accent:'#1565C0'},
 autre:      {label:'Autre métier',icon:'🔧',subtitle:'Service pro', primary:'#0D47A1',accent:'#F57C00'}
};

 }
 return theme();
}

function modal(html){
  closeModal();
  const el=document.createElement('div');
  el.className='modal';el.id='modal';
  el.innerHTML=`<div class="modalBox" id="modalBox">${html}</div>`;
  document.body.appendChild(el);
  el.onclick=e=>{if(e.target===el)closeModal()};
  const esc=e=>{if(e.key==='Escape'){closeModal();document.removeEventListener('keydown',esc)}};
  document.addEventListener('keydown',esc);
}
function modalWithHeader(title,body){
  modal(`<div class="modalHeader"><h3 class="modalTitle">${esc(title)}</h3><button class="modalClose" onclick="closeModal()">✕</button></div>${body}`);
}

function quoteCard(q){

 const bc=badgeColors[badgeCls]||badgeColors.wait;
 return `<div class="quoteCard" onclick="openQuote('${q.id}')">
  <div class="qcLeft">
   <div class="qcNum">${esc(q.number)} ${q.type==='facture'?'<span style="font-size:10px;background:#ffe8f0;color:#b5195a;padding:2px 6px;border-radius:999px;font-weight:900">FACTURE</span>':''}</div>

   <span style="display:inline-block;margin-top:4px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:900;background:${bc}">${q.status}</span>
  </div>
 </div>`
}

function catalogueListHTML(catalogue){

 return catalogue.map(s=>`
  <div class="item">
   <div style="flex:1;min-width:0"><h4>${esc(s.name)}</h4><p>${esc(s.category)} · ${money(s.price)} / ${esc(s.unit)}</p></div>

}

function selectedItemHTML(it,i){return `
 <div class="serviceRow">
  <div class="serviceTop">
   <div style="flex:1;min-width:0"><div class="serviceName">${esc(it.name)}</div><p style="margin:3px 0 0;color:#789;font-size:12px">${esc(it.category||'')} · ${esc(it.unit)}</p></div>
   <div class="servicePrice">${money(it.qty*it.price)}</div>
  </div>
  <div class="qtyBox">
   <button class="qtyBtn" onclick="changeQty(${i},-1)">−</button>
   <span class="qtyVal">${it.qty}</span>
   <button class="qtyBtn" onclick="changeQty(${i},1)">＋</button>
   <span style="color:#789;font-size:12px;margin-left:4px">${money(it.price)} / ${esc(it.unit)}</span>
  </div>
  <div class="inlineActions">
   <button onclick="editSelected(${i})">✏️ Modifier</button>
   <button onclick="duplicateSelected(${i})">📋 Dupliquer</button>
   <button class="red" onclick="removeSelected(${i})">🗑 Supprimer</button>
  </div>
 </div>`
}

function totals(d){
 const ht=(d.items||[]).reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.price)||0),0);
 const tva=ht*(Number(state.settings.vat)||0)/100;
 return {ht,tva,ttc:ht+tva};
}
function totalsHTML(d){
 const t=totals(d);
 return `<div class="totalBox">
  <div class="totalLine"><span>Total HT</span><b>${money(t.ht)}</b></div>
  <div class="totalLine"><span>TVA ${state.settings.vat}%</span><b>${money(t.tva)}</b></div>
  <div class="totalLine ttc"><span>Total TTC</span><b>${money(t.ttc)}</b></div>
 </div>`;
}

function bindQuote(){
 document.querySelectorAll('.draft').forEach(el=>el.oninput=e=>{setPath(state.draft,el.dataset.path,e.target.value);saveState()});
 const cs=document.getElementById('clientSelect');
 if(cs)cs.onchange=e=>{const c=state.clients.find(x=>x.id===e.target.value);if(c){state.draft.client={...c};saveState();render()}};
 const ss=document.getElementById('serviceSearch');
 if(ss)ss.oninput=e=>{
  const q=e.target.value.toLowerCase();
  const activeTrade=state.draft._filterTrade||state.trade;
  const list=state.servicesByTrade[activeTrade]||[];
  const filtered=q?list.filter(x=>x.name.toLowerCase().includes(q)||x.category.toLowerCase().includes(q)):list;
  document.getElementById('catalogueList').innerHTML=catalogueListHTML(filtered)||(q?'<div class="empty">Aucun résultat.</div>':'');
 };
}

function createQuoteFromDraft(){
 const d=state.draft;
 const t=totals(d);
 const q={...JSON.parse(JSON.stringify(d)),id:uid(),date:d.date||today(),status:'En attente',type:'devis',trade:state.trade,totalHT:t.ht,totalTVA:t.tva,totalTTC:t.ttc};
 delete q._filterTrade;
 state.quotes.push(q);
 if(q.client.name&&!state.clients.some(c=>c.name.toLowerCase()===q.client.name.toLowerCase())){
  state.clients.push({id:uid(),name:q.client.name,phone:q.client.phone,email:q.client.email,address:q.client.address});
 }
 state.draft=null;
 saveState();
 return q;
}
window.finalizeQuote=()=>{
 const d=state.draft;
 if(!d.items.length){toast('⚠️ Ajoutez au moins une prestation');return}
 if(d._editingId){
  // Update existing quote
  const idx=state.quotes.findIndex(x=>x.id===d._editingId);
  if(idx>=0){
   const t=totals(d);
   const updated={...state.quotes[idx],...JSON.parse(JSON.stringify(d)),
    totalHT:t.ht,totalTVA:t.tva,totalTTC:t.ttc,trade:state.trade};
   delete updated._editingId;
   state.quotes[idx]=updated;
   state.draft=null;
   saveState();
   toast('✅ Devis mis à jour');
   openQuote(updated.id);
   return;
  }
 }
 const q=createQuoteFromDraft();
 successPage(q);
};
function successPage(q){
 shell('Devis généré',`
  <div class="successView">
   <div class="check">✓</div>
   <h2>Devis créé !</h2>
   <p style="color:#789">${q.number} · ${money(q.totalTTC)} TTC</p>
   <div style="display:grid;gap:10px;margin-top:16px;text-align:left;max-width:340px;margin-inline:auto">
    <button class="btn" onclick="openQuote('${q.id}')">📄 Voir le devis</button>
    <button class="btn ghost" onclick="downloadPdf('${q.id}')">⬇ Télécharger PDF</button>
    <button class="btn ghost" onclick="shareQuote('${q.id}')">📤 Partager (WhatsApp / autre)</button>
    <button class="btn ghost" onclick="emailQuote('${q.id}')">✉️ Envoyer par email</button>
    <button class="btn ghost" onclick="markQuote('${q.id}','Accepté');openQuote('${q.id}')">✅ Marquer accepté</button>
    <button class="btn danger" onclick="newQuote()">＋ Nouveau devis</button>
   </div>
  </div>
 `);
}

}

 saveState();applyTheme();
 // Re-render just the color buttons
 const btns=document.querySelectorAll('[onclick^="setColorTheme"]');
 btns.forEach(b=>{
  const bk=b.getAttribute('onclick').replace("setColorTheme('","").replace("')","");
  if(bk==='' && k===''){b.style.border='3px solid #0D47A1';}
  else if(bk===k){const ct=colorThemes[k];b.style.border='3px solid '+ct.primary;}
  else{b.style.border='3px solid transparent';}
 });
};
window.saveProfile=()=>{
 document.querySelectorAll('.prof').forEach(i=>state.company[i.dataset.k]=i.value);
 state.settings.vat=Number(val('vat'))||0;
 state.settings.validity=Number(val('validity'))||30;
 state.settings.mentions=val('mentions');
 const customLabel=val('customTradeLabel');
 if(state.trade==='autre'&&customLabel.trim()){trades.autre.label=customLabel.trim();trades.autre.subtitle=customLabel.trim();}
 saveState();toast('✅ Profil enregistré');render();
};

function openServiceModal(item=null,index=null,toCatalog=false){
 const it=item||{name:'',qty:1,unit:'forfait',price:0,category:'PRESTATION'};
 const units=['forfait','u','m²','ml','lot','h','jour','semaine'];
 modalWithHeader(item?'Modifier la prestation':'Nouvelle prestation',`
  <input class="field" id="mName" placeholder="Intitulé de la prestation" value="${esc(it.name)}">
  <div class="grid2" style="margin-top:9px">
   <div>
    <div class="label" style="margin-top:0">Quantité</div>
    <input class="field" id="mQty" type="number" min="1" step="1" placeholder="Qté" value="${it.qty||1}">
   </div>
   <div>
    <div class="label" style="margin-top:0">Unité</div>
    <select class="field" id="mUnit">${units.map(u=>`<option${it.unit===u?' selected':''}>${u}</option>`).join('')}</select>
   </div>
  </div>
  <div class="label">Prix unitaire HT (€)</div>
  <input class="field" id="mPrice" type="number" step="0.01" placeholder="0.00" value="${it.price||0}">
  <div class="label">Catégorie</div>
  <input class="field" id="mCat" placeholder="Ex : MAIN D'ŒUVRE" value="${esc(it.category||'PRESTATION')}">
  <div class="toolbar" style="margin-top:14px">
   <button class="btn ghost" onclick="closeModal()">Annuler</button>
   <button class="btn" id="saveService">Enregistrer</button>
  </div>
 `);
 document.getElementById('saveService').onclick=()=>{
  const obj={id:it.id||uid(),name:val('mName')||'Prestation',qty:Math.max(1,Number(val('mQty'))||1),unit:val('mUnit'),price:Number(val('mPrice'))||0,category:val('mCat')||'PRESTATION'};
  if(index!==null&&state.draft){state.draft.items[index]=obj}
  else if(toCatalog){state.servicesByTrade[state.trade].push(obj)}
  else if(state.draft){state.draft.items.push(obj)}
  saveState();closeModal();render();
 };
}
window.openServiceModal=openServiceModal;
window.openServiceModalById=id=>{
 const arr=state.servicesByTrade[state.trade];
 const i=arr.findIndex(x=>x.id===id);
 if(i<0)return;
 openServiceModal(arr[i],null,true);
 setTimeout(()=>{
  const btn=document.getElementById('saveService');
  if(btn)btn.onclick=()=>{
   arr[i]={id,name:val('mName')||'Prestation',qty:Math.max(1,Number(val('mQty'))||1),unit:val('mUnit'),price:Number(val('mPrice'))||0,category:val('mCat')||'PRESTATION'};
   saveState();closeModal();render();toast('Prestation mise à jour');
  };
 },50);
};

/* ══════════════════════════════
   PDF GENERATION
══════════════════════════════ */
function hexRgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]}

function jsPdfQuote(q){
 if(typeof window.jspdf==='undefined'){toast('⚠️ Bibliothèque PDF non chargée');return null}
 const {jsPDF}=window.jspdf;
 const doc=new jsPDF('p','mm','a4');
 const t=theme(q.trade);
 const c=state.company;
 const ec=effectiveColors();
 const pColor=hexRgb(ec.primary);
 const aColor=hexRgb(ec.accent);

 // ── Header: WHITE background + primary accent line (same style as app preview)
 doc.setFillColor(255,255,255);
 // Logo square with primary border
 doc.setDrawColor(...pColor);
 doc.setLineWidth(1);
 doc.roundedRect(10,8,16,16,2,2,'S');
 doc.setFont('helvetica','bold');
 doc.setTextColor(...pColor);
 doc.setFontSize(10);
 doc.text(t.icon&&t.icon!=='•••'?t.icon.slice(0,2):'',15,18);
 // Company name
 doc.setTextColor(11,31,68);
 doc.setFontSize(17);
 doc.text(c.name||'VOTRE ENTREPRISE',30,15);
 doc.setFont('helvetica','normal');
 doc.setFontSize(9);
 doc.setTextColor(...pColor);
 doc.text(t.subtitle.toUpperCase(),30,21);
 // Company details
 const infos=[c.address,c.phone,c.email,c.siret?'SIRET : '+c.siret:'',c.insurance?'Assur. : '+c.insurance:''].filter(Boolean);
 doc.setTextColor(80,95,115);
 doc.setFontSize(8);
 infos.forEach((l,i)=>doc.text(String(l),30,26+i*4));
 // DEVIS / FACTURE badge
 const badgeLabel=q.type==='facture'?'FACTURE':'DEVIS';
 doc.setFillColor(...pColor);
 doc.roundedRect(148,8,52,16,3,3,'F');
 doc.setTextColor(255,255,255);
 doc.setFont('helvetica','bold');
 doc.setFontSize(15);
 doc.text(badgeLabel,174,18.5,{align:'center'});
 // Blue accent line below header
 const headerBottom=Math.max(30,28+infos.length*4);
 doc.setFillColor(...pColor);
 doc.rect(0,headerBottom,210,2,'F');

 // Info block (right)
 let y=headerBottom+8;
 doc.setTextColor(11,31,68);
 doc.setFillColor(242,246,255);
 doc.roundedRect(130,y,70,30,2,2,'F');
 doc.setFontSize(8.5);
 [['N° :',q.number],['Date :',new Date(q.date).toLocaleDateString('fr-FR')],['Validité :',(q.validity||30)+' jours'],['Client :',q.client?.name||'-'],['Tél. :',q.client?.phone||'-']].forEach(([k,v],i)=>{
  doc.setFont('helvetica','bold');doc.text(k,133,y+6+i*4.8);
  doc.setFont('helvetica','normal');doc.text(String(v||'-').slice(0,28),148,y+6+i*4.8);
 });

 // Client block (left)
 doc.setFont('helvetica','bold');doc.setFontSize(9);
 doc.setTextColor(11,31,68);
 doc.text('CLIENT :',14,y+6);
 doc.setFont('helvetica','normal');
 doc.text(q.client?.name||'—',14,y+11);
 if(q.client?.address)doc.text(doc.splitTextToSize(q.client.address,60),14,y+16);
 if(q.client?.email)doc.text(q.client.email,14,y+26);

 y+=36;
 // Title bar
 doc.setFillColor(...pColor);
 doc.roundedRect(10,y,190,9,2,2,'F');
 doc.setTextColor(255,255,255);
 doc.setFont('helvetica','bold');doc.setFontSize(11);
 doc.text((q.title||t.label).toUpperCase().slice(0,70),14,y+6.5);

 y+=14;
 if(q.description){
  doc.setTextColor(60,70,90);doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text(doc.splitTextToSize(q.description,170),14,y);y+=10;
 }

 // Table header
 doc.setFillColor(...pColor);
 doc.setTextColor(255,255,255);
 doc.setFont('helvetica','bold');doc.setFontSize(9);
 doc.rect(10,y,105,8,'F');doc.rect(115,y,28,8,'F');doc.rect(143,y,30,8,'F');doc.rect(173,y,27,8,'F');
 doc.text('DÉSIGNATION',62,y+5.5,{align:'center'});
 doc.text('QTÉ',129,y+5.5,{align:'center'});
 doc.text('PU HT',158,y+5.5,{align:'center'});
 doc.text('TOTAL HT',186,y+5.5,{align:'center'});
 y+=8;

 // Rows
 const cats={};
 (q.items||[]).forEach(it=>(cats[it.category||'PRESTATIONS']??=[]).push(it));
 doc.setFontSize(8.5);
 Object.entries(cats).forEach(([cat,arr])=>{
  if(y>255){doc.addPage();y=15}
  doc.setFillColor(235,242,255);
  doc.setTextColor(...pColor);
  doc.setFont('helvetica','bold');
  doc.rect(10,y,190,7,'F');
  doc.text(cat,13,y+5);y+=7;
  doc.setFont('helvetica','normal');
  doc.setTextColor(11,31,68);
  arr.forEach(it=>{
   if(y>263){doc.addPage();y=15}
   doc.setDrawColor(210,220,235);
   doc.rect(10,y,105,7);doc.rect(115,y,28,7);doc.rect(143,y,30,7);doc.rect(173,y,27,7);
   doc.text(String(it.name).slice(0,55),13,y+5);
   doc.text(String(it.qty),129,y+5,{align:'center'});
   doc.text(pdfMoney(it.price),169,y+5,{align:'right'});
   doc.text(pdfMoney(it.qty*it.price),197,y+5,{align:'right'});
   y+=7;
  });
 });

 // Totals — refined, matches app style
 y+=4;
 [['TOTAL HT',q.totalHT,false],['TVA '+state.settings.vat+'%',q.totalTVA,false],['TOTAL TTC',q.totalTTC,true]].forEach(([label,amt,highlight])=>{
  if(highlight){
   // TTC: full-width primary band like the app
   doc.setFillColor(...pColor);
   doc.roundedRect(10,y,190,11,2,2,'F');
   doc.setTextColor(255,255,255);
   doc.setFont('helvetica','bold');doc.setFontSize(11);
   doc.text('TOTAL TTC',14,y+7.5);
   doc.text(pdfMoney(amt),197,y+7.5,{align:'right'});
   y+=11;
  }else{
   doc.setFillColor(...pColor);
   doc.setTextColor(255,255,255);
   doc.setFont('helvetica','bold');doc.setFontSize(8.5);
   doc.rect(130,y,40,8,'F');
   doc.text(label,132,y+5.5);
   doc.setTextColor(11,31,68);
   doc.setDrawColor(215,225,240);
   doc.rect(170,y,30,8);
   doc.setFont('helvetica','normal');
   doc.text(pdfMoney(amt),197,y+5.5,{align:'right'});
   y+=8;
  }
 });

 // Observations + mentions
 y+=8;
 if(y<250){
  doc.setDrawColor(200,215,240);
  if(q.observations){
   doc.roundedRect(10,y,88,30,2,2);
   doc.setTextColor(11,31,68);doc.setFont('helvetica','bold');doc.setFontSize(8);
   doc.text('OBSERVATIONS',14,y+7);
   doc.setFont('helvetica','normal');
   doc.text(doc.splitTextToSize(q.observations,78),14,y+13);
  }
  const m=state.settings.mentions||'Devis établi sur estimation visuelle. Valable selon la durée indiquée.';
  doc.roundedRect(q.observations?103:10,y,q.observations?97:190,30,2,2);
  doc.setTextColor(11,31,68);doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text('MENTIONS DE PROTECTION',q.observations?107:14,y+7);
  doc.setFont('helvetica','normal');
  doc.text(doc.splitTextToSize(m,q.observations?86:178),q.observations?107:14,y+13);
 }

 doc.setFont('helvetica','italic');
 doc.setTextColor(...pColor);
 doc.setFontSize(9);
 doc.text('Merci pour votre confiance – DevisExpress',105,290,{align:'center'});
 return doc;
}

window.downloadDraftPdf=()=>{
 if(!state.draft){toast('⚠️ Aucun brouillon');return}
 const t=totals(state.draft);
 const q={...JSON.parse(JSON.stringify(state.draft)),trade:state.trade,totalHT:t.ht,totalTVA:t.tva,totalTTC:t.ttc};
 const doc=jsPdfQuote(q);
 if(doc)document.fonts?document.fonts.ready.then(()=>doc.save((q.number||'devis')+'.pdf')):doc.save((q.number||'devis')+'.pdf');
};

window.downloadPdf=id=>{
 const q=state.quotes.find(x=>x.id===id);
 if(!q){toast('⚠️ Devis introuvable');return}
 const doc=jsPdfQuote(q);
 if(doc)document.fonts?document.fonts.ready.then(()=>doc.save(q.number+'.pdf')):doc.save(q.number+'.pdf');
};

/* ══════════════════════════════
   SHARE
══════════════════════════════ */
window.shareQuote=async id=>{
 const q=state.quotes.find(x=>x.id===id);
 if(!q){toast('⚠️ Devis introuvable');return}
 const text=`Bonjour ${q.client?.name||''},\nVeuillez trouver ci-joint votre ${q.type==='facture'?'facture':'devis'} ${q.number} d'un montant de ${money(q.totalTTC)} TTC.\n${state.company.name?'\n'+state.company.name:''}${state.company.phone?'\n'+state.company.phone:''}`;
 const doc=jsPdfQuote(q);
 if(!doc){toast('⚠️ Erreur PDF');return}
 try{
  const blob=doc.output('blob');
  const file=new File([blob],q.number+'.pdf',{type:'application/pdf'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
   await navigator.share({title:q.number,text,files:[file]});
   return;
  }
 }catch(e){}
 // Fallback: download PDF + open WhatsApp
 try{doc.save(q.number+'.pdf')}catch(e){}
 toast('PDF téléchargé. Partagez-le depuis vos fichiers.');
 setTimeout(()=>window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank'),800);
};

window.emailQuote=id=>{
 const q=state.quotes.find(x=>x.id===id);
 if(!q)return;
 const body=`Bonjour ${q.client?.name||''},\n\nVeuillez trouver ci-joint votre ${q.type==='facture'?'facture':'devis'} ${q.number} d'un montant de ${money(q.totalTTC)} TTC.\n\nPour télécharger le PDF, ouvrez l'application DevisExpress.\n\nCordialement,\n${state.company.name||state.company.firstName||''}`;
 location.href=`mailto:${encodeURIComponent(q.client?.email||'')}?subject=${encodeURIComponent((q.type==='facture'?'Facture':'Devis')+' '+q.number)}&body=${encodeURIComponent(body)}`;
};

window.exportData=()=>{

 a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
 a.download='devisexpress-sauvegarde-'+today()+'.json';

window.importData=e=>{

 const r=new FileReader();
 r.onload=()=>{try{state=JSON.parse(r.result);saveState();render();toast('📥 Import réussi')}catch(err){alert('Fichier invalide')}};
 r.readAsText(f);
};

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
function toast(msg){
 document.querySelectorAll('.toast').forEach(e=>e.remove());
 const d=document.createElement('div');
 d.className='toast';
 d.textContent=msg;
 d.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#0b1f44;color:#fff;padding:10px 18px;border-radius:999px;z-index:999;font-weight:800;font-size:14px;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.25)';
 document.body.appendChild(d);
 setTimeout(()=>d.style.cssText+=';transition:opacity .4s;opacity:0',1400);
 setTimeout(()=>d.remove(),1900);
}

/* ══════════════════════════════
   BOOT
══════════════════════════════ */
window.render();
})();
