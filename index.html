<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0D47A1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="DevisExpress"/>
<title>DevisExpress V4 CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --primary:#0D47A1;--secondary:#1565C0;--accent:#F57C00;--success:#2E7D32;
  --text:#0b1f44;--muted:#607D8B;--bg:#f5f7fa;--card:#ffffff;--line:#d9e2ef;
  --soft:#eef5ff;--danger:#d32f2f;--shadow:0 18px 45px rgba(13,71,161,.14);
  --radius:18px;--bottom:78px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top,#fff 0,#f3f7ff 42%,#eef3fb 100%)}
body{overflow-x:hidden}
.hidden{display:none!important}
.app{max-width:480px;margin:0 auto;min-height:100dvh;background:#fff;position:relative;box-shadow:0 0 0 1px rgba(13,71,161,.08)}
@media(min-width:760px){.app{margin:20px auto;border-radius:28px;min-height:860px;overflow:hidden}}
button,input,textarea,select{font:inherit}button{border:0;cursor:pointer}
.btn{width:100%;min-height:52px;border-radius:14px;background:linear-gradient(135deg,var(--secondary),var(--primary));color:#fff;font-weight:800;box-shadow:0 10px 24px rgba(13,71,161,.22)}
.btn.orange{background:linear-gradient(135deg,#ffa51a,var(--accent));color:#07172e}
.btn.ghost{background:#fff;color:var(--primary);border:1px solid #b8cef2;box-shadow:none}
.btn.danger{background:#fff;color:var(--danger);border:1px solid #ffc3c3;box-shadow:none}
.btn.success-btn{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;box-shadow:0 10px 24px rgba(34,197,94,.25)}
.btn.wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;box-shadow:0 10px 24px rgba(37,211,102,.25)}
.btn.small{min-height:38px;border-radius:11px;font-size:13px}
.btn.auto{width:auto;padding:0 16px}
.field{width:100%;min-height:48px;border:1px solid var(--line);border-radius:13px;padding:12px 14px;background:#fff;color:var(--text);outline:none}
.field:focus{border-color:var(--secondary);box-shadow:0 0 0 4px rgba(21,101,192,.08)}
textarea.field{min-height:88px;resize:vertical}
.label{font-size:12px;font-weight:900;color:var(--primary);text-transform:uppercase;letter-spacing:.04em;margin:12px 0 7px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 8px 25px rgba(13,71,161,.08)}

/* ── ONBOARDING ── */
.onboarding{min-height:100dvh;padding-bottom:30px;background:#fff}
.hero{background:linear-gradient(135deg,#062b67,#0D47A1 55%,#073270);color:#fff;padding:34px 24px 28px;border-bottom-left-radius:26px;border-bottom-right-radius:26px;position:relative;overflow:hidden}
.hero:after{content:"";position:absolute;right:-30px;top:25px;width:135px;height:180px;background:rgba(255,255,255,.12);border-radius:28px;transform:rotate(11deg)}
.logoRow{display:flex;gap:14px;align-items:center;position:relative;z-index:1}
.appLogo{width:64px;height:64px;border-radius:17px;background:#fff;display:grid;place-items:center;box-shadow:0 12px 24px rgba(0,0,0,.18);font-size:34px;flex-shrink:0}
.brand{font-size:32px;font-weight:950;letter-spacing:-.04em}
.tag{margin:6px 0 18px;color:#d7e7ff;line-height:1.45}
.trust{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative;z-index:1}
.trust div{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);border-radius:13px;padding:9px;font-size:11px;font-weight:800;text-align:center}
.panel{margin:-10px 14px 0;background:#fff;border-radius:24px;padding:20px 14px;position:relative;z-index:2;box-shadow:var(--shadow)}
.sectionTitle{display:flex;gap:10px;align-items:center;margin:16px 0 4px;font-size:18px;font-weight:950}
.sectionTitle .ico{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;background:#e8f1ff;color:var(--primary);flex-shrink:0}
.sub{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.4}
.tradeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tradeCard{min-height:100px;border:1px solid var(--line);border-radius:15px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;font-weight:900;font-size:12px;position:relative;padding:8px}
.tradeCard .emoji{font-size:28px}
.tradeCard.active{border:2px solid var(--secondary);background:linear-gradient(180deg,#fff,#f0f6ff)}
.tradeCard.active:after{content:"✓";position:absolute;right:-6px;bottom:-6px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:var(--secondary);color:#fff;border:2px solid #fff;font-weight:950;font-size:11px}
.moreTrade{width:100%;margin:14px 0;border:1px dashed #9db9e9;color:var(--primary);background:#fff;border-radius:13px;height:44px;font-weight:900}
.infoBox{border:1px solid #b9d2ff;background:#f1f7ff;border-radius:13px;padding:12px 14px;margin:12px 0;color:var(--primary);font-size:13px}
.footerLock{text-align:center;color:#7b8da6;font-size:12px;margin:16px 0 8px}
.optionalInputs{display:grid;gap:9px}
.howItWorks{margin:20px 0 0}
.howTitle{font-size:15px;font-weight:900;margin:0 0 10px;color:var(--text)}
.howSteps{display:grid;gap:8px}
.howStep{display:flex;gap:10px;align-items:flex-start;background:#f8fbff;border:1px solid #dce8f8;border-radius:12px;padding:10px 12px}
.howStep .num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:900;flex-shrink:0;margin-top:1px}
.howStep .txt{font-size:13px;line-height:1.4}
.howStep .txt b{display:block;margin-bottom:1px;color:var(--text)}
.howStep .txt span{color:var(--muted)}
@media(min-width:760px){.onboarding{padding:20px}.panel{padding:24px 26px;margin:0 auto;max-width:540px}.tradeGrid{grid-template-columns:repeat(4,1fr)}.optionalInputs{grid-template-columns:1fr 1fr}.optionalInputs .wide{grid-column:1/-1}.howSteps{grid-template-columns:1fr 1fr}}
@media(max-width:360px){.tradeGrid{grid-template-columns:repeat(2,1fr)}.brand{font-size:27px}.hero{padding-left:18px;padding-right:18px}.panel{margin-left:8px;margin-right:8px}}

/* ── APP SHELL ── */
.topbar{height:64px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;position:sticky;top:0;z-index:10}
.topbar b{font-size:17px}
.iconBtn{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.14);color:#fff;font-size:20px}
.content{padding:16px 14px calc(var(--bottom) + 20px);min-height:calc(100dvh - 64px);background:#f6f8fc}
.bottomNav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:480px;height:calc(66px + env(safe-area-inset-bottom));padding:7px 8px env(safe-area-inset-bottom);background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);z-index:20}
.navItem{background:transparent;color:#789;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;font-weight:800;border-radius:12px;position:relative}
.navItem.active{background:#edf5ff;color:var(--primary)}
.navItem span{font-size:20px}
.navBadge{position:absolute;top:2px;right:50%;transform:translateX(12px);background:#d32f2f;color:#fff;font-size:9px;font-weight:900;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}

/* Dashboard */
.dashGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{padding:15px;color:#fff;border-radius:18px;min-height:90px;box-shadow:0 12px 24px rgba(0,0,0,.08)}
.stat b{display:block;font-size:24px;margin-top:6px}
.stat.blue{background:linear-gradient(135deg,#1565C0,#0D47A1)}
.stat.green{background:linear-gradient(135deg,#22c55e,#15803d)}
.stat.orange{background:linear-gradient(135deg,#fb923c,#f57c00)}
.stat.purple{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}

/* Lists / Items */
.list{display:grid;gap:10px}
.item{padding:13px;border:1px solid var(--line);border-radius:15px;background:#fff;display:flex;justify-content:space-between;gap:10px;align-items:center}
.item h4{margin:0 0 3px}
.item p{margin:0;color:var(--muted);font-size:13px}
.badge{padding:4px 9px;border-radius:999px;font-size:11px;font-weight:900;background:#eef5ff;color:var(--primary)}
.badge.ok{background:#e8f8ee;color:#15803d}
.badge.wait{background:#fff5e7;color:#c05b00}
.badge.paid{background:#e8f8ee;color:#15803d}
.badge.inv{background:#f0e8ff;color:#6d28d9}
.pageTitle{font-size:26px;font-weight:950;margin:0 0 6px;letter-spacing:-.03em}
.toolbar{display:flex;gap:8px;margin:10px 0}
.toolbar .btn{flex:1}

/* Stepper */
.stepper{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:10px 0 14px}
.step{height:32px;border-radius:999px;background:#e9edf5;color:#789;display:grid;place-items:center;font-size:12px;font-weight:900}
.step.active{background:var(--primary);color:#fff}
.quoteStep{display:none}
.quoteStep.active{display:block}

/* Service rows */
.serviceRow{padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:9px}
.serviceTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.serviceName{font-weight:950;line-height:1.3}
.servicePrice{font-weight:950;color:var(--primary);white-space:nowrap}
.qtyBox{display:flex;align-items:center;gap:8px;margin-top:10px}
.qtyBtn{width:34px;height:34px;border-radius:10px;background:#eef5ff;color:var(--primary);font-size:20px;font-weight:950;flex-shrink:0}
.qtyVal{min-width:34px;text-align:center;font-weight:950;font-size:15px}
.inlineActions{display:flex;gap:6px;margin-top:10px}
.inlineActions button{flex:1;height:34px;border-radius:10px;background:#f7f9fc;color:var(--primary);font-size:11px;font-weight:900;border:1px solid var(--line)}
.inlineActions button.del{color:var(--danger);border-color:#ffc3c3}

/* Totals */
.totalBox{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:12px;margin:14px 0}
.totalLine{display:flex;justify-content:space-between;padding:6px 0;font-weight:900;font-size:14px}
.totalLine.ttc{background:var(--accent);color:#fff;margin:8px -12px -12px;padding:12px;border-bottom-left-radius:18px;border-bottom-right-radius:18px;font-size:18px}

/* PDF Preview */
.pdfPreview{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 8px 22px rgba(13,71,161,.08);font-size:12px}
.pdfHead{display:flex;justify-content:space-between;gap:8px;border-bottom:3px solid var(--primary);padding-bottom:8px;margin-bottom:10px}
.pdfLogo{width:44px;height:44px;border:2px solid var(--primary);border-radius:10px;display:grid;place-items:center;font-size:22px;color:var(--accent);flex-shrink:0}
.pdfTitle{background:var(--primary);color:#fff;border-radius:8px;padding:6px 14px;font-size:16px;font-weight:950;align-self:flex-start;white-space:nowrap}
.miniTable{width:100%;border-collapse:collapse;margin-top:10px}
.miniTable th{background:var(--primary);color:#fff}
.miniTable th,.miniTable td{border:1px solid #c9d5e6;padding:5px 7px;text-align:left;font-size:11px}
.miniTable td:nth-child(n+2),.miniTable th:nth-child(n+2){text-align:right}
.catRow td{background:#eef3f8!important;color:var(--primary);font-weight:950;text-align:left!important}
.mentionsBox{border-top:1px solid var(--line);margin-top:10px;padding-top:8px;font-size:10px;color:var(--muted);line-height:1.45}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(2,10,27,.5);z-index:80;display:flex;align-items:flex-end;justify-content:center;padding:14px}
.modalBox{width:100%;max-width:480px;background:#fff;border-radius:24px 24px 18px 18px;padding:20px 18px 18px;box-shadow:0 25px 60px rgba(0,0,0,.3);position:relative;max-height:90dvh;overflow-y:auto}
.modalTitle{font-size:20px;font-weight:950;margin:0 0 14px;padding-right:36px;line-height:1.2}
.modalClose{position:absolute;right:14px;top:16px;width:34px;height:34px;border-radius:50%;background:#f0f4fa;color:var(--muted);font-size:16px;font-weight:900;display:grid;place-items:center;flex-shrink:0}
.modalClose:hover{background:#e0e8f5}

/* Client card */
.clientCard{background:#fff;border:1px solid var(--line);border-radius:15px;overflow:hidden}
.clientHeader{padding:13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.clientHeader:hover{background:#f8fbff}
.clientBody{border-top:1px solid var(--line);padding:12px;display:none}
.clientBody.open{display:block}

/* Success */
.successView{text-align:center;padding:24px 8px}
.check{width:84px;height:84px;border-radius:50%;border:3px solid #20a34a;color:#20a34a;display:grid;place-items:center;font-size:44px;margin:0 auto 14px}
.successView h2{margin:0 0 6px}
.successView p{margin:0 0 18px;color:var(--muted)}
.successView .btnGrid{display:grid;gap:10px}

/* Misc */
.empty{padding:24px 14px;text-align:center;color:var(--muted);font-size:14px}
.paidBadge{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:#e8f8ee;color:#15803d;border-radius:12px;font-weight:900;font-size:14px}

/* ═══════════════════════════════════════════════
   CRM ADDITIONS
═══════════════════════════════════════════════ */

/* Relance alert banner */
.crmAlert{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:1px solid #ffb74d;border-radius:16px;padding:14px 16px;margin-bottom:14px;cursor:pointer;transition:opacity .15s}
.crmAlert:hover{opacity:.9}
.crmAlertTop{font-size:13px;font-weight:900;color:#e65100;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.crmAlertAmount{font-size:22px;font-weight:950;color:#bf360c;margin:4px 0 2px}
.crmAlertSub{font-size:12px;color:#e65100}
.crmAlertOk{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-color:#81c784;cursor:default}
.crmAlertOk .crmAlertTop{color:#1b5e20}
.crmAlertOk .crmAlertAmount{color:#2e7d32;font-size:16px}

/* View toggle */
.viewToggle{display:flex;background:#eef3fb;border-radius:12px;padding:3px;margin-bottom:14px;gap:2px}
.viewToggleBtn{flex:1;height:34px;border-radius:10px;font-size:12px;font-weight:900;background:transparent;color:var(--muted);transition:all .15s}
.viewToggleBtn.active{background:#fff;color:var(--primary);box-shadow:0 2px 8px rgba(13,71,161,.12)}

/* Pipeline kanban */
.kanban{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:8px}
.kCol{background:#f0f4fb;border-radius:16px;padding:12px}
.kHead{font-size:12px;font-weight:900;color:var(--primary);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.kCount{background:var(--primary);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px}
.kCard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;cursor:pointer}
.kCard:last-child{margin-bottom:0}
.kCard:hover{border-color:var(--secondary)}
.kCardName{font-size:13px;font-weight:700;color:var(--text)}
.kCardClient{font-size:12px;color:var(--muted);margin-top:2px}
.kCardAmount{font-size:13px;font-weight:900;color:var(--success);margin-top:6px}
.kTotal{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}

/* Relance items */
.relanceItem{background:#fff;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;padding:13px;margin-bottom:10px}
.relanceItem.urgent{border-left-color:var(--danger)}
.relanceTop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.relanceInfo{flex:1}
.relanceName{font-size:14px;font-weight:900;color:var(--text)}
.relanceRef{font-size:12px;color:var(--muted);margin-top:2px}
.relanceTags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.relanceTag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:800}
.relanceTagRed{background:#ffebee;color:#c62828}
.relanceTagOrange{background:#fff3e0;color:#e65100}
.relanceRight{text-align:right;flex-shrink:0}
.relanceAmount{font-size:15px;font-weight:950;color:var(--text)}
.relanceDays{font-size:11px;margin-top:2px;font-weight:800}
.msgBlock{margin-top:12px;padding-top:10px;border-top:1px solid var(--line);display:none}
.msgBlock.open{display:block}
.msgContent{background:#f1f5fb;border-left:3px solid var(--primary);border-radius:0 10px 10px 0;padding:10px 12px;font-size:12px;color:var(--text);line-height:1.65;white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
.canalTabs{display:flex;gap:5px;margin-bottom:8px}
.canalTab{padding:4px 10px;font-size:11px;border:1px solid var(--line);border-radius:20px;cursor:pointer;background:#fff;color:var(--muted);font-weight:800}
.canalTab.active{background:#eef5ff;color:var(--primary);border-color:var(--secondary)}

/* WA Preview */
.waPreview{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:8px}
.waHeader{background:#075E54;padding:10px 14px;display:flex;align-items:center;gap:10px}
.waAvatar{width:32px;height:32px;border-radius:50%;background:#128C7E;display:grid;place-items:center;font-size:12px;color:#fff;font-weight:900;flex-shrink:0}
.waHeaderName{font-size:13px;font-weight:700;color:#fff}
.waBody{background:#ECE5DD;padding:14px 12px;min-height:100px}
.waBubble{background:#fff;border-radius:0 10px 10px 10px;padding:10px 12px;font-size:12px;line-height:1.6;color:#111;box-shadow:0 1px 2px rgba(0,0,0,.1);white-space:pre-wrap;word-break:break-word}

/* Validation page (client view) */
#vpage{display:none;min-height:100vh;background:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.vpHeader{background:linear-gradient(135deg,#062b67,#0D47A1);padding:24px 20px 20px;color:#fff}
.vpLogo{font-size:11px;opacity:.75;margin-bottom:3px}
.vpArtisan{font-size:18px;font-weight:700}
.vpMetier{font-size:13px;opacity:.8;margin-top:2px}
.vpCard{background:#fff;margin:14px;border-radius:18px;overflow:hidden;box-shadow:0 8px 24px rgba(13,71,161,.1)}
.vpCardHead{padding:16px 16px 12px;border-bottom:1px solid #f0f0eb}
.vpRef{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.vpTitle{font-size:18px;font-weight:700;color:#1a1a1a}
.vpClient{font-size:14px;color:#666;margin-top:2px}
.vpLines{padding:12px 16px}
.vpLine{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f0;font-size:14px}
.vpLine:last-child{border-bottom:none}
.vpLineLabel{color:#444;flex:1;padding-right:12px}
.vpLineAmt{color:#1a1a1a;font-weight:600;white-space:nowrap}
.vpTotalRow{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#f0f6ff;border-top:1px solid #d0e4ff}
.vpTotalLabel{font-size:14px;font-weight:700;color:#0D47A1}
.vpTotalAmt{font-size:22px;font-weight:900;color:#0D47A1}
.vpValidity{padding:9px 16px;font-size:12px;color:#888;text-align:center;border-top:1px solid #f0f0eb}
.vpActions{padding:16px}
.vpBtnAccept{width:100%;padding:16px;background:linear-gradient(135deg,#1565C0,#0D47A1);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;transition:opacity .15s}
.vpBtnAccept:hover{opacity:.9}
.vpBtnQuestion{width:100%;padding:10px;background:transparent;color:#888;border:none;font-size:13px;cursor:pointer;margin-top:6px;text-decoration:underline}
.vpSecure{margin:0 14px 20px;padding:10px 12px;background:#e8f5e9;border-radius:10px;font-size:12px;color:#2e7d32;display:flex;align-items:center;gap:8px}
.vpSuccess{display:none;padding:48px 20px;text-align:center}
.vpSuccess.show{display:block}
.vpSuccessIcon{font-size:64px;margin-bottom:14px}
.vpSuccessTitle{font-size:22px;font-weight:800;color:#1a1a1a;margin-bottom:8px}
.vpSuccessSub{font-size:14px;color:#666;line-height:1.6;max-width:300px;margin:0 auto 24px}
.vpBtnWA{width:100%;max-width:300px;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;background:#25D366;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin:0 auto}

/* Rapport de fuite */
.funnelWrap{margin-bottom:14px}
.funnelRow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.funnelLabel{width:90px;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;font-weight:800}
.funnelBarWrap{flex:1;height:30px;background:#eef3fb;border-radius:8px;overflow:hidden;cursor:pointer}
.funnelBar{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;transition:width .7s ease}
.funnelRight{width:70px;font-size:10px;color:var(--muted);flex-shrink:0}
.insightBox{background:#fff3e0;border:1px solid #ffb74d;border-radius:14px;padding:14px;margin-top:14px}
.insightTitle{font-size:13px;font-weight:900;color:#e65100;margin-bottom:6px}
.insightBody{font-size:12px;color:#bf360c;line-height:1.55}

@media(print){.topbar,.bottomNav,.noPrint{display:none!important}.app{box-shadow:none;max-width:none}.content{padding:0;background:#fff}.pdfPreview{border:0;box-shadow:none}}
</style>
</head>
<body>
<div id="root"></div>

<!-- ═══ PAGE DE VALIDATION CLIENT (cachée par défaut) ═══ -->
<div id="vpage">
  <div class="vpHeader">
    <div class="vpLogo">DevisExpress</div>
    <div class="vpArtisan" id="vp-artisan">—</div>
    <div class="vpMetier" id="vp-metier">—</div>
  </div>
  <div id="vp-devis-view">
    <div class="vpCard">
      <div class="vpCardHead">
        <div class="vpRef" id="vp-ref">—</div>
        <div class="vpTitle" id="vp-title">—</div>
        <div class="vpClient" id="vp-client">—</div>
      </div>
      <div class="vpLines" id="vp-lines"></div>
      <div class="vpTotalRow"><span class="vpTotalLabel">Total TTC</span><span class="vpTotalAmt" id="vp-total">—</span></div>
      <div class="vpValidity" id="vp-validity"></div>
    </div>
    <div class="vpCard">
      <div class="vpActions">
        <button class="vpBtnAccept" onclick="vpAccepter()">✅ J'accepte ce devis</button>
        <button class="vpBtnQuestion" onclick="vpQuestion()">J'ai une question ou souhaite modifier</button>
      </div>
    </div>
    <div class="vpSecure">🔒 Lien personnel — votre accord sera transmis directement à l'artisan.</div>
  </div>
  <div class="vpSuccess" id="vp-success">
    <div class="vpSuccessIcon">🎉</div>
    <div class="vpSuccessTitle">Accord transmis !</div>
    <div class="vpSuccessSub" id="vp-success-sub">Votre acceptation a été envoyée. L'artisan vous contactera pour planifier l'intervention.</div>
    <button class="vpBtnWA" onclick="vpConfirmerWA()">💬 Confirmer sur WhatsApp</button>
  </div>
</div>

<script>
(function(){
'use strict';

/* ── HELPERS ── */
const LS='devisexpress_v4_state';
const money=n=>Number(n||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR'});
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,9).toUpperCase();
const esc=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":"&#39;",'"':'&quot;'}[m]));
const val=id=>(document.getElementById(id)||{}).value||'';

/* ── MÉTIERS ── */
const trades={
plombier:    {label:'Plombier',       icon:'🚰',subtitle:'Plomberie',           primary:'#0D47A1',accent:'#F57C00',hero:'Remise en conformité plomberie'},
electricien: {label:'Électricien',    icon:'⚡',subtitle:'Électricité générale', primary:'#0D47A1',accent:'#F57C00',hero:'Remise en conformité électrique'},
peintre:     {label:'Peintre',        icon:'🖌️',subtitle:'Peinture',            primary:'#6D28D9',accent:'#F57C00',hero:'Travaux de peinture'},
menuisier:   {label:'Menuisier',      icon:'🪵',subtitle:'Menuiserie',           primary:'#795548',accent:'#F57C00',hero:'Travaux de menuiserie'},
macon:       {label:'Maçon',          icon:'🧱',subtitle:'Maçonnerie',           primary:'#455A64',accent:'#F57C00',hero:'Travaux de maçonnerie'},
carreleur:   {label:'Carreleur',      icon:'🏠',subtitle:'Carrelage',            primary:'#00838F',accent:'#F57C00',hero:'Pose de carrelage'},
clim:        {label:'Climatisation',  icon:'❄️',subtitle:'Climatisation',        primary:'#0277BD',accent:'#00ACC1',hero:'Installation climatisation'},
paysagiste:  {label:'Paysagiste',     icon:'🌿',subtitle:'Paysagisme',           primary:'#2E7D32',accent:'#F57C00',hero:'Entretien paysager'},
nettoyage:   {label:'Nettoyage',      icon:'🧴',subtitle:'Nettoyage',           primary:'#1565C0',accent:'#2E7D32',hero:'Prestation de nettoyage'},
web:         {label:'Site web',       icon:'💻',subtitle:'Service digital',      primary:'#263238',accent:'#1565C0',hero:'Création site web'},
autre:       {label:'Autre métier',   icon:'🔧',subtitle:'Service professionnel',primary:'#0D47A1',accent:'#F57C00',hero:'Prestation professionnelle'}
};

/* ── CRM : CATÉGORIES MÉTIER & TIMING RELANCE ── */
const TRADE_CAT={
  plombier:'urgence',electricien:'urgence',clim:'urgence',
  peintre:'travaux',menuisier:'travaux',macon:'travaux',carreleur:'travaux',
  paysagiste:'service',nettoyage:'service',web:'service',autre:'service'
};
const RELANCE_CFG={
  urgence:{r1_h:2,  r2_h:4,   r1_label:'2h',      r2_label:'4h',      canal:'tel'},
  travaux:{r1_j:5,  r2_j:12,  r1_label:'5 jours', r2_label:'12 jours',canal:'email'},
  service:{r1_j:3,  r2_j:8,   r1_label:'3 jours', r2_label:'8 jours', canal:'email'},
};

const defaults={
plombier:[['Dépose ancienne installation',1,'forfait',180,'DÉPOSE'],['Recherche de fuite',1,'forfait',120,'DIAGNOSTIC'],['Remplacement robinetterie',1,'u',95,'APPAREILLAGE'],['Pose évier / lavabo',1,'u',180,'POSE'],["Main d'oeuvre",1,'forfait',350,"MAIN D'OEUVRE"]],
electricien:[["Dépose ancienne installation électrique",1,'forfait',350,'DÉPOSE'],["Fourniture et pose tableau électrique",1,'u',280,'TABLEAU ÉLECTRIQUE'],["Interrupteurs différentiels 30mA",2,'u',65,'TABLEAU ÉLECTRIQUE'],["Disjoncteurs divisionnaires",10,'u',18,'TABLEAU ÉLECTRIQUE'],["Prises 2P+T",22,'u',8,'APPAREILLAGE'],["Points lumineux / DCL",6,'u',18,'APPAREILLAGE'],["Fourniture câblage complet",1,'lot',420,'PASSAGE RÉSEAUX'],["Main d'oeuvre installation complète",1,'forfait',2150,"MAIN D'OEUVRE"]],
peintre:[["Protection des sols",1,'forfait',90,'PRÉPARATION'],["Préparation des supports",40,'m²',8,'PRÉPARATION'],["Application sous-couche",40,'m²',6,'PEINTURE'],["Peinture murs deux couches",40,'m²',16,'PEINTURE'],["Main d'oeuvre",1,'forfait',450,"MAIN D'OEUVRE"]],
macon:[["Préparation chantier",1,'forfait',150,'PRÉPARATION'],["Montage mur / reprise",1,'forfait',650,'MAÇONNERIE'],["Enduit finition",20,'m²',28,'FINITION'],["Évacuation gravats",1,'forfait',180,'NETTOYAGE']],
menuisier:[["Dépose anciens éléments",1,'forfait',150,'DÉPOSE'],["Fourniture et pose porte",1,'u',380,'MENUISERIE'],["Pose plinthes et finitions",1,'forfait',220,'FINITION'],["Main d'oeuvre",1,'forfait',400,"MAIN D'OEUVRE"]],
autre:[["Prestation personnalisée",1,'forfait',250,'PRESTATION'],["Main d'oeuvre",1,'forfait',300,"MAIN D'OEUVRE"]]
};

function catalogue(trade){
  return (defaults[trade]||defaults.autre).map(x=>({id:uid(),name:x[0],qty:x[1],unit:x[2],price:x[3],category:x[4]}));
}

/* ── STATE ── */
let state=loadState()||{
  onboarded:false,activeTab:'home',trade:'plombier',trackView:'liste',
  company:{name:'',firstName:'',phone:'',email:'',address:'',siret:'',insurance:'',logo:''},
  servicesByTrade:{},clients:[],quotes:[],draft:null,
  settings:{vat:10,validity:30,mentions:"Devis établi sur estimation visuelle. Toute anomalie non visible pourra entraîner un ajustement après validation client. Les alimentations existantes pourront être remplacées si défaut de sécurité. Devis valable selon la durée indiquée."}
};
if(!state.servicesByTrade)state.servicesByTrade={};
if(!state.trackView)state.trackView='liste';
if(!state.company)state.company={name:'',firstName:'',phone:'',email:'',address:'',siret:'',insurance:'',logo:''};
if(!state.quotes)state.quotes=[];
if(!state.clients)state.clients=[];
if(!state.settings)state.settings={vat:10,validity:30,mentions:''};
Object.keys(trades).forEach(k=>{if(!state.servicesByTrade[k])state.servicesByTrade[k]=catalogue(k);});
// Expose state globally so inline onclick handlers can access it
window.state=state;

function saveState(){try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){console.warn('localStorage indisponible',e);}}
function loadState(){try{return JSON.parse(localStorage.getItem(LS)||'null')}catch(e){return null}}
function theme(){return trades[state.trade]||trades.autre;}
function applyTheme(){
  const t=theme();
  document.documentElement.style.setProperty('--primary',t.primary);
  document.documentElement.style.setProperty('--secondary',t.primary==='#0D47A1'?'#1565C0':t.primary);
  document.documentElement.style.setProperty('--accent',t.accent);
}
function setRoot(html){document.getElementById('root').innerHTML=html;bindCommon();}
function render(){applyTheme();state.onboarded?renderApp():renderOnboarding();saveState();}
window.render=render;
function bindCommon(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.activeTab=b.dataset.tab;render();});}

/* ── CRM : INTELLIGENCE RELANCES ── */
function getCat(){return TRADE_CAT[state.trade]||'service';}
function getCfg(){return RELANCE_CFG[getCat()]||RELANCE_CFG.service;}

function hoursSince(d){return Math.round((new Date()-new Date(d||today()))/(1000*60*60));}
function daysSince(d){return Math.floor((new Date()-new Date(d||today()))/(1000*60*60*24));}

function getRelancesUrgentes(){
  const cfg=getCfg();
  return state.quotes
    .filter(q=>q.status==='En attente')
    .map(q=>{
      const age=cfg.r1_h?hoursSince(q.date):daysSince(q.date);
      const seuil=cfg.r1_h?cfg.r1_h:cfg.r1_j;
      const urgent=cfg.r1_h?age>=cfg.r2_h:age>=cfg.r2_j;
      return{...q,age,seuil,urgent,needsAction:age>=seuil};
    })
    .filter(q=>q.needsAction)
    .sort((a,b)=>b.urgent-a.urgent||b.totalTTC-a.totalTTC);
}

function genRelanceMsg(q,canal){
  const c=state.company;
  const artisan=c.name||c.firstName||'Votre artisan';
  const prenom=q.client?.name?.split(' ')[0]||'';
  const montant=money(q.totalTTC);
  const ref=q.number||'votre devis';
  const travaux=q.title||'vos travaux';
  if(canal==='sms')return`Bonjour${prenom?' '+prenom:''}, suite à notre devis ${ref} (${montant}) pour ${travaux}, avez-vous pu l'étudier ? Je reste disponible. ${artisan}`;
  if(canal==='tel')return`Script d'appel :\n\n« Bonjour${prenom?' '+prenom:''}, c'est ${artisan}. Je vous appelle concernant le devis ${ref} pour ${travaux}. Avez-vous pu en prendre connaissance ? »\n\nSi occupé : proposer un rappel dans 2h.`;
  return`Bonjour${prenom?' '+prenom:''},\n\nJe me permets de revenir vers vous concernant notre devis ${ref} pour ${travaux} — montant : ${montant}.\n\nAvez-vous pu en prendre connaissance ? Je reste disponible pour répondre à vos questions ou ajuster certains postes si nécessaire.\n\nCordialement,\n${artisan}`;
}

/* ── CRM : PIPELINE ── */
function pipelineHTML(){
  const stages=[
    {key:'Brouillon',    label:'Prospection', color:'#607D8B'},
    {key:'En attente',   label:'Devis envoyé',color:'#0D47A1'},
    {key:'Accepté',      label:'Accepté',     color:'#2E7D32'},
    {key:'Payé',         label:'Payé ✓',      color:'#15803d'},
  ];
  return stages.map(s=>{
    const cards=state.quotes.filter(q=>q.status===s.key);
    const total=cards.reduce((sum,q)=>sum+(q.totalTTC||0),0);
    const cardHtml=cards.length?cards.map(q=>`
      <div class="kCard" onclick="openQuote('${q.id}')">
        <div class="kCardName">${esc(q.title||q.number||'—')}</div>
        <div class="kCardClient">${esc(q.client?.name||'—')}</div>
        <div class="kCardAmount">${money(q.totalTTC)}</div>
      </div>`).join(''):`<div style="font-size:12px;color:#999;text-align:center;padding:12px">Aucun devis</div>`;
    return `<div class="kCol">
      <div class="kHead"><span>${s.label}</span><span class="kCount">${cards.length}</span></div>
      ${cardHtml}
      ${total>0?`<div class="kTotal">${money(total)}</div>`:''}
    </div>`;
  }).join('');
}

/* ── CRM : RAPPORT DE FUITE ── */
function rapportHTML(){
  const total=state.quotes.length;
  if(total===0)return`<div class="empty">Aucun devis pour générer un rapport.</div>`;
  const envoyes=state.quotes.filter(q=>q.status!=='Brouillon').length;
  const repondus=state.quotes.filter(q=>q.status==='Accepté'||q.status==='Payé').length;
  const payes=state.quotes.filter(q=>q.status==='Payé').length;
  const steps=[
    {label:'Créés',    n:total,  color:'#0D47A1'},
    {label:'Envoyés',  n:envoyes,color:'#1565C0'},
    {label:'Acceptés', n:repondus,color:'#2E7D32'},
    {label:'Payés',    n:payes,  color:'#15803d'},
  ];
  const funnelRows=steps.map(s=>{
    const pct=total>0?Math.round(s.n/total*100):0;
    return`<div class="funnelRow">
      <div class="funnelLabel">${s.label}</div>
      <div class="funnelBarWrap"><div class="funnelBar" style="width:${pct}%;background:${s.color}">${s.n}</div></div>
      <div class="funnelRight">${pct}%</div>
    </div>`;
  }).join('');
  const caRisque=state.quotes.filter(q=>q.status==='En attente').reduce((s,q)=>s+(q.totalTTC||0),0);
  const insight=caRisque>0?`<div class="insightBox"><div class="insightTitle">⚠️ ${money(caRisque)} en attente de réponse</div><div class="insightBody">Ces devis n'ont pas encore eu de réponse. Relancer maintenant peut transformer directement ce montant en chiffre d'affaires signé.</div></div>`:'';
  return`<div class="funnelWrap">${funnelRows}</div>${insight}<button class="btn ghost small" onclick="state.trackView='relances';render()" style="width:auto;padding:0 16px;margin-top:8px">🔔 Voir les relances →</button>`;
}

/* ── CRM : RELANCES VIEW ── */
function relancesHTML(){
  const rel=getRelancesUrgentes();
  if(rel.length===0)return`<div style="text-align:center;padding:32px 14px"><div style="font-size:48px;margin-bottom:10px">✅</div><div style="font-size:16px;font-weight:900;margin-bottom:6px">Tout est à jour !</div><div style="font-size:13px;color:var(--muted)">Aucune relance urgente pour l'instant.</div></div>`;
  const cfg=getCfg();
  const totalRisque=rel.reduce((s,q)=>s+(q.totalTTC||0),0);
  const header=`<div style="background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:1px solid #ffb74d;border-radius:14px;padding:14px;margin-bottom:14px">
    <div style="font-size:12px;font-weight:900;color:#e65100;margin-bottom:4px">⚠️ CA à risque</div>
    <div style="font-size:24px;font-weight:950;color:#bf360c">${money(totalRisque)}</div>
    <div style="font-size:12px;color:#e65100;margin-top:2px">${rel.length} devis sans réponse · délai métier : ${cfg.r1_label}</div>
  </div>`;
  const items=rel.map(q=>{
    const age=cfg.r1_h?`${q.age}h`:`J+${q.age}`;
    const msgEmail=esc(genRelanceMsg(q,'email'));
    const msgSMS=esc(genRelanceMsg(q,'sms'));
    const msgTel=esc(genRelanceMsg(q,'tel'));
    const tel=(q.client?.phone||'').replace(/\s+/g,'').replace(/^0/,'33');
    return`<div class="relanceItem ${q.urgent?'urgent':''}" id="ri_${q.id}">
      <div class="relanceTop">
        <div class="relanceInfo">
          <div class="relanceName">${esc(q.client?.name||'Client')}</div>
          <div class="relanceRef">${esc(q.number)} · ${esc(q.title||'—')}</div>
          <div class="relanceTags">
            <span class="relanceTag ${q.urgent?'relanceTagRed':'relanceTagOrange'}">${age} sans réponse</span>
            ${q.urgent?'<span class="relanceTag relanceTagRed">Urgent</span>':''}
          </div>
        </div>
        <div class="relanceRight">
          <div class="relanceAmount">${money(q.totalTTC)}</div>
          <div class="relanceDays" style="color:${q.urgent?'var(--danger)':'var(--accent)'}">${age}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px">
        <button class="btn small ghost auto" onclick="toggleMsg('${q.id}',this)">💬 Message</button>
        ${tel?`<button class="btn small wa auto" onclick="envoyerRelanceWA('${q.id}')">📲 WA</button>`:''}
        <button class="btn small success-btn auto" onclick="marquerRelanceFaite('${q.id}')">✓ Fait</button>
      </div>
      <div class="msgBlock" id="msg_${q.id}">
        <div class="canalTabs">
          <button class="canalTab active" onclick="setCanal('${q.id}','email',this)">📧 Email</button>
          <button class="canalTab" onclick="setCanal('${q.id}','sms',this)">💬 SMS</button>
          <button class="canalTab" onclick="setCanal('${q.id}','tel',this)">📞 Tél.</button>
        </div>
        <div class="msgContent" id="mc_${q.id}">${msgEmail}</div>
      </div>
    </div>`;
  }).join('');
  return header+items;
}

window.toggleMsg=function(id,btn){
  const b=document.getElementById('msg_'+id);
  if(!b)return;
  b.classList.toggle('open');
  btn.textContent=b.classList.contains('open')?'▲ Masquer':'💬 Message';
};
window.setCanal=function(id,canal,btn){
  const q=state.quotes.find(x=>x.id===id);if(!q)return;
  btn.closest('.canalTabs').querySelectorAll('.canalTab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const mc=document.getElementById('mc_'+id);
  if(mc)mc.textContent=genRelanceMsg(q,canal);
};
window.envoyerRelanceWA=function(id){
  const q=state.quotes.find(x=>x.id===id);if(!q)return;
  const tel=(q.client?.phone||'').replace(/\s+/g,'').replace(/^0/,'33');
  if(!tel){toast('⚠ Numéro client manquant');return;}
  const msg=genRelanceMsg(q,'sms');
  window.open('https://wa.me/'+tel+'?text='+encodeURIComponent(msg),'_blank');
};
window.marquerRelanceFaite=function(id){
  const el=document.getElementById('ri_'+id);
  if(el){el.style.opacity='.3';el.style.pointerEvents='none';}
  toast('Relance marquée comme faite ✓');
};

/* ── CRM : MODAL LIEN VALIDATION ── */
window.openLienModal=function(id){
  const q=state.quotes.find(x=>x.id===id);if(!q)return;
  const lien=genValidationLink(q);
  openModal(mHtml('🔗 Lien de validation client',`
    <p style="font-size:13px;color:var(--muted);margin:0 0 12px">Le client ouvre ce lien et clique "J'accepte". Sa confirmation vous arrive sur WhatsApp.</p>
    <div style="background:#f1f5fb;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer" onclick="copyLien('${esc(lien)}')">
      <span style="flex:1;font-size:11px;color:var(--primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace" id="lien-display">${esc(lien.slice(0,60))}…</span>
      <button class="btn small ghost auto" onclick="event.stopPropagation();copyLien('${esc(lien)}')">Copier</button>
    </div>
    <div style="display:grid;gap:8px">
      <button class="btn wa" onclick="partagerLienWA('${id}','${esc(lien)}')">📲 Envoyer par WhatsApp</button>
      <button class="btn ghost" onclick="window.open('${esc(lien)}','_blank');closeModal()">👁 Aperçu client</button>
      <button class="btn ghost" onclick="closeModal()">Fermer</button>
    </div>
  `));
};

window.copyLien=function(lien){
  navigator.clipboard.writeText(lien).then(()=>toast('Lien copié ✓')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=lien;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Lien copié ✓');
  });
};

window.partagerLienWA=function(id,lien){
  const q=state.quotes.find(x=>x.id===id);if(!q)return;
  const c=state.company;
  const art=c.name||c.firstName||'Votre artisan';
  const prenom=q.client?.name?.split(' ')[0]||'';
  const tel=(q.client?.phone||'').replace(/\s+/g,'').replace(/^0/,'33');
  const msg=`Bonjour${prenom?' '+prenom:''},\n\nVoici votre devis ${q.number} pour ${q.title||'vos travaux'} (${money(q.totalTTC)}) :\n\n${lien}\n\nVous pouvez le consulter et l'accepter directement depuis ce lien.\n\nCordialement,\n${art}`;
  closeModal();
  window.open('https://wa.me/'+(tel||'')+'?text='+encodeURIComponent(msg),'_blank');
};

function genValidationLink(q){
  const c=state.company;
  const payload={
    ref:q.number,titre:q.title||'',
    client_nom:q.client?.name||'—',
    artisan_nom:c.name||c.firstName||'Artisan',
    artisan_metier:theme().label,
    artisan_tel:c.phone||'',
    total_ttc:q.totalTTC,
    date_validite:q.date?new Date(new Date(q.date).getTime()+(q.validity||30)*86400000).toISOString().slice(0,10):'',
    lignes:(q.items||[]).map(it=>({description:it.name,montant:(it.qty||1)*(it.price||0)*(1+(Number(state.settings.vat)||0)/100)}))
  };
  const encoded=btoa(encodeURIComponent(JSON.stringify(payload)));
  return window.location.origin+window.location.pathname+'?validate='+encoded;
}

/* ── CRM : VALIDATION PAGE (côté client) ── */
let _vpData=null;
function checkValidationMode(){
  const params=new URLSearchParams(window.location.search);
  const token=params.get('validate');
  if(!token)return false;
  try{

/* ── MODAL SYSTEM ── */
function openModal(html,id='modal'){
  closeModal(id);
  const div=document.createElement('div');
  div.className='modal';div.id=id;
  div.innerHTML=`<div class="modalBox">${html}</div>`;
  document.body.appendChild(div);
  div.addEventListener('click',e=>{if(e.target===div)closeModal(id);});
  const escH=e=>{if(e.key==='Escape'){closeModal(id);document.removeEventListener('keydown',escH);}};
  div._esc=escH;
  document.addEventListener('keydown',escH);
}
window.closeModal=function(id='modal'){
  const el=document.getElementById(id);
  if(el){if(el._esc)document.removeEventListener('keydown',el._esc);el.remove();}
};
function mHtml(title,content){
  return`<button class="modalClose" onclick="closeModal()" aria-label="Fermer">✕</button><h3 class="modalTitle">${title}</h3>${content}`;
}

function createFromDraft(status='En attente'){
  const d=state.draft;const t=calcTotals(d);
  const q={...JSON.parse(JSON.stringify(d)),id:uid(),date:d.date||today(),status,type:'devis',totalHT:t.ht,totalTVA:t.tva,totalTTC:t.ttc,trade:state.trade};
  state.quotes.push(q);
  if(q.client.name&&!state.clients.some(c=>c.name.toLowerCase()===q.client.name.toLowerCase()))
    state.clients.push({...q.client,id:uid()});
  state.draft=null;saveState();return q;
}

/* ── PDF GENERATION (jsPDF - identique à l'original) ── */
function hexArr(h){h=(h||'#0D47A1').replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function jsPdfQuote(q){
  if(!window.jspdf){toast('jsPDF non chargé. Vérifiez votre connexion.');return null;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF('p','mm','a4');
  const t=trades[q.trade]||theme();
  const c=state.company;
  const pC=hexArr(t.primary);const aC=hexArr(t.accent);
  let y=14;
  doc.setDrawColor(...pC);doc.setLineWidth(0.8);
  doc.roundedRect(10,y,14,14,2,2);
  doc.setTextColor(...hexArr('#0b1f44'));doc.setFont('helvetica','bold');doc.setFontSize(18);
  doc.text(c.name||'VOTRE ENTREPRISE',28,y+5);
  doc.setTextColor(...pC);doc.setFontSize(10);
  doc.text((t.subtitle||'Service professionnel').toUpperCase(),28,y+11);
  doc.setTextColor(30,45,70);doc.setFont('helvetica','normal');doc.setFontSize(8.5);
  const info=[c.address,c.phone,c.email,c.siret?'SIRET : '+c.siret:'',c.insurance?'Assurance : '+c.insurance:''].filter(Boolean);
  info.forEach((l,i)=>doc.text(String(l),28,y+17+i*4.5));
  doc.setFillColor(...pC);doc.roundedRect(138,10,62,13,2,2,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(18);
  doc.text(q.type==='facture'?'FACTURE':'DEVIS',169,19,{align:'center'});
  doc.setTextColor(11,31,68);doc.setFontSize(8.5);
  const infoH=38;doc.roundedRect(138,28,62,infoH,2,2);
  [['N° :',q.number],['Date :',new Date(q.date).toLocaleDateString('fr-FR')],['Validité :',q.validity+' jours'],['Client :',q.client?.name||'-'],['Tél. :',q.client?.phone||'-'],['Email :',(q.client?.email||'-').slice(0,22)]].forEach((r,i)=>{
    doc.setFont('helvetica','bold');doc.text(r[0],143,35+i*5.2);
    doc.setFont('helvetica','normal');doc.text(String(r[1]),163,35+i*5.2);
  });
  y=75;doc.setFillColor(...pC);doc.roundedRect(10,y,190,9,2,2,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.text((q.title||t.hero).toUpperCase().slice(0,65),13,y+6.2);
  y+=14;
  if(q.description){
    doc.setTextColor(11,31,68);doc.setFont('helvetica','normal');doc.setFontSize(9);
    const lines=doc.splitTextToSize(q.description,170);
    doc.text(lines,13,y);y+=lines.length*4.5+4;
  }
  doc.setFillColor(...pC);doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(9);
  doc.rect(10,y,100,8,'F');doc.rect(110,y,25,8,'F');doc.rect(135,y,30,8,'F');doc.rect(165,y,35,8,'F');
  doc.text('DÉSIGNATION',60,y+5.5,{align:'center'});doc.text('QTÉ',122,y+5.5,{align:'center'});
  doc.text('PU HT',150,y+5.5,{align:'center'});doc.text('TOTAL HT',182,y+5.5,{align:'center'});
  y+=8;
  const cats={};(q.items||[]).forEach(it=>(cats[it.category||'PRESTATIONS']=cats[it.category||'PRESTATIONS']||[]).push(it));
  doc.setFontSize(8);
  Object.entries(cats).forEach(([cat,arr])=>{
    if(y>252){doc.addPage();y=15;}
    doc.setFillColor(239,244,250);doc.setTextColor(11,31,68);doc.setFont('helvetica','bold');
    doc.rect(10,y,190,7,'F');doc.text(cat,13,y+4.8);y+=7;
    doc.setFont('helvetica','normal');
    arr.forEach(it=>{
      if(y>262){doc.addPage();y=15;}
      doc.setDrawColor(200,213,230);
      doc.rect(10,y,100,7);doc.rect(110,y,25,7);doc.rect(135,y,30,7);doc.rect(165,y,35,7);
      doc.setTextColor(20,30,45);
      doc.text(String(it.name).slice(0,60),13,y+4.8);
      doc.text(String(it.qty),122,y+4.8,{align:'center'});
      doc.text(money(it.price),160,y+4.8,{align:'right'});
      doc.text(money(it.qty*it.price),196,y+4.8,{align:'right'});
      y+=7;
    });
  });
  y+=4;
  const tt={ht:q.totalHT||0,tva:q.totalTVA||0,ttc:q.totalTTC||0};
  [['TOTAL HT',tt.ht,false],['TVA '+state.settings.vat+' %',tt.tva,false],['TOTAL TTC',tt.ttc,true]].forEach(r=>{
    if(r[2])doc.setFillColor(...aC);else doc.setFillColor(...pC);
    doc.setTextColor(255,255,255);doc.rect(122,y,43,8,'F');
    doc.setFont('helvetica','bold');doc.text(r[0],125,y+5.2);
    doc.setTextColor(11,31,68);doc.setFont('helvetica','normal');doc.rect(165,y,35,8);
    doc.text(money(r[1]),196,y+5.2,{align:'right'});
    y+=8;
  });
  y+=8;
  if(y<248){
    doc.setDrawColor(180,199,225);
    const hasObs=!!q.observations;const hasMen=!!state.settings.mentions;
    const w=hasObs&&hasMen?87:190;
    if(hasObs){
      doc.roundedRect(10,y,w,32,2,2);doc.setFont('helvetica','bold');doc.setFontSize(8);
      doc.setTextColor(11,31,68);doc.text('OBSERVATIONS',15,y+7);
      doc.setFont('helvetica','normal');doc.setFontSize(7.5);
      doc.text(doc.splitTextToSize(q.observations,w-10),15,y+13);
    }
    if(hasMen){
      const x=hasObs?103:10;
      doc.roundedRect(x,y,hasObs?97:w,32,2,2);doc.setFont('helvetica','bold');doc.setFontSize(8);
      doc.setTextColor(11,31,68);doc.text('MENTIONS DE PROTECTION',x+5,y+7);
      doc.setFont('helvetica','normal');doc.setFontSize(7);
      doc.text(doc.splitTextToSize(state.settings.mentions,hasObs?86:w-10),x+5,y+13);
    }
  }
  doc.setFont('helvetica','italic');doc.setTextColor(...pC);doc.setFontSize(9);
  doc.text('Merci pour votre confiance !',105,285,{align:'center'});
  doc.setFont('helvetica','normal');doc.setTextColor(160,160,160);doc.setFontSize(7.5);
  doc.text('Document généré par DevisExpress',105,290,{align:'center'});
  return doc;
}
window.downloadDraftPdf=function(){
  if(!state.draft){toast('Aucun brouillon disponible');return;}
  const t=calcTotals(state.draft);
  const q={...JSON.parse(JSON.stringify(state.draft)),trade:state.trade,totalHT:t.ht,totalTVA:t.tva,totalTTC:t.ttc};
  const doc=jsPdfQuote(q);if(doc)doc.save((q.number||'devis')+'.pdf');
};
window.downloadPdf=function(id){
  const q=state.quotes.find(x=>x.id===id);
  if(!q){toast('Devis introuvable');return;}
  const doc=jsPdfQuote(q);if(doc)doc.save(q.number+'.pdf');
};
window.shareQuote=async function(id){
  const q=state.quotes.find(x=>x.id===id);if(!q)return;
  const label=q.type==='facture'?'facture':'devis';
  const text=`Bonjour, veuillez trouver ci-joint votre ${label} ${q.number} d'un montant de ${money(q.totalTTC)} TTC.`;
  const doc=jsPdfQuote(q);if(!doc)return;
  try{
    const blob=doc.output('blob');
    const file=new File([blob],q.number+'.pdf',{type:'application/pdf'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({title:q.number,text,files:[file]});return;
    }
  }catch(e){}
  doc.save(q.number+'.pdf');
  toast('PDF téléchargé — partagez-le manuellement.');
  setTimeout(()=>window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank'),1600);
};
window.emailQuote=function(id){
  const q=state.quotes.find(x=>x.id===id);if(!q)return;
  downloadPdf(id);
  const label=q.type==='facture'?'Facture':'Devis';
  const body=`Bonjour,\n\nVeuillez trouver ci-joint votre ${label.toLowerCase()} ${q.number} d'un montant de ${money(q.totalTTC)} TTC.\n\nCordialement,\n${state.company.name||''}`;
  setTimeout(()=>{location.href=`mailto:${q.client?.email||''}?subject=${encodeURIComponent(label+' '+q.number)}&body=${encodeURIComponent(body)}`;},900);
};

/* ── EXPORT / IMPORT ── */
window.exportData=function(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download='devisexpress-'+today()+'.json';a.click();
};
window.importData=function(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{state=JSON.parse(r.result);saveState();render();toast('Données importées ✓');}catch(err){alert('Fichier invalide');}};
  r.readAsText(f);
};

/* ── TOAST ── */
function toast(msg){
  const ex=document.getElementById('_toast');if(ex)ex.remove();
  const d=document.createElement('div');d.id='_toast';d.textContent=msg;
  d.style.cssText='position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#0b1f44;color:#fff;padding:10px 18px;border-radius:999px;z-index:9999;font-weight:800;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.22);pointer-events:none';
  document.body.appendChild(d);setTimeout(()=>d.remove(),2400);
}

/* ── BOOT ── */
function safeRender(){
  try{
    if(!checkValidationMode()) render();
  }catch(e){
    console.error('DevisExpress init error:', e);
    const root=document.getElementById('root');
    if(root) root.innerHTML=`<div style="padding:28px;font-family:sans-serif;max-width:480px;margin:0 auto">
      <div style="background:#fff3e0;border:1px solid #ffb74d;border-radius:16px;padding:20px">
        <div style="font-size:18px;font-weight:800;color:#e65100;margin-bottom:10px">⚠️ Erreur de démarrage</div>
        <div style="font-size:13px;color:#bf360c;margin-bottom:12px">${String(e.message||e).replace(/</g,'&lt;')}</div>
        <pre style="font-size:11px;color:#666;overflow:auto;background:#fff;padding:10px;border-radius:8px;max-height:200px">${String(e.stack||'').replace(/</g,'&lt;').slice(0,1000)}</pre>
        <button onclick="localStorage.clear();location.reload()" style="margin-top:12px;padding:10px 18px;background:#0D47A1;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">
          Réinitialiser et réessayer
        </button>
      </div>
    </div>`;
  }
}
safeRender();

})();
