<style>
:root{
  color-scheme:dark;
  --bg:#0b0f17;--bg2:#101827;--surface:#151b28;--surface2:#1d2638;--surface3:#263247;
  --border:#2d3a53;--border2:#3d4b68;--accent:#f59e0b;--accent2:#10b981;
  --blue:#60a5fa;--danger:#ef4444;--purple:#a78bfa;--txt:#f8fafc;--mut:#94a3b8;--dim:#64748b;
  --radius:18px;--radius-sm:12px;--shadow:0 20px 60px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:Sora,system-ui,sans-serif;overflow-x:hidden}

button{cursor:pointer;border:0}
.app{min-height:100dvh;display:flex;flex-direction:column;background:radial-gradient(circle at 80% -10%,rgba(245,158,11,.13),transparent 35%),linear-gradient(180deg,#0b0f17,#0e1420)}
.screen{display:none;min-height:100dvh;flex-direction:column}.screen.active{display:flex;animation:fade .25s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.center{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 18px}.login{width:min(430px,100%);background:rgba(21,27,40,.92);border:1px solid var(--border);border-radius:28px;padding:26px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}
.brand{text-align:center;margin-bottom:24px}.brand-icon{font-size:54px;filter:drop-shadow(0 0 18px rgba(245,158,11,.35))}.brand h1{font-size:30px;letter-spacing:-1px}.brand h1 span,.accent{color:var(--accent)}.brand p{color:var(--mut);font-size:13px;margin-top:5px;line-height:1.5}.label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;display:block}.grid-metier{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin:12px 0 18px}.metier{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:13px 8px;color:var(--mut);font-size:11px;text-align:center}.metier span{display:block;font-size:23px;margin-bottom:4px}.metier.sel{border-color:var(--accent);background:rgba(245,158,11,.11);color:var(--txt)}
.input,.textarea,.select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:13px;color:var(--txt);padding:13px 14px;font-size:14px;outline:none}.textarea{min-height:88px;resize:vertical}.input:focus,.textarea:focus,.select:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:14px;padding:13px 15px;font-weight:700;font-size:13px;transition:.18s}.btn-primary{background:var(--accent);color:#111827}.btn-primary:active,.btn-green:active,.btn-ghost:active{transform:scale(.98)}.btn-green{background:var(--accent2);color:white}.btn-red{background:rgba(239,68,68,.14);color:#fecaca;border:1px solid rgba(239,68,68,.25)}.btn-ghost{background:var(--surface2);color:var(--txt);border:1px solid var(--border)}.btn-small{padding:9px 11px;border-radius:11px;font-size:12px}.full{width:100%}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(15,17,23,.86);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}.logo{font-weight:800}.logo span{color:var(--accent)}.top-actions{display:flex;gap:8px;align-items:center}.badge{font-size:11px;color:var(--accent);background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.24);padding:6px 10px;border-radius:999px}.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#111827;display:flex;align-items:center;justify-content:center;font-weight:800}.content{flex:1;width:100%;max-width:1050px;margin:0 auto;padding:18px 16px 88px}.hgroup{margin:6px 0 18px}.hgroup h2{font-size:23px;letter-spacing:-.5px}.hgroup p{font-size:13px;color:var(--mut);margin-top:5px;line-height:1.5}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.16)}.stat-label{color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.7px}.stat-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;margin-top:7px}.stat-sub{font-size:11px;color:var(--dim);margin-top:3px}.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}.section-title{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 10px}.list{display:flex;flex-direction:column;gap:9px}.quote-row,.client-row{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:13px;display:flex;align-items:center;justify-content:space-between;gap:10px}.quote-row strong,.client-row strong{font-size:13px}.quote-row span,.client-row span{font-size:11px;color:var(--mut);display:block;margin-top:3px}.money{font-family:'DM Mono',monospace;font-weight:700;font-size:14px;white-space:nowrap}.status{font-size:9px;padding:4px 8px;border-radius:999px;font-weight:800;letter-spacing:.5px;white-space:nowrap}.s-draft{background:rgba(148,163,184,.16);color:#cbd5e1}.s-sent{background:rgba(96,165,250,.15);color:#93c5fd}.s-accepted{background:rgba(16,185,129,.15);color:#6ee7b7}.s-refused{background:rgba(239,68,68,.12);color:#fca5a5}.nav{position:fixed;bottom:0;left:0;right:0;z-index:25;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(21,27,40,.96);border-top:1px solid var(--border);backdrop-filter:blur(16px);padding-bottom:env(safe-area-inset-bottom)}.nav button{background:transparent;color:var(--dim);font-size:10px;padding:10px 2px}.nav button span{display:block;font-size:20px;margin-bottom:2px}.nav button.active{color:var(--accent)}.stepbar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0 18px}.step{border-bottom:2px solid var(--border);padding:10px 2px;text-align:center;font-size:11px;color:var(--dim);font-weight:700}.step.active{color:var(--accent);border-color:var(--accent)}.step.done{color:var(--accent2);border-color:var(--accent2)}.form{display:flex;flex-direction:column;gap:14px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:8px 12px;color:var(--mut);font-size:12px}.chip.sel{color:var(--accent);border-color:var(--accent);background:rgba(245,158,11,.1)}.prestation{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:12px}.prestation.sel{border-color:var(--accent);background:rgba(245,158,11,.06)}.check{color:var(--dim);font-size:18px}.prestation.sel .check{color:var(--accent)}.pname{font-size:13px;font-weight:650}.punit{font-size:11px;color:var(--mut);margin-top:2px}.qty{grid-column:1/4;display:none;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:10px}.prestation.sel .qty{display:flex}.qty-controls{display:flex;gap:8px;align-items:center}.qty button{width:34px;height:34px;border-radius:10px;background:var(--surface2);color:var(--txt);border:1px solid var(--border);font-size:18px}.qty input{width:72px;text-align:center}.totalbar{position:sticky;bottom:70px;z-index:10;background:rgba(21,27,40,.95);border:1px solid rgba(245,158,11,.25);border-radius:18px;padding:14px;margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}.totalht{font-family:'DM Mono',monospace;font-size:21px;color:var(--accent);font-weight:800}.small{font-size:11px;color:var(--mut);line-height:1.4}.pdf{background:white;color:#111827;border-radius:18px;padding:26px;box-shadow:var(--shadow)}.pdf-head{display:flex;justify-content:space-between;gap:18px;border-bottom:2px solid #e5e7eb;padding-bottom:16px;margin-bottom:18px}.pdf-logo{font-weight:900;font-size:22px}.pdf-logo span{color:#f59e0b}.pdf-muted{color:#64748b;font-size:11px;line-height:1.6}.pdf-block{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:12px;font-size:12px;line-height:1.7}.pdf-title{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}.pdf-table{width:100%;border-collapse:collapse;font-size:11px}.pdf-table th{background:#111827;color:white;text-align:left;padding:9px}.pdf-table td{border-bottom:1px solid #e5e7eb;padding:9px;color:#374151}.pdf-totals{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-top:12px;font-size:12px}.pdf-final{font-size:17px;font-weight:900;border-top:2px solid #111827;padding-top:7px}.pdf-footer{border-top:1px solid #e5e7eb;margin-top:18px;padding-top:12px;text-align:center;color:#94a3b8;font-size:10px;line-height:1.5}.actions{display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:9px;margin-top:13px}.empty{background:var(--surface);border:1px dashed var(--border2);border-radius:18px;padding:22px;text-align:center;color:var(--mut);font-size:13px;line-height:1.6}.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%) translateY(30px);background:var(--accent2);color:white;font-size:13px;font-weight:800;border-radius:13px;padding:12px 18px;opacity:0;transition:.25s;z-index:80;box-shadow:var(--shadow);white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;z-index:60}.modal.show{display:flex}.sheet{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px;width:100%;max-height:88dvh;overflow:auto}.sheet h3{margin-bottom:12px}.danger-zone{border:1px solid rgba(239,68,68,.25);background:rgba(239,68,68,.07);border-radius:16px;padding:14px;margin-top:16px}
@media(min-width:760px){.nav{left:50%;transform:translateX(-50%);max-width:760px;border-radius:24px 24px 0 0;border-left:1px solid var(--border);border-right:1px solid var(--border)}.content{padding:24px 22px 105px}.cards{gap:14px}.quick{grid-template-columns:1fr 1fr 1fr}.sheet{max-width:620px;margin:auto;border-radius:24px}.modal{align-items:center}.actions{grid-template-columns:1fr 1fr 1fr}.pdf{padding:36px}}
@media(max-width:520px){.cards{grid-template-columns:1fr 1fr}.cards .card:last-child{grid-column:1/3}.row{grid-template-columns:1fr}.quick{grid-template-columns:1fr}.pdf{padding:18px;border-radius:14px}.pdf-head{flex-direction:column}.pdf-table{font-size:10px}.pdf-table th,.pdf-table td{padding:7px 5px}.actions{grid-template-columns:1fr}.totalbar{bottom:66px}.login{padding:22px}.grid-metier{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <section id="login" class="screen active">
    <div class="center">
      <div class="login">
        <div class="brand"><div class="brand-icon">🧾</div><h1>Devis<span>Express</span></h1><p>Devis propre, rapide et professionnel pour artisans, indépendants et créateurs de services.</p></div>
        <label class="label">Votre métier</label><div class="grid-metier" id="metierGrid"></div>
        <div class="row"><div><label class="label">Nom entreprise</label><input id="proCompanyStart" class="input" placeholder="Ex : Dubois Plomberie"></div><div><label class="label">Votre prénom</label><input id="proNameStart" class="input" placeholder="Ex : Marc"></div></div>
        <button class="btn btn-primary full" style="margin-top:16px" onclick="enterApp()">Accéder à mon espace →</button>
      </div>
    </div>
  </section>
 
  <section id="appScreen" class="screen">
    <header class="topbar"><div class="logo">Devis<span>Express</span></div><div class="top-actions"><div class="badge" id="metierBadge">🔧 Plombier</div><div class="avatar" id="avatar">M</div></div></header>
    <main class="content">
      <div id="viewHome"></div><div id="viewQuote" style="display:none"></div><div id="viewClients" style="display:none"></div><div id="viewArchive" style="display:none"></div><div id="viewProfile" style="display:none"></div>
    </main>
    <nav class="nav">
      <button class="active" onclick="setView('home',this)"><span>🏠</span>Accueil</button>
      <button onclick="startQuote();setView('quote',this)"><span>➕</span>Devis</button>
      <button onclick="setView('clients',this)"><span>👥</span>Clients</button>
      <button onclick="setView('archive',this)"><span>📁</span>Archive</button>
      <button onclick="setView('profile',this)"><span>⚙️</span>Profil</button>
    </nav>
  </section>
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<script>
const STORE='devisexpress_v1_data';
const today=new Date();
const fmtEUR=n=>(Math.round(n||0)).toLocaleString('fr-FR')+' €';
const métiers=[['Plombier','🔧'],['Électricien','⚡'],['Peintre','🖌️'],['Menuisier','🪵'],['Carreleur','🏠'],['Maçon','🧱'],['Couvreur','🏠'],['Paysagiste','🌿'],['Photographe','📸'],['Designer','🎨']];
const catalogues={
'Plombier':[['Débouchage canalisation',85,'forfait'],['Remplacement robinet',120,'u.'],['Réparation fuite',150,'forfait'],['Remplacement chauffe-eau',650,'forfait'],['Main d\'œuvre',65,'h']],
'Électricien':[['Mise aux normes tableau',450,'forfait'],['Installation prise/interrupteur',75,'u.'],['Pose luminaire',90,'u.'],['Borne recharge véhicule',1200,'forfait'],['Main d\'œuvre',60,'h']],
'Peintre':[['Peinture murs 2 couches',18,'m²'],['Peinture plafond',22,'m²'],['Préparation support',8,'m²'],['Pose papier peint',35,'m²'],['Main d\'œuvre',55,'h']],
'Menuisier':[['Pose porte intérieure',280,'u.'],['Fenêtre double vitrage',650,'u.'],['Parquet flottant',35,'m²'],['Placard sur mesure',1200,'u.'],['Main d\'œuvre',65,'h']],
'Carreleur':[['Pose carrelage sol',45,'m²'],['Pose faïence murs',55,'m²'],['Dépose ancien carrelage',15,'m²'],['Ragréage sol',12,'m²'],['Main d\'œuvre',55,'h']],
'Maçon':[['Enduit façade',40,'m²'],['Démolition cloison',35,'m²'],['Construction mur béton',180,'m²'],['Dalle béton',85,'m²'],['Main d\'œuvre',55,'h']],
'Couvreur':[['Réfection toiture tuiles',120,'m²'],['Pose gouttières',45,'ml'],['Nettoyage toiture',15,'m²'],['Pose fenêtre de toit',850,'u.'],['Main d\'œuvre',65,'h']],
'Paysagiste':[['Tonte pelouse',45,'forfait'],['Taille haie',35,'h'],['Création massif',280,'forfait'],['Gazon synthétique',65,'m²'],['Main d\'œuvre',50,'h']],
'Photographe':[['Shooting portrait',180,'forfait'],['Reportage événement',650,'forfait'],['Retouche photo',25,'photo'],['Album numérique',120,'forfait'],['Heure supplémentaire',90,'h']],
'Designer':[['Logo simple',350,'forfait'],['Identité visuelle',950,'forfait'],['Flyer / affiche',180,'u.'],['Maquette réseau social',90,'u.'],['Retouche / correction',60,'h']]
};
let data={pro:{name:'Marc',company:'Dubois Services',phone:'06 12 34 56 78',email:'contact@devisexpress.fr',siret:'123 456 789 00012',address:'12 rue des Artisans, 75011 Paris',metier:'Plombier',icon:'🔧',tva:10,validity:30,terms:'Devis valable 30 jours. Acompte de 30% à la commande. Solde à la fin des travaux.'},quotes:[],clients:[]};
let draft=null,step=1,currentView='home';
function save(){localStorage.setItem(STORE,JSON.stringify(data));}
function load(){const raw=localStorage.getItem(STORE);if(raw){try{data=JSON.parse(raw)}catch(e){}} if(!data.quotes.length){seed();save();}}
function seed(){data.clients=[{name:'Famille Dupont',phone:'06 98 76 54 32',email:'dupont@email.fr',address:'12 avenue de la République, Paris 75011'},{name:'SCI Rénov Paris',phone:'01 44 55 66 77',email:'contact@sci.fr',address:'8 rue Lafayette, Paris'}];data.quotes=[{id:devNum(),client:data.clients[0],items:[{name:'Remplacement chauffe-eau',price:650,unit:'forfait',qty:1},{name:'Main d\'œuvre',price:65,unit:'h',qty:3}],status:'sent',date:new Date().toISOString(),note:'Intervention prévue sous réserve de disponibilité.'},{id:devNum(),client:data.clients[1],items:[{name:'Réparation fuite',price:150,unit:'forfait',qty:1},{name:'Remplacement robinet',price:120,unit:'u.',qty:1}],status:'accepted',date:new Date(Date.now()-86400000).toISOString(),note:''}];}
function devNum(){return 'DEV-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000)}
function init(){load();renderMetiers();document.getElementById('proCompanyStart').value=data.pro.company;document.getElementById('proNameStart').value=data.pro.name;updateTop();renderAll();}
function renderMetiers(){const g=document.getElementById('metierGrid');g.innerHTML='';métiers.forEach(m=>{const b=document.createElement('button');b.className='metier'+(m[0]===data.pro.metier?' sel':'');b.innerHTML='<span>'+m[1]+'</span>'+m[0];b.onclick=()=>{data.pro.metier=m[0];data.pro.icon=m[1];renderMetiers();updateTop();};g.appendChild(b);});}
function enterApp(){data.pro.company=document.getElementById('proCompanyStart').value||data.pro.company;data.pro.name=document.getElementById('proNameStart').value||data.pro.name;save();updateTop();document.getElementById('login').classList.remove('active');document.getElementById('appScreen').classList.add('active');renderAll();}
function updateTop(){document.getElementById('metierBadge').textContent=data.pro.icon+' '+data.pro.metier;document.getElementById('avatar').textContent=(data.pro.name||'M')[0].toUpperCase();}
function setView(v,btn){currentView=v;['Home','Quote','Clients','Archive','Profile'].forEach(x=>document.getElementById('view'+x).style.display='none');document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1)).style.display='block';document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderAll();window.scrollTo(0,0);}
function renderAll(){renderHome();renderQuote();renderClients();renderArchive();renderProfile();}
function totals(q){let ht=q.items.reduce((s,i)=>s+i.price*i.qty,0),tva=Math.round(ht*(data.pro.tva||0)/100);return{ht,tva,ttc:ht+tva};}
function statusLabel(s){return{draft:'BROUILLON',sent:'ENVOYÉ',accepted:'ACCEPTÉ',refused:'REFUSÉ'}[s]||s}
function renderHome(){let sent=data.quotes.filter(q=>q.status==='sent').length,acc=data.quotes.filter(q=>q.status==='accepted').length,ca=data.quotes.filter(q=>q.status!=='refused').reduce((s,q)=>s+totals(q).ttc,0);document.getElementById('viewHome').innerHTML=`<div class="hgroup"><h2>Bonjour, ${data.pro.name||'Marc'} 👋</h2><p>${today.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} · ${sent} devis en attente de réponse</p></div><div class="cards"><div class="card"><div class="stat-label">Total devis</div><div class="stat-val">${data.quotes.length}</div><div class="stat-sub">sauvegardés</div></div><div class="card"><div class="stat-label">Acceptés</div><div class="stat-val">${acc}</div><div class="stat-sub">conversion ${(data.quotes.length?Math.round(acc/data.quotes.length*100):0)}%</div></div><div class="card"><div class="stat-label">CA estimé</div><div class="stat-val" style="font-size:20px">${fmtEUR(ca)}</div><div class="stat-sub">TTC hors refusés</div></div></div><div class="quick"><button class="btn btn-primary" onclick="startQuote();setView('quote',document.querySelectorAll('.nav button')[1])">➕ Nouveau devis</button><button class="btn btn-ghost" onclick="openClientSheet()">👥 Ajouter client</button><button class="btn btn-ghost" onclick="shareSummary()">📤 Partager résumé</button></div><div class="section-title">Derniers devis</div><div class="list">${quoteRows(data.quotes.slice().reverse().slice(0,5))}</div>`;}
function quoteRows(arr){if(!arr.length)return'<div class="empty">Aucun devis pour le moment.</div>';return arr.map(q=>{const t=totals(q);return`<div class="quote-row" onclick="openQuote('${q.id}')"><div><strong>${q.client.name}</strong><span>${q.id} · ${new Date(q.date).toLocaleDateString('fr-FR')} · ${q.items.length} ligne(s)</span></div><div style="text-align:right"><div class="money">${fmtEUR(t.ttc)}</div><div class="status s-${q.status}">${statusLabel(q.status)}</div></div></div>`}).join('')}
function startQuote(){draft={id:devNum(),date:new Date().toISOString(),status:'draft',client:{name:'',phone:'',email:'',address:''},items:[],type:'Intervention',note:''};step=1;}
function renderQuote(){if(!draft)startQuote();let html=`<div class="hgroup"><h2>Nouveau devis</h2><p>Étape ${step}/3 · Remplissez, choisissez les prestations, puis prévisualisez.</p></div><div class="stepbar"><div class="step ${step===1?'active':step>1?'done':''}">① Client</div><div class="step ${step===2?'active':step>2?'done':''}">② Prestations</div><div class="step ${step===3?'active':''}">③ Aperçu</div></div>`; if(step===1)html+=stepClient(); if(step===2)html+=stepItems(); if(step===3)html+=previewHtml(draft,true);document.getElementById('viewQuote').innerHTML=html;}
function stepClient(){return`<div class="form"><div><label class="label">Nom client</label><input class="input" id="cName" value="${draft.client.name}" placeholder="Ex : Famille Martin"></div><div class="row"><div><label class="label">Téléphone</label><input class="input" id="cPhone" value="${draft.client.phone}" placeholder="06 12 34 56 78"></div><div><label class="label">Email</label><input class="input" id="cEmail" value="${draft.client.email}" placeholder="client@email.fr"></div></div><div><label class="label">Adresse chantier</label><input class="input" id="cAddress" value="${draft.client.address}" placeholder="Adresse complète"></div><div><label class="label">Type intervention</label><div class="chips">${['Urgence','Rénovation','Installation','Entretien','Diagnostic'].map(x=>`<button class="chip ${draft.type===x?'sel':''}" onclick="draft.type='${x}';renderQuote()">${x}</button>`).join('')}</div></div><button class="btn btn-primary full" onclick="saveClientStep();step=2;renderQuote()">Choisir les prestations →</button></div>`}
function saveClientStep(){draft.client={name:val('cName')||'Client',phone:val('cPhone'),email:val('cEmail'),address:val('cAddress')};}
function val(id){return(document.getElementById(id)?.value||'').trim()}
function stepItems(){let cat=(catalogues[data.pro.metier]||catalogues.Plombier).map((p,i)=>({id:i+1,name:p[0],price:p[1],unit:p[2]}));let t=totals(draft);return`<div class="list">${cat.map(p=>prestationHtml(p)).join('')}</div><button class="btn btn-ghost full" style="margin-top:10px" onclick="openCustomItem()">➕ Ajouter une ligne personnalisée</button><div class="totalbar"><div><div class="small">Total HT</div><div class="totalht">${fmtEUR(t.ht)}</div><div class="small">TVA ${data.pro.tva}% · TTC ${fmtEUR(t.ttc)}</div></div><button class="btn btn-primary" onclick="step=3;renderQuote()">Aperçu →</button></div>`}
function prestationHtml(p){let item=draft.items.find(i=>i.name===p.name),sel=!!item;return`<div class="prestation ${sel?'sel':''}" onclick="toggleItem('${p.name}',${p.price},'${p.unit}')"><div class="check">${sel?'✓':'○'}</div><div><div class="pname">${p.name}</div><div class="punit">${p.price} € / ${p.unit}</div></div><div class="money">${sel?fmtEUR(item.price*item.qty):fmtEUR(p.price)}</div>${sel?`<div class="qty" onclick="event.stopPropagation()"><span class="small">Quantité</span><div class="qty-controls"><button onclick="changeItemQty('${p.name}',-1)">−</button><input class="input" value="${item.qty}" onchange="setItemQty('${p.name}',this.value)"><button onclick="changeItemQty('${p.name}',1)">+</button></div></div>`:''}</div>`}
function toggleItem(name,price,unit){let idx=draft.items.findIndex(i=>i.name===name);if(idx>=0)draft.items.splice(idx,1);else draft.items.push({name,price,unit,qty:1});renderQuote();}
function changeItemQty(name,d){let i=draft.items.find(x=>x.name===name);if(i){i.qty=Math.max(1,(+i.qty||1)+d);renderQuote();}}
function setItemQty(name,v){let i=draft.items.find(x=>x.name===name);if(i){i.qty=Math.max(1,parseFloat(v)||1);renderQuote();}}
function openCustomItem(){sheet(`<h3>Ajouter une prestation</h3><div class="form"><input id="xName" class="input" placeholder="Nom prestation"><div class="row"><input id="xPrice" class="input" type="number" placeholder="Prix HT"><input id="xUnit" class="input" placeholder="Unité : h, m², forfait"></div><button class="btn btn-primary full" onclick="addCustomItem()">Ajouter</button></div>`)}
function addCustomItem(){let name=val('xName'),price=parseFloat(val('xPrice')),unit=val('xUnit')||'forfait';if(!name||!price)return toast('Complète la prestation');draft.items.push({name,price,unit,qty:1});closeModal();renderQuote();}
function previewHtml(q,withActions){let t=totals(q);return`<div class="pdf" id="pdfArea"><div class="pdf-head"><div><div class="pdf-logo">${data.pro.company||'DevisExpress'}<span>.</span></div><div class="pdf-muted">${q.id}<br>Date : ${new Date(q.date).toLocaleDateString('fr-FR')} · Validité : ${data.pro.validity} jours</div></div><div class="pdf-muted" style="text-align:right"><strong style="color:#111827">${data.pro.name} · ${data.pro.metier}</strong><br>${data.pro.phone}<br>${data.pro.email}<br>SIRET : ${data.pro.siret}</div></div><div class="pdf-title">Client</div><div class="pdf-block"><strong>${q.client.name||'Client'}</strong><br>${q.client.address||'Adresse chantier non renseignée'}<br>📞 ${q.client.phone||'Téléphone'} · ${q.client.email||'Email'}</div><div class="pdf-title">Détail des prestations</div><table class="pdf-table"><thead><tr><th>Prestation</th><th>Qté</th><th>Unité</th><th>P.U. HT</th><th>Total HT</th></tr></thead><tbody>${q.items.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.unit}</td><td>${fmtEUR(i.price)}</td><td>${fmtEUR(i.price*i.qty)}</td></tr>`).join('')||'<tr><td colspan="5">Aucune prestation sélectionnée</td></tr>'}</tbody></table><div class="pdf-totals"><div>Sous-total HT : <strong>${fmtEUR(t.ht)}</strong></div><div>TVA ${data.pro.tva}% : <strong>${fmtEUR(t.tva)}</strong></div><div class="pdf-final">Total TTC : ${fmtEUR(t.ttc)}</div></div><div class="pdf-title">Conditions</div><div class="pdf-block">${q.note||data.pro.terms}</div><div class="pdf-footer">Bon pour accord avec signature client · Devis généré avec DevisExpress</div></div>${withActions?`<div class="actions"><button class="btn btn-ghost" onclick="step=2;renderQuote()">← Modifier</button><button class="btn btn-ghost" onclick="downloadPDF(draft)">📄 PDF</button><button class="btn btn-green" onclick="saveQuote('sent')">📤 Enregistrer / envoyer</button></div>`:''}`}
function saveQuote(status){if(!draft.client.name)return toast('Nom client obligatoire');if(!draft.items.length)return toast('Ajoute au moins une prestation');draft.status=status;data.quotes.push(JSON.parse(JSON.stringify(draft)));if(!data.clients.some(c=>c.name.toLowerCase()===draft.client.name.toLowerCase()))data.clients.push(draft.client);save();toast('Devis sauvegardé');startQuote();setView('home',document.querySelectorAll('.nav button')[0]);}
function openQuote(id){let q=data.quotes.find(x=>x.id===id);if(!q)return;sheet(previewHtml(q,false)+`<div class="actions"><button class="btn btn-ghost" onclick="downloadPDFById('${id}')">📄 PDF</button><button class="btn btn-green" onclick="shareQuote('${id}')">WhatsApp</button><button class="btn btn-red" onclick="deleteQuote('${id}')">Supprimer</button></div><div class="actions"><button class="btn btn-ghost" onclick="changeStatus('${id}','accepted')">Accepté</button><button class="btn btn-ghost" onclick="changeStatus('${id}','refused')">Refusé</button><button class="btn btn-ghost" onclick="changeStatus('${id}','sent')">Envoyé</button></div>`)}
function renderClients(){document.getElementById('viewClients').innerHTML=`<div class="hgroup"><h2>Clients</h2><p>Carnet d’adresses local, sauvegardé sur cet appareil.</p></div><button class="btn btn-primary full" onclick="openClientSheet()">➕ Ajouter un client</button><div class="section-title">Liste clients</div><div class="list">${data.clients.map(c=>`<div class="client-row"><div><strong>${c.name}</strong><span>${c.phone||''} · ${c.email||''}<br>${c.address||''}</span></div><button class="btn btn-ghost btn-small" onclick='useClient(${JSON.stringify(c)})'>Devis</button></div>`).join('')||'<div class="empty">Aucun client.</div>'}</div>`}
function openClientSheet(){sheet(`<h3>Nouveau client</h3><div class="form"><input id="newCName" class="input" placeholder="Nom"><input id="newCPhone" class="input" placeholder="Téléphone"><input id="newCEmail" class="input" placeholder="Email"><input id="newCAddress" class="input" placeholder="Adresse"><button class="btn btn-primary full" onclick="addClient()">Enregistrer</button></div>`)}
function addClient(){let c={name:val('newCName'),phone:val('newCPhone'),email:val('newCEmail'),address:val('newCAddress')};if(!c.name)return toast('Nom obligatoire');data.clients.push(c);save();closeModal();renderAll();toast('Client ajouté');}
function useClient(c){startQuote();draft.client=c;closeModal();setView('quote',document.querySelectorAll('.nav button')[1]);}
function renderArchive(){document.getElementById('viewArchive').innerHTML=`<div class="hgroup"><h2>Archive devis</h2><p>Tous les devis enregistrés sur cet appareil.</p></div><div class="list">${quoteRows(data.quotes.slice().reverse())}</div>`}
function renderProfile(){document.getElementById('viewProfile').innerHTML=`<div class="hgroup"><h2>Profil professionnel</h2><p>Ces informations apparaissent sur vos devis.</p></div><div class="form"><div class="row"><div><label class="label">Prénom</label><input id="pName" class="input" value="${data.pro.name}"></div><div><label class="label">Entreprise</label><input id="pCompany" class="input" value="${data.pro.company}"></div></div><div class="row"><div><label class="label">Téléphone</label><input id="pPhone" class="input" value="${data.pro.phone}"></div><div><label class="label">Email</label><input id="pEmail" class="input" value="${data.pro.email}"></div></div><div><label class="label">Adresse entreprise</label><input id="pAddress" class="input" value="${data.pro.address}"></div><div class="row"><div><label class="label">SIRET</label><input id="pSiret" class="input" value="${data.pro.siret}"></div><div><label class="label">TVA %</label><input id="pTva" type="number" class="input" value="${data.pro.tva}"></div></div><div><label class="label">Conditions devis</label><textarea id="pTerms" class="textarea">${data.pro.terms}</textarea></div><button class="btn btn-primary full" onclick="saveProfile()">Sauvegarder le profil</button><div class="danger-zone"><div class="small">Zone de test</div><button class="btn btn-red full" onclick="resetData()">Réinitialiser les données locales</button></div></div>`}
function saveProfile(){data.pro.name=val('pName');data.pro.company=val('pCompany');data.pro.phone=val('pPhone');data.pro.email=val('pEmail');data.pro.address=val('pAddress');data.pro.siret=val('pSiret');data.pro.tva=parseFloat(val('pTva'))||0;data.pro.terms=val('pTerms');save();updateTop();toast('Profil sauvegardé');renderAll();}
function changeStatus(id,s){let q=data.quotes.find(x=>x.id===id);if(q){q.status=s;save();closeModal();renderAll();toast('Statut modifié')}}
function deleteQuote(id){if(!confirm('Supprimer ce devis ?'))return;data.quotes=data.quotes.filter(q=>q.id!==id);save();closeModal();renderAll();toast('Devis supprimé')}
function shareSummary(){let msg=`Résumé DevisExpress : ${data.quotes.length} devis, CA estimé ${fmtEUR(data.quotes.filter(q=>q.status!=='refused').reduce((s,q)=>s+totals(q).ttc,0))}.`;shareText(msg)}
function shareQuote(id){let q=data.quotes.find(x=>x.id===id),t=totals(q);shareText(`Bonjour ${q.client.name}, voici votre devis ${q.id} d'un montant de ${fmtEUR(t.ttc)} TTC. Cordialement, ${data.pro.company}.`)}
function shareText(text){if(navigator.share)navigator.share({text}).catch(()=>{});else{navigator.clipboard?.writeText(text);toast('Texte copié')}}
function downloadPDFById(id){let q=data.quotes.find(x=>x.id===id);downloadPDF(q)}
function downloadPDF(q){if(!window.jspdf){toast('PDF indisponible hors connexion');return}const{jsPDF}=window.jspdf;const doc=new jsPDF();let y=16,t=totals(q);doc.setFontSize(18);doc.text(data.pro.company||'DevisExpress',14,y);doc.setFontSize(10);y+=8;doc.text(`${q.id} - ${new Date(q.date).toLocaleDateString('fr-FR')}`,14,y);y+=10;doc.text(`Client : ${q.client.name}`,14,y);y+=6;doc.text(`Adresse : ${q.client.address||''}`,14,y);y+=6;doc.text(`Contact : ${q.client.phone||''} ${q.client.email||''}`,14,y);y+=12;doc.setFontSize(12);doc.text('Prestations',14,y);y+=8;doc.setFontSize(10);q.items.forEach(i=>{doc.text(`${i.name} - Qté ${i.qty} - ${fmtEUR(i.price*i.qty)} HT`,14,y);y+=7;if(y>270){doc.addPage();y=16;}});y+=5;doc.text(`Sous-total HT : ${fmtEUR(t.ht)}`,130,y);y+=7;doc.text(`TVA ${data.pro.tva}% : ${fmtEUR(t.tva)}`,130,y);y+=7;doc.setFontSize(13);doc.text(`Total TTC : ${fmtEUR(t.ttc)}`,130,y);doc.save(`${q.id}.pdf`);toast('PDF téléchargé')}
function sheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal()}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function resetData(){if(!confirm('Tout supprimer sur cet appareil ?'))return;localStorage.removeItem(STORE);location.reload()}
init();
</script>
 
<script>
// ── Service Worker (PWA offline)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('SW ok'))
      .catch(e => console.log('SW:', e));
  });
}
 
// ── Bannière installation iPhone
window.addEventListener('load', () => {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const dismissed = localStorage.getItem('pwa_banner_dismissed');
  if (isIOS && !isStandalone && !dismissed) {
    setTimeout(() => {
      const banner = document.createElement('div');
      banner.id = 'pwa-banner';
      banner.innerHTML = `
        <div style="position:fixed;bottom:0;left:0;right:0;z-index:999;background:#1d2638;border-top:2px solid rgba(245,158,11,.4);padding:16px 18px 32px;display:flex;align-items:center;gap:14px;box-shadow:0 -8px 30px rgba(0,0,0,.5);">
          <div style="font-size:36px">🔧</div>
          <div style="flex:1">
            <div style="font-weight:800;font-size:14px;color:#f8fafc;">Installer DevisExpress</div>
            <div style="font-size:12px;color:#94a3b8;margin-top:3px;">Appuyez sur <strong style="color:#f59e0b;">Partager</strong> puis <strong style="color:#f59e0b;">"Sur l'écran d'accueil"</strong></div>
          </div>
          <button onclick="document.getElementById('pwa-banner').remove();localStorage.setItem('pwa_banner_dismissed','1')" style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#f59e0b;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;">✕</button>
        </div>`;
      document.body.appendChild(banner);
    }, 3000);
  }
});
</script>
</body>
