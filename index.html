const JOBS=BASE_JOBS.map(j=>({n:j[0],i:j[1],c:j[2],g:j[3],p:j[4].split(';').map(x=>{const a=x.split('|');return{name:a[0],price:+a[1],unit:a[2]}})}));
let data={pro:{name:'',company:'',phone:'',email:'',siret:'',address:'',metier:'Plombier',icon:'🔧',tva:10,validity:30,terms:'Devis valable 30 jours. Acompte de 30% à la commande. Solde à réception de facture.'},tarifs:{},quotes:[],clients:[],customJobs:[]};
let draft=null,step=1,activeMetierTab=0,profileTab='profil',tarifJob='Plombier',jobFilter='Tous',jobSearch='';
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const attr=esc;
function val(id){return ($(id)?.value||'').trim()}
function save(){localStorage.setItem(STORE,JSON.stringify(data))}
function load(){try{const r=localStorage.getItem(STORE);if(r)data={...data,...JSON.parse(r)}}catch(e){console.warn(e)}if(!data.tarifs)data.tarifs={};if(!data.customJobs)data.customJobs=[];data.quotes=(data.quotes||[]).map(q=>{q.metiers=q.metiers||[data.pro.metier||'Plombier'];q.items=(q.items||[]).map((it,i)=>it.key?it:{...it,metier:q.metiers[0],key:q.metiers[0]+'__'+it.name+'__old_'+i});return q})}
function allJobs(){return JOBS.concat(data.customJobs||[])}
function job(n){return allJobs().find(j=>j.n===n)||JOBS[0]}
function initTarifs(n){if(!data.tarifs[n])data.tarifs[n]=job(n).p.map(x=>({...x}))}
function getCat(n){initTarifs(n);return data.tarifs[n]}
function totals(q){const ht=(q.items||[]).reduce((s,i)=>s+(+i.price||0)*(+i.qty||0),0),tva=Math.round(ht*(+data.pro.tva||0)/100);return{ht,tva,ttc:ht+tva}}
function statusLabel(s){return{draft:'BROUILLON',sent:'ENVOYÉ',follow:'À RELANCER',accepted:'ACCEPTÉ',refused:'REFUSÉ',invoiced:'FACTURÉ',paid:'PAYÉ'}[s]||s}
function devNum(){return'DEV-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000)}
function invoiceNum(){return'FAC-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000)}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800)}
function renderMetiers(){const g=$('metierGrid');g.innerHTML='';START_JOBS.forEach(n=>{const j=job(n),b=document.createElement('button');b.className='metier'+(n===data.pro.metier?' sel':'');b.innerHTML='<span>'+j.i+'</span>'+esc(j.n)+(j.g?'<br><small style="color:#fcd34d">en croissance</small>':'');b.onclick=()=>{data.pro.metier=j.n;data.pro.icon=j.i;save();renderMetiers();updateTop()};g.appendChild(b)})}
function updateTop(){const j=job(data.pro.metier);data.pro.icon=j.i;$('metierBadge').textContent=j.i+' '+j.n;$('avatar').textContent=(data.pro.name||'?')[0].toUpperCase()}
function enterApp(){const n=val('proNameStart'),c=val('proCompanyStart');if(!n)return toast('⚠️ Entrez votre prénom');data.pro.name=n;data.pro.company=c||n;save();updateTop();$('login').classList.remove('active');$('appScreen').classList.add('active');renderAll()}
function setView(v,btn){['Home','Quote','Clients','Follow','Profile'].forEach(x=>$('view'+x).style.display='none');$('view'+v[0].toUpperCase()+v.slice(1)).style.display='block';document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderAll();scrollTo(0,0)}
function renderAll(){renderHome();renderQuote();renderClients();renderFollow();renderProfile()}
function quoteRows(arr){if(!arr.length)return'<div class="empty">Aucun document pour le moment.</div>';return arr.map(q=>{const t=totals(q);return`<div class="quote-row" onclick="openQuote('${attr(q.id)}')"><div><strong>${esc(q.client.name||'Client')}</strong><span>${esc(q.invoiceId||q.id)} · ${new Date(q.date).toLocaleDateString('fr-FR')} · ${esc((q.metiers||[]).join(' + '))} · ${(q.items||[]).length} ligne(s)</span></div><div style="text-align:right"><div class="money">${fmtEUR(t.ttc)}</div><div class="status s-${q.status}">${statusLabel(q.status)}</div></div></div>`}).join('')}
function renderHome(){const q=data.quotes||[],acc=q.filter(x=>['accepted','paid','invoiced'].includes(x.status)).length,follow=q.filter(x=>['follow','sent'].includes(x.status)).length,ca=q.filter(x=>x.status!=='refused').reduce((s,x)=>s+totals(x).ttc,0);$('viewHome').innerHTML=`<div class="hgroup"><h2>Bonjour, ${esc(data.pro.name||'!')} 👋</h2><p>${today.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} · ${follow} devis à suivre</p></div><div class="cards"><div class="card"><div class="stat-label">Devis</div><div class="stat-val">${q.length}</div><div class="stat-sub">créés</div></div><div class="card"><div class="stat-label">Acceptés</div><div class="stat-val">${acc}</div><div class="stat-sub">${q.length?Math.round(acc/q.length*100):0}%</div></div><div class="card"><div class="stat-label">CA TTC</div><div class="stat-val" style="font-size:16px">${fmtEUR(ca)}</div><div class="stat-sub">estimé</div></div></div><div class="quick"><button class="btn btn-primary" onclick="startQuote();setView('quote',$('navQuote'))">➕ Nouveau devis</button><button class="btn btn-ghost" onclick="openClientSheet()">👥 Ajouter client</button><button class="btn btn-blue" onclick="setView('follow',$('navFollow'))">📊 Suivre activité</button></div><div class="section-title"><span>Derniers documents</span><button class="btn btn-ghost btn-small" onclick="setView('follow',$('navFollow'))">Tout voir</button></div><div class="list">${quoteRows(q.slice().reverse().slice(0,6))}</div>`}
function startQuote(){draft={id:devNum(),date:new Date().toISOString(),status:'draft',client:{name:'',phone:'',email:'',address:''},items:[],type:'Intervention',note:'',metiers:[data.pro.metier]};step=1;activeMetierTab=0}
function flushClient(){if(!draft)return;draft.client={name:val('cName')||draft.client.name||'',phone:val('cPhone')||draft.client.phone||'',email:val('cEmail')||draft.client.email||'',address:val('cAddress')||draft.client.address||''};draft.note=val('cNote')||draft.note||''}
function goStep(n){flushClient();step=n;renderQuote();scrollTo(0,0)}
function renderQuote(){if(!draft)startQuote();if(!draft.metiers)draft.metiers=[data.pro.metier];const bar=`<div class="stepbar"><div class="step ${step===1?'active':step>1?'done':''}" onclick="goStep(1)">① Client</div><div class="step ${step===2?'active':step>2?'done':''}" onclick="goStep(2)">② Prestations</div><div class="step ${step===3?'active':''}" onclick="goStep(3)">③ Aperçu</div></div>`;let html=`<div class="hgroup"><h2>Nouveau devis</h2><p>Étape ${step}/3 · multi-métiers possible</p></div>${bar}`;if(step===1)html+=stepClient();if(step===2)html+=stepItems();if(step===3)html+=previewHtml(draft,true);$('viewQuote').innerHTML=html}
function stepClient(){return`<div class="form"><div class="quick"><button class="btn btn-ghost" onclick="fillExampleClient()">⚡ Exemple rapide</button><button class="btn btn-ghost" onclick="useLastClient()">👥 Dernier client</button></div><div><label class="label">Nom client *</label><input class="input" id="cName" value="${attr(draft.client.name)}" placeholder="Ex : Famille Martin" oninput="draft.client.name=this.value"></div><div class="row"><div><label class="label">Téléphone</label><input class="input" id="cPhone" value="${attr(draft.client.phone)}" inputmode="tel" placeholder="06 12 34 56 78" oninput="draft.client.phone=this.value"></div><div><label class="label">Email</label><input class="input" id="cEmail" value="${attr(draft.client.email)}" inputmode="email" placeholder="client@email.fr" oninput="draft.client.email=this.value"></div></div><div><label class="label">Adresse chantier</label><input class="input" id="cAddress" value="${attr(draft.client.address)}" placeholder="Adresse complète" oninput="draft.client.address=this.value"></div><div><label class="label">Notes / description</label><textarea class="textarea" id="cNote" oninput="draft.note=this.value" placeholder="Décrivez l'intervention...">${esc(draft.note||'')}</textarea></div><div><label class="label">Type intervention</label><div class="chips">${['Urgence','Rénovation','Installation','Entretien','Diagnostic'].map(x=>`<button class="chip ${draft.type===x?'sel':''}" onclick="draft.type='${x}';renderQuote()">${x}</button>`).join('')}</div></div><button class="btn btn-primary full" onclick="goStep(2)">Choisir les prestations →</button></div>`}
function fillExampleClient(){draft.client={name:'Client devis',phone:'',email:'',address:''};draft.note='Intervention à chiffrer sur place.';renderQuote()}
function useLastClient(){const c=(data.clients||[]).slice().reverse()[0];if(!c)return toast('Aucun client enregistré');draft.client={...c};renderQuote();toast('✅ Dernier client ajouté')}
function stepItems(){if(activeMetierTab>=draft.metiers.length)activeMetierTab=0;const tabs=draft.metiers.map((m,i)=>{const j=job(m);return`<button class="mtab ${i===activeMetierTab?'active':''}" onclick="activeMetierTab=${i};renderQuote()">${j.i} ${esc(j.n)}${draft.metiers.length>1?`<span class="x" onclick="event.stopPropagation();removeMetier(${i})">✕</span>`:''}</button>`}).join('');const cur=draft.metiers[activeMetierTab],cat=getCat(cur),t=totals(draft);return`<div><label class="label">Corps de métier du devis</label><div class="mtabs">${tabs}<button class="mtab" onclick="openJobPicker()">＋ Métier</button></div></div><div class="list" style="padding-bottom:38px">${cat.map(p=>prestHtml(cur,p)).join('')}</div><button class="btn btn-ghost full" style="margin-top:10px;margin-bottom:22px" onclick="openCustomItem()">➕ Ajouter une ligne personnalisée</button><div class="totalbar"><div><div class="small">Total HT</div><div class="totalht">${fmtEUR(t.ht)}</div><div class="small">TVA ${data.pro.tva}% · TTC ${fmtEUR(t.ttc)}</div></div><button class="btn btn-primary" onclick="goStep(3)">Aperçu →</button></div>`}
function removeMetier(i){const m=draft.metiers[i];draft.metiers.splice(i,1);draft.items=draft.items.filter(x=>x.metier!==m);if(!draft.metiers.length)draft.metiers=[data.pro.metier];activeMetierTab=Math.max(0,activeMetierTab-1);renderQuote()}
function openJobPicker(){sheet(`<h3>Ajouter un métier</h3><input id="jobSearchModal" class="input" placeholder="Rechercher : clim, borne, nettoyage..." oninput="renderJobPickerList(this.value)"><div class="chips" style="margin:10px 0">${CATEGORIES.map(c=>`<button class="chip" onclick="renderJobPickerList($('jobSearchModal').value,'${attr(c)}')">${esc(c)}</button>`).join('')}</div><div id="jobPickerList"></div>`);renderJobPickerList('','Tous')}
function renderJobPickerList(q='',cat='Tous'){const box=$('jobPickerList');if(!box)return;const s=q.toLowerCase();box.innerHTML=(allJobs().filter(j=>!draft.metiers.includes(j.n)).filter(j=>(cat==='Tous'||j.c===cat)&&(!s||j.n.toLowerCase().includes(s)||j.c.toLowerCase().includes(s))).map(j=>`<div class="job-row" onclick="addMetier('${attr(j.n)}')"><div><strong>${j.i} ${esc(j.n)}${j.g?'<span class="growth">⭐ croissance</span>':''}</strong><span>${esc(j.c)} · ${j.p.length} prestations</span></div><button class="btn btn-primary btn-small">Ajouter</button></div>`).join('')||'<div class="empty">Aucun métier trouvé.</div>')+`<button class="btn btn-ghost full" style="margin-top:10px" onclick="openCustomJobSheet()">➕ Je ne trouve pas mon métier</button>`}
function addMetier(n){if(!draft.metiers.includes(n)){draft.metiers.push(n);activeMetierTab=draft.metiers.length-1}closeModal();renderQuote()}
function openCustomJobSheet(fromLogin=false){sheet(`<h3>Créer un métier</h3><p class="small" style="margin-bottom:12px">Le métier sera sauvegardé sur ce téléphone. Vous pourrez modifier ses prestations dans Profil > Tarifs.</p><div class="form"><input id="customJobName" class="input" placeholder="Nom du métier *"><input id="customJobIcon" class="input" placeholder="Emoji/icône, ex : 🛠️" value="🛠️"><select id="customJobCat" class="select">${CATEGORIES.filter(c=>c!=='Tous').map(c=>`<option value="${attr(c)}">${esc(c)}</option>`).join('')}</select><button class="btn btn-primary full" onclick="saveCustomJob(${fromLogin?'true':'false'})">Créer ce métier</button></div>`)}
function saveCustomJob(fromLogin=false){const name=val('customJobName'),icon=val('customJobIcon')||'🛠️',cat=val('customJobCat')||'Services';if(!name)return toast('Nom du métier obligatoire');if(allJobs().some(j=>j.n.toLowerCase()===name.toLowerCase()))return toast('Ce métier existe déjà');const newJob={n:name,i:icon,c:cat,g:0,p:[{name:'Main d’œuvre',price:50,unit:'h'},{name:'Déplacement',price:35,unit:'forfait'},{name:'Prestation personnalisée',price:100,unit:'forfait'}]};data.customJobs.push(newJob);data.tarifs[name]=newJob.p.map(x=>({...x}));data.pro.metier=name;data.pro.icon=icon;save();if(draft&&!fromLogin)addMetier(name);closeModal();renderMetiers();updateTop();renderAll();toast('✅ Métier ajouté')}
function prestHtml(m,p){const key=m+'__'+p.name,ek=encodeURIComponent(key),item=draft.items.find(i=>i.key===key),sel=!!item;return`<div class="prestation ${sel?'sel':''}" onclick="toggleItemByKey('${ek}')"><div class="check">${sel?'✓':'○'}</div><div><div class="pname">${esc(p.name)}</div><div class="punit">${esc(m)} · ${fmtEUR(p.price)} / ${esc(p.unit)}</div></div><div class="money">${sel?fmtEUR(item.price*item.qty):fmtEUR(p.price)}</div>${sel?`<div class="line-edit" onclick="event.stopPropagation()"><div><label class="label">Intitulé</label><input class="input" value="${attr(item.name)}" onchange="setNameKey('${ek}',this.value)"></div><div><label class="label">Prix HT</label><input class="input" type="number" value="${attr(item.price)}" onchange="setPriceKey('${ek}',this.value)"></div><div><label class="label">Unité</label><input class="input" value="${attr(item.unit)}" onchange="setUnitKey('${ek}',this.value)"></div></div><div class="qty" onclick="event.stopPropagation()"><span class="small">Quantité</span><div class="qty-controls"><button type="button" onclick="chgQtyKey('${ek}',-1);event.stopPropagation()">−</button><input class="input" value="${attr(item.qty)}" onchange="setQtyKey('${ek}',this.value)" onclick="event.stopPropagation()"><button type="button" onclick="chgQtyKey('${ek}',1);event.stopPropagation()">+</button></div></div>`:''}</div>`}
function toggleItemByKey(encodedKey){const key=decodeURIComponent(encodedKey),parts=key.split('__'),metier=parts[0],name=parts.slice(1).join('__'),p=getCat(metier).find(x=>x.name===name);if(!p)return;const i=draft.items.findIndex(x=>x.key===key);if(i>=0)draft.items.splice(i,1);else draft.items.push({key,metier,name:p.name,price:p.price,unit:p.unit,qty:1});renderQuote()}
function chgQtyKey(k,d){const i=draft.items.find(x=>x.key===decodeURIComponent(k));if(i){i.qty=Math.max(1,(+i.qty||1)+d);renderQuote()}}
function setQtyKey(k,v){const i=draft.items.find(x=>x.key===decodeURIComponent(k));if(i){i.qty=Math.max(1,parseFloat(v)||1);renderQuote()}}
function setPriceKey(k,v){const i=draft.items.find(x=>x.key===decodeURIComponent(k));if(i){i.price=Math.max(0,parseFloat(v)||0);renderQuote()}}
function setUnitKey(k,v){const i=draft.items.find(x=>x.key===decodeURIComponent(k));if(i){i.unit=v||'forfait';renderQuote()}}
function setNameKey(k,v){const i=draft.items.find(x=>x.key===decodeURIComponent(k));if(i&&v.trim()){i.name=v.trim();renderQuote()}}
function openCustomItem(){const m=draft.metiers[activeMetierTab];sheet(`<h3>➕ Prestation personnalisée</h3><p class="small" style="margin-bottom:10px">Métier : <strong>${esc(m)}</strong></p><div class="form"><input id="xName" class="input" placeholder="Désignation"><div class="row"><input id="xPrice" class="input" type="number" placeholder="Prix HT"><input id="xUnit" class="input" placeholder="Unité"></div><input id="xQty" class="input" type="number" value="1"><button class="btn btn-primary full" onclick="addCustomItem()">Ajouter au devis</button></div>`)}
function addCustomItem(){const name=val('xName'),price=parseFloat(val('xPrice')),unit=val('xUnit')||'forfait',qty=parseFloat(val('xQty'))||1;if(!name||!price)return toast('⚠️ Désignation et prix obligatoires');const metier=draft.metiers[activeMetierTab]||data.pro.metier;draft.items.push({key:metier+'__'+name+'__custom_'+Date.now(),metier,name,price,unit,qty});closeModal();renderQuote();toast('✅ Prestation ajoutée')}
function previewHtml(q,withActions){const t=totals(q),exp=new Date(q.date);exp.setDate(exp.getDate()+(data.pro.validity||30));const isInv=!!q.invoiceId,docTitle=isInv?'Facture':'Devis';const rows=(q.items||[]).map(i=>`<tr><td>${i.metier?'<strong style="color:#111827">'+esc(i.metier)+'</strong><br>':''}${esc(i.name)}</td><td style="text-align:center">${esc(i.qty)}</td><td>${esc(i.unit)}</td><td style="text-align:right">${fmtEUR(i.price)}</td><td style="text-align:right;font-weight:bold">${fmtEUR(i.price*i.qty)}</td></tr>`).join('')||'<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:12px">Aucune prestation</td></tr>';return`<div class="pdf"><div class="pdf-head"><div><div class="pdf-logo">${esc(data.pro.company||'DevisExpress')}<span>.</span></div><div class="pdf-muted" style="margin-top:5px"><strong style="color:#111827">${esc((q.metiers||[data.pro.metier]).join(' · '))}</strong><br>${esc(data.pro.phone||'')}<br>${esc(data.pro.email||'')}<br>${data.pro.siret?'SIRET : '+esc(data.pro.siret):''}<br>${esc(data.pro.address||'')}</div></div><div class="pdf-muted" style="text-align:right"><strong style="color:#111827;font-size:16px">${docTitle} ${esc(q.invoiceId||q.id)}</strong><br>Date : ${new Date(q.date).toLocaleDateString('fr-FR')}<br>${isInv?'Payée le':'Validité'} : ${isInv?new Date(q.paidAt||Date.now()).toLocaleDateString('fr-FR'):exp.toLocaleDateString('fr-FR')}<br>Statut : ${statusLabel(q.status)}</div></div><div class="pdf-title">Client</div><div class="pdf-block"><strong>${esc(q.client.name||'Client')}</strong><br>${esc(q.client.address||'Adresse non renseignée')}<br>${q.client.phone?'Tél : '+esc(q.client.phone):''}${q.client.email?' · '+esc(q.client.email):''}</div>${q.note?`<div class="pdf-title">Notes</div><div class="pdf-block">${esc(q.note)}</div>`:''}<div class="pdf-title">Détail des prestations</div><table class="pdf-table"><thead><tr><th>Prestation</th><th style="text-align:center">Qté</th><th>Unité</th><th style="text-align:right">P.U. HT</th><th style="text-align:right">Total HT</th></tr></thead><tbody>${rows}</tbody></table><div class="pdf-totals"><div>Sous-total HT : <strong>${fmtEUR(t.ht)}</strong></div><div>TVA ${data.pro.tva}% : <strong>${fmtEUR(t.tva)}</strong></div><div class="pdf-final">Total TTC : ${fmtEUR(t.ttc)}</div></div><div class="pdf-sign"><div class="pdf-muted"><strong>${esc(data.pro.company||data.pro.name)}</strong><br>${esc(data.pro.address||'')}</div><div style="text-align:center"><div style="font-size:9px;color:#64748b;margin-bottom:4px">${isInv?'Facture acquittée':'Bon pour accord – Signature client'}</div><div class="sign-box">${isInv?'Payé':'Signature + date'}</div></div></div><div class="pdf-title">Conditions</div><div class="pdf-block">${esc(data.pro.terms||'Devis valable 30 jours.')}</div><div class="pdf-footer">Document généré avec DevisExpress</div></div>${withActions?`<div class="actions"><button class="btn btn-ghost" onclick="goStep(2)">← Modifier</button><button class="btn btn-ghost" onclick="downloadPDF(draft)">📄 PDF</button><button class="btn btn-green" onclick="saveAndShare()">📤 Enregistrer</button></div>`:''}`}
function saveAndShare(){flushClient();if(!draft.client.name)return toast('⚠️ Nom client obligatoire');if(!draft.items.length)return toast('⚠️ Ajoute au moins une prestation');draft.status='sent';const idx=data.quotes.findIndex(x=>x.id===draft.id);if(idx>=0)data.quotes[idx]=JSON.parse(JSON.stringify(draft));else data.quotes.push(JSON.parse(JSON.stringify(draft)));if(!data.clients.some(c=>c.name.toLowerCase()===draft.client.name.toLowerCase()))data.clients.push({...draft.client});save();const saved=data.quotes.find(x=>x.id===draft.id);toast('✅ Devis sauvegardé');startQuote();if(saved)openShareModal(saved);renderAll()}
function downloadPDF(q){const html='<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>'+esc(q.invoiceId||q.id)+'</title><style>body{font-family:Arial,sans-serif;color:#111827;padding:22px;font-size:11px}.pdf{box-shadow:none}.actions{display:none}</style></head><body>'+previewHtml(q,false)+'<script>window.onload=function(){setTimeout(function(){window.print()},500)}<\/script></body></html>';const w=window.open('','_blank','width=820,height=1060');if(w){w.document.write(html);w.document.close()}else toast('⚠️ Autorisez les popups pour le PDF')}
function openShareModal(q){const t=totals(q),tel=(q.client.phone||'').replace(/\D/g,'').replace(/^0/,'+33'),msg=`Bonjour ${q.client.name},\n\nVeuillez trouver votre ${q.invoiceId?'facture':'devis'} ${q.invoiceId||q.id} pour un montant de ${fmtEUR(t.ttc)} TTC.\n\n${q.invoiceId?'Facture acquittée.':'Ce devis est valable '+(data.pro.validity||30)+' jours.'}\n\nCordialement,\n${data.pro.company||data.pro.name}\n${data.pro.phone||''}`;sheet(`<h3>📤 Envoyer le document</h3><p class="small">${esc(q.invoiceId||q.id)} · <strong>${esc(q.client.name)}</strong> · ${fmtEUR(t.ttc)}</p><div class="share-opts"><div class="share-opt" onclick="downloadPDFById('${attr(q.id)}')"><div class="share-opt-icon">1️⃣</div><div><strong>Générer le PDF</strong><span>À enregistrer ou joindre ensuite</span></div></div><div class="share-opt" onclick="window.open('https://wa.me/${tel}?text=${encodeURIComponent(msg)}','_blank');closeModal()"><div class="share-opt-icon">💬</div><div><strong>WhatsApp</strong><span>Message prérempli</span></div></div><div class="share-opt" onclick="window.location.href='mailto:${attr(q.client.email||'')}?subject=${encodeURIComponent((q.invoiceId?'Facture ':'Devis ')+(q.invoiceId||q.id))}&body=${encodeURIComponent(msg)}';closeModal()"><div class="share-opt-icon">📧</div><div><strong>Email</strong><span>Mail pré-rempli</span></div></div></div><p class="small" style="margin-top:12px">Note : WhatsApp et Mail ne peuvent pas recevoir automatiquement une pièce jointe depuis GitHub Pages. Il faut générer le PDF puis le joindre.</p><button class="btn btn-ghost full" style="margin-top:12px" onclick="closeModal()">Fermer</button>`)}
function downloadPDFById(id){const q=data.quotes.find(x=>x.id===id);if(q)downloadPDF(q)}
function shareQuote(id){const q=data.quotes.find(x=>x.id===id);if(q)openShareModal(q)}
function makeInvoice(id){const q=data.quotes.find(x=>x.id===id);if(!q)return;if(!q.invoiceId)q.invoiceId=invoiceNum();q.status='paid';q.paidAt=new Date().toISOString();save();closeModal();renderAll();toast('✅ Facture créée et marquée payée');downloadPDF(q)}
function openQuote(id){const q=data.quotes.find(x=>x.id===id);if(!q)return;sheet(previewHtml(q,false)+`<div class="actions"><button class="btn btn-ghost" onclick="downloadPDFById('${attr(id)}')">📄 PDF</button><button class="btn btn-green" onclick="shareQuote('${attr(id)}')">📤 Envoyer</button><button class="btn btn-red" onclick="deleteQuote('${attr(id)}')">🗑️</button></div><div class="actions"><button class="btn btn-ghost" onclick="changeStatus('${attr(id)}','follow')">⏰ À relancer</button><button class="btn btn-ghost" onclick="changeStatus('${attr(id)}','accepted')">✅ Accepté</button><button class="btn btn-ghost" onclick="changeStatus('${attr(id)}','invoiced')">🧾 Facturé</button></div><div class="actions"><button class="btn btn-green" onclick="makeInvoice('${attr(id)}')">💶 Créer facture / payé</button><button class="btn btn-ghost" onclick="changeStatus('${attr(id)}','paid')">✅ Payé</button><button class="btn btn-red" onclick="changeStatus('${attr(id)}','refused')">❌ Refusé</button></div>`)}
function renderClients(){$('viewClients').innerHTML=`<div class="hgroup"><h2>Clients</h2><p>Carnet d'adresses sauvegardé sur cet appareil.</p></div><button class="btn btn-primary full" onclick="openClientSheet()">➕ Ajouter un client</button><div class="section-title">Liste (${data.clients.length})</div><div class="list">${data.clients.map((c,i)=>`<div class="client-row"><div><strong>${esc(c.name)}</strong><span>${esc(c.phone||'')} ${c.email?'· '+esc(c.email):''}<br>${esc(c.address||'')}</span></div><button class="btn btn-ghost btn-small" onclick="useClientByIndex(${i})">Devis</button></div>`).join('')||'<div class="empty">Aucun client enregistré.</div>'}</div>`}
function openClientSheet(){sheet(`<h3>Nouveau client</h3><div class="form"><input id="newCName" class="input" placeholder="Nom *"><input id="newCPhone" class="input" placeholder="Téléphone"><input id="newCEmail" class="input" placeholder="Email"><input id="newCAddress" class="input" placeholder="Adresse"><button class="btn btn-primary full" onclick="addClient()">Enregistrer</button></div>`)}
function addClient(){const c={name:val('newCName'),phone:val('newCPhone'),email:val('newCEmail'),address:val('newCAddress')};if(!c.name)return toast('Nom obligatoire');data.clients.push(c);save();closeModal();renderAll();toast('✅ Client ajouté')}
function useClientByIndex(i){const c=data.clients[i];if(c){startQuote();draft.client={...c};closeModal();setView('quote',$('navQuote'))}}
function renderFollow(){const q=data.quotes||[],count=s=>s==='Tous'?q.length:q.filter(x=>x.status===s).length,caPaid=q.filter(x=>x.status==='paid').reduce((s,x)=>s+totals(x).ttc,0),caWait=q.filter(x=>['sent','follow','accepted','invoiced'].includes(x.status)).reduce((s,x)=>s+totals(x).ttc,0);$('viewFollow').innerHTML=`<div class="hgroup"><h2>Suivi activité</h2><p>Devis, factures, relances et paiements.</p></div><div class="cards"><div class="card"><div class="stat-label">Payé</div><div class="stat-val" style="font-size:16px">${fmtEUR(caPaid)}</div><div class="stat-sub">encaissé</div></div><div class="card"><div class="stat-label">En attente</div><div class="stat-val" style="font-size:16px">${fmtEUR(caWait)}</div><div class="stat-sub">à suivre</div></div><div class="card"><div class="stat-label">Relances</div><div class="stat-val">${count('follow')}</div><div class="stat-sub">à traiter</div></div></div><div class="chips" style="margin-bottom:12px">${['Tous','sent','follow','accepted','invoiced','paid','refused'].map(s=>`<button class="chip" onclick="filterFollow('${s}')">${s==='Tous'?'Tous':statusLabel(s)} · ${count(s)}</button>`).join('')}</div><div id="followList" class="list">${quoteRows(q.slice().reverse())}</div>`}
function filterFollow(s){const arr=s==='Tous'?data.quotes:data.quotes.filter(q=>q.status===s);$('followList').innerHTML=quoteRows(arr.slice().reverse())}
function renderProfile(){$('viewProfile').innerHTML=`<div class="hgroup"><h2>Paramètres</h2><p>Profil, tarifs et base métiers.</p></div><div class="tabs"><div class="tab ${profileTab==='profil'?'active':''}" onclick="profileTab='profil';renderProfile()">👤 Profil</div><div class="tab ${profileTab==='tarifs'?'active':''}" onclick="profileTab='tarifs';renderProfile()">💶 Tarifs</div><div class="tab ${profileTab==='metiers'?'active':''}" onclick="profileTab='metiers';renderProfile()">🔎 Métiers</div></div>${profileTab==='profil'?renderProfil():profileTab==='tarifs'?renderTarifs():renderJobs()}`}
function renderProfil(){return`<div class="form"><div class="row"><input id="pName" class="input" value="${attr(data.pro.name)}" placeholder="Prénom"><input id="pCompany" class="input" value="${attr(data.pro.company)}" placeholder="Entreprise"></div><div class="row"><input id="pPhone" class="input" value="${attr(data.pro.phone)}" placeholder="Téléphone"><input id="pEmail" class="input" value="${attr(data.pro.email)}" placeholder="Email"></div><input id="pAddress" class="input" value="${attr(data.pro.address)}" placeholder="Adresse"><div class="row"><input id="pSiret" class="input" value="${attr(data.pro.siret)}" placeholder="SIRET"><input id="pTva" type="number" class="input" value="${attr(data.pro.tva)}" placeholder="TVA %"></div><input id="pValidity" type="number" class="input" value="${attr(data.pro.validity)}" placeholder="Validité devis"><textarea id="pTerms" class="textarea">${esc(data.pro.terms)}</textarea><button class="btn btn-primary full" onclick="saveProfile()">💾 Sauvegarder le profil</button><button class="btn btn-red full" onclick="resetData()">Effacer toutes les données</button></div>`}
function renderTarifs(){initTarifs(tarifJob);const cat=getCat(tarifJob),j=job(tarifJob);return`<div class="form"><input class="input" placeholder="Rechercher un métier" oninput="tarifSearch(this.value)"><div class="chips">${allJobs().slice(0,24).map(x=>`<button class="chip ${tarifJob===x.n?'sel':''}" onclick="tarifJob='${attr(x.n)}';renderProfile()">${x.i} ${esc(x.n)}</button>`).join('')}</div><div id="tarifSearchBox"></div></div><div class="section-title"><span>${j.i} ${esc(j.n)} · ${cat.length} prestations</span><button class="btn btn-primary btn-small" onclick="addTarif('${attr(j.n)}')">＋ Ajouter</button></div><div class="list">${cat.map((p,i)=>`<div class="client-row"><div><strong>${esc(p.name)}</strong><span>${fmtEUR(p.price)} / ${esc(p.unit)}</span></div><div style="display:flex;gap:6px;align-items:center"><button class="btn btn-ghost btn-small" onclick="editTarif('${attr(j.n)}',${i})">✏️ Modifier</button></div></div>`).join('')}</div><button class="btn btn-ghost full" style="margin-top:12px" onclick="resetTarifs('${attr(j.n)}')">↺ Restaurer tarifs par défaut</button>`}
function tarifSearch(q){const box=$('tarifSearchBox'),s=q.toLowerCase();if(!box)return;box.innerHTML=s?`<div class="list" style="margin-top:10px">${allJobs().filter(j=>j.n.toLowerCase().includes(s)||j.c.toLowerCase().includes(s)).slice(0,12).map(j=>`<div class="job-row" onclick="tarifJob='${attr(j.n)}';renderProfile()"><div><strong>${j.i} ${esc(j.n)}</strong><span>${esc(j.c)}</span></div></div>`).join('')}</div>`:''}
function editTarif(m,i){const p=data.tarifs[m][i];sheet(`<h3>Modifier la prestation</h3><div class="form"><label class="label">Intitulé</label><input id="tName" class="input" value="${attr(p.name)}"><label class="label">Prix HT</label><input id="tPrice" type="number" class="input" value="${attr(p.price)}"><label class="label">Unité</label><input id="tUnit" class="input" value="${attr(p.unit)}"><button class="btn btn-primary full" onclick="saveTarif('${attr(m)}',${i})">Sauvegarder</button><button class="btn btn-red full" onclick="deleteTarif('${attr(m)}',${i})">Supprimer</button></div>`)}
function saveTarif(m,i){const name=val('tName'),price=parseFloat(val('tPrice')),unit=val('tUnit')||'forfait';if(!name||!price)return toast('⚠️ Infos requises');data.tarifs[m][i]={name,price,unit};save();closeModal();renderProfile();toast('✅ Prestation modifiée')}
function addTarif(m){sheet(`<h3>Ajouter prestation</h3><div class="form"><input id="tName" class="input" placeholder="Désignation"><input id="tPrice" type="number" class="input" placeholder="Prix HT"><input id="tUnit" class="input" placeholder="Unité"><button class="btn btn-primary full" onclick="confirmAddTarif('${attr(m)}')">Ajouter</button></div>`)}
function confirmAddTarif(m){const name=val('tName'),price=parseFloat(val('tPrice')),unit=val('tUnit')||'forfait';if(!name||!price)return toast('⚠️ Infos requises');initTarifs(m);data.tarifs[m].push({name,price,unit});save();closeModal();renderProfile();toast('✅ Prestation ajoutée')}
function deleteTarif(m,i){if(!confirm('Supprimer cette prestation ?'))return;data.tarifs[m].splice(i,1);save();closeModal();renderProfile()}
function resetTarifs(m){if(!confirm('Restaurer les tarifs par défaut ?'))return;delete data.tarifs[m];initTarifs(m);save();renderProfile()}
function renderJobs(){return`<div class="form"><input class="input" placeholder="Rechercher un métier, catégorie..." oninput="jobSearch=this.value;renderProfile()"><div class="chips">${CATEGORIES.map(c=>`<button class="chip ${jobFilter===c?'sel':''}" onclick="jobFilter='${attr(c)}';renderProfile()">${esc(c)}</button>`).join('')}</div><button class="btn btn-primary full" onclick="openCustomJobSheet()">➕ Créer un métier personnalisé</button></div><div class="section-title">Base métiers (${allJobs().length})</div><div class="list">${allJobs().filter(j=>(jobFilter==='Tous'||j.c===jobFilter)&&(!jobSearch||j.n.toLowerCase().includes(jobSearch.toLowerCase())||j.c.toLowerCase().includes(jobSearch.toLowerCase()))).map(j=>`<div class="job-row" onclick="data.pro.metier='${attr(j.n)}';data.pro.icon='${attr(j.i)}';save();updateTop();toast('Métier principal modifié')"><div><strong>${j.i} ${esc(j.n)}${j.g?'<span class="growth">⭐ croissance</span>':''}</strong><span>${esc(j.c)} · ${j.p.length} prestations indicatives</span></div><button class="btn btn-ghost btn-small">Choisir</button></div>`).join('')}</div>`}
function saveProfile(){data.pro.name=val('pName');data.pro.company=val('pCompany');data.pro.phone=val('pPhone');data.pro.email=val('pEmail');data.pro.address=val('pAddress');data.pro.siret=val('pSiret');data.pro.tva=parseFloat(val('pTva'))||0;data.pro.validity=parseInt(val('pValidity'))||30;data.pro.terms=val('pTerms');save();updateTop();toast('✅ Profil sauvegardé');renderAll()}
function changeStatus(id,s){const q=data.quotes.find(x=>x.id===id);if(q){q.status=s;if(s==='invoiced'&&!q.invoiceId)q.invoiceId=invoiceNum();save();closeModal();renderAll();toast('Statut : '+statusLabel(s))}}
function deleteQuote(id){if(!confirm('Supprimer ce document ?'))return;data.quotes=data.quotes.filter(q=>q.id!==id);save();closeModal();renderAll();toast('Supprimé')}
function sheet(html){$('sheet').innerHTML=html;$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show')}
function resetData(){if(!confirm('Effacer TOUTES les données ? Irréversible.'))return;localStorage.removeItem(STORE);location.reload()}
function expose(){Object.assign(window,{enterApp,setView,startQuote,goStep,fillExampleClient,useLastClient,removeMetier,openJobPicker,renderJobPickerList,addMetier,openCustomJobSheet,saveCustomJob,toggleItemByKey,chgQtyKey,setQtyKey,setPriceKey,setUnitKey,setNameKey,openCustomItem,addCustomItem,saveAndShare,downloadPDF,downloadPDFById,openShareModal,shareQuote,makeInvoice,openQuote,openClientSheet,addClient,useClientByIndex,filterFollow,renderProfile,tarifSearch,editTarif,saveTarif,addTarif,confirmAddTarif,deleteTarif,resetTarifs,saveProfile,changeStatus,deleteQuote,closeModal,resetData})}
function bindEvents(){$('enterBtn').addEventListener('click',enterApp);$('navHome').addEventListener('click',()=>setView('home',$('navHome')));$('navQuote').addEventListener('click',()=>{startQuote();setView('quote',$('navQuote'))});$('navClients').addEventListener('click',()=>setView('clients',$('navClients')));$('navFollow').addEventListener('click',()=>setView('follow',$('navFollow')));$('navProfile').addEventListener('click',()=>setView('profile',$('navProfile')));$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()})}
function runSelfTests(){console.assert(typeof window.enterApp==='function','enterApp global');console.assert(allJobs().length>=JOBS.length,'allJobs OK');console.assert(totals({items:[{price:10,qty:2}],client:{},metiers:[]}).ht===20,'totals OK');console.assert(statusLabel('paid')==='PAYÉ','paid label OK');console.log('DevisExpress V3.5 Complete Stable tests OK')}
function init(){load();expose();renderMetiers();if(data.pro.company)$('proCompanyStart').value=data.pro.company;if(data.pro.name)$('proNameStart').value=data.pro.name;updateTop();bindEvents();renderAll();runSelfTests()}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
